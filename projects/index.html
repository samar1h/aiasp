<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank Demo</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, system-ui, Arial, sans-serif;
    max-width: 480px;
    margin: 0 auto;
    padding: 16px;
    background: #fff;
    color: #111;
    font-size: 16px;
  }
  h1 { font-size: 22px; margin: 8px 0 16px; }
  h2 { font-size: 17px; margin: 24px 0 8px; border-top: 1px solid #ccc; padding-top: 16px; }
  label { display: block; font-size: 13px; color: #444; margin: 12px 0 4px; }
  input {
    width: 100%;
    padding: 10px;
    font-size: 16px;
    border: 1px solid #999;
    border-radius: 4px;
  }
  button {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    margin-top: 12px;
    border: 1px solid #333;
    background: #111;
    color: #fff;
    border-radius: 4px;
  }
  button:disabled { opacity: 0.5; }
  button.secondary { background: #fff; color: #111; }
  .balance { font-size: 32px; font-weight: bold; margin: 8px 0; }
  .row { display: flex; justify-content: space-between; font-size: 14px; padding: 6px 0; border-bottom: 1px solid #eee; }
  .msg { padding: 10px; border-radius: 4px; margin: 12px 0; font-size: 14px; }
  .msg.error { background: #fdd; color: #900; }
  .msg.success { background: #dfd; color: #060; }
  .msg.loading { background: #eef; color: #339; }
  .hidden { display: none; }
  .muted { color: #666; font-size: 13px; }
  #adminBox { border: 1px dashed #900; padding: 12px; margin-top: 24px; border-radius: 4px; }
</style>
</head>
<body>

<h1>Bank Demo</h1>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <p class="muted">Sign in with Google to continue.</p>
  <button id="loginBtn">Sign in with Google</button>
</div>

<!-- LOADING / STATUS MESSAGES (always visible when active) -->
<div id="statusMsg" class="msg loading hidden"></div>
<div id="errorMsg" class="msg error hidden"></div>
<div id="successMsg" class="msg success hidden"></div>

<!-- MAIN APP (hidden until logged in + profile loaded) -->
<div id="appScreen" class="hidden">

  <h2>Your account</h2>
  <div class="row"><span>Username</span><span id="myUsername">—</span></div>
  <div class="row"><span>Signed in as</span><span id="myEmail">—</span></div>
  <div class="balance">₹<span id="myBalance">0</span></div>

  <h2>Send money</h2>
  <label for="toUsername">Recipient username</label>
  <input id="toUsername" type="text" placeholder="e.g. swift-otter-482" autocomplete="off">
  <label for="amount">Amount (₹)</label>
  <input id="amount" type="number" min="1" step="1" placeholder="e.g. 50">
  <button id="sendBtn">Send</button>

  <h2>Recent transactions</h2>
  <div id="txList" class="muted">No transactions yet.</div>

  <div id="adminBox" class="hidden">
    <h2 style="border:none;margin-top:0;">Admin: mint money</h2>
    <label for="mintUsername">Username to credit</label>
    <input id="mintUsername" type="text" placeholder="username">
    <label for="mintAmount">Amount to mint (₹)</label>
    <input id="mintAmount" type="number" min="1" step="1">
    <button id="mintBtn" class="secondary">Mint</button>
  </div>

  <button id="logoutBtn" class="secondary" style="margin-top:32px;">Sign out</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
import {
  getFirestore, doc, getDoc, setDoc, updateDoc, runTransaction,
  collection, addDoc, query, where, orderBy, limit, onSnapshot, serverTimestamp, getDocs
} from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCE6vBJ3NCevVCOtEXPIMTRTPLrtLsmvuU",
  authDomain: "test-banking-system.firebaseapp.com",
  projectId: "test-banking-system",
  storageBucket: "test-banking-system.firebasestorage.app",
  messagingSenderId: "786861992830",
  appId: "1:786861992830:web:332395942df42ab2ca212f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

// ---------- DOM refs ----------
const loginScreen = document.getElementById('loginScreen');
const appScreen = document.getElementById('appScreen');
const loginBtn = document.getElementById('loginBtn');
const logoutBtn = document.getElementById('logoutBtn');
const sendBtn = document.getElementById('sendBtn');
const mintBtn = document.getElementById('mintBtn');
const statusMsg = document.getElementById('statusMsg');
const errorMsg = document.getElementById('errorMsg');
const successMsg = document.getElementById('successMsg');
const adminBox = document.getElementById('adminBox');

let currentUid = null;
let unsubUserDoc = null;
let unsubTx = null;

// ---------- UI helpers ----------
function showStatus(text) {
  statusMsg.textContent = text;
  statusMsg.classList.remove('hidden');
}
function hideStatus() {
  statusMsg.classList.add('hidden');
}
function showError(text) {
  errorMsg.textContent = text;
  errorMsg.classList.remove('hidden');
  setTimeout(() => errorMsg.classList.add('hidden'), 6000);
}
function showSuccess(text) {
  successMsg.textContent = text;
  successMsg.classList.remove('hidden');
  setTimeout(() => successMsg.classList.add('hidden'), 4000);
}
function setButtonsDisabled(disabled) {
  loginBtn.disabled = disabled;
  sendBtn.disabled = disabled;
  mintBtn.disabled = disabled;
}

// ---------- username generation ----------
const ADJ = ["swift","calm","bold","quiet","bright","lucky","quick","brave","mellow","sharp","gentle","rapid","cosmic","amber","silver"];
const NOUN = ["otter","falcon","maple","comet","tiger","willow","harbor","ember","canyon","raven","meadow","glacier","cedar","orbit","summit"];
function randomUsername() {
  const a = ADJ[Math.floor(Math.random()*ADJ.length)];
  const n = NOUN[Math.floor(Math.random()*NOUN.length)];
  const num = Math.floor(100 + Math.random()*900);
  return `${a}-${n}-${num}`;
}

// ---------- auth ----------
loginBtn.addEventListener('click', async () => {
  try {
    setButtonsDisabled(true);
    showStatus('Opening Google sign-in…');
    await signInWithPopup(auth, provider);
    // onAuthStateChanged will take it from here
  } catch (err) {
    hideStatus();
    setButtonsDisabled(false);
    showError('Sign-in failed: ' + (err.message || err.code || err));
  }
});

logoutBtn.addEventListener('click', async () => {
  try {
    if (unsubUserDoc) unsubUserDoc();
    if (unsubTx) unsubTx();
    await signOut(auth);
  } catch (err) {
    showError('Sign-out failed: ' + err.message);
  }
});

onAuthStateChanged(auth, async (user) => {
  setButtonsDisabled(false);
  if (!user) {
    currentUid = null;
    loginScreen.classList.remove('hidden');
    appScreen.classList.add('hidden');
    hideStatus();
    return;
  }

  currentUid = user.uid;
  loginScreen.classList.add('hidden');
  showStatus('Loading your account…');

  try {
    const userRef = doc(db, 'users', user.uid);
    const snap = await getDoc(userRef);

    if (!snap.exists()) {
      // First time login: create profile with a unique username + starting balance
      showStatus('Setting up your new account…');
      let username;
      let claimed = false;
      let attempts = 0;
      while (!claimed && attempts < 8) {
        username = randomUsername();
        attempts++;
        try {
          // Try to claim the username doc first (rules only allow creating your own uid mapping once)
          await setDoc(doc(db, 'usernames', username), { uid: user.uid });
          claimed = true;
        } catch (e) {
          // likely already taken or race — retry with a new random username
          claimed = false;
        }
      }
      if (!claimed) {
        throw new Error('Could not generate a unique username, please retry sign-in.');
      }

      await setDoc(userRef, {
        username,
        balance: 1000,
        email: user.email,
        createdAt: serverTimestamp()
      });
    }

    // Check admin status
    try {
      const adminSnap = await getDoc(doc(db, 'admins', user.uid));
      adminBox.classList.toggle('hidden', !adminSnap.exists());
    } catch (e) {
      adminBox.classList.add('hidden');
    }

    hideStatus();
    appScreen.classList.remove('hidden');
    document.getElementById('myEmail').textContent = user.email;

    // Live listener on own profile
    if (unsubUserDoc) unsubUserDoc();
    unsubUserDoc = onSnapshot(userRef, (docSnap) => {
      if (docSnap.exists()) {
        const data = docSnap.data();
        document.getElementById('myUsername').textContent = data.username;
        document.getElementById('myBalance').textContent = data.balance;
      }
    }, (err) => {
      showError('Live balance updates stopped: ' + err.message);
    });

    // Live listener on recent transactions involving this user
    if (unsubTx) unsubTx();
    const txQuery = query(
      collection(db, 'transactions'),
      where('participants', 'array-contains', user.uid),
      orderBy('createdAt', 'desc'),
      limit(15)
    );
    unsubTx = onSnapshot(txQuery, (qsnap) => {
      const txList = document.getElementById('txList');
      if (qsnap.empty) {
        txList.textContent = 'No transactions yet.';
        return;
      }
      txList.innerHTML = '';
      qsnap.forEach(d => {
        const t = d.data();
        const div = document.createElement('div');
        div.className = 'row';
        let label;
        if (t.type === 'mint') {
          label = `Minted to ${t.toUsername}`;
        } else if (t.from === user.uid) {
          label = `Sent to ${t.toUsername}`;
        } else {
          label = `Received from ${t.fromUsername || 'admin'}`;
        }
        div.innerHTML = `<span>${label}</span><span>₹${t.amount}</span>`;
        txList.appendChild(div);
      });
    }, (err) => {
      showError('Live transaction updates stopped: ' + err.message);
    });

  } catch (err) {
    hideStatus();
    showError('Failed to load account: ' + (err.message || err));
  }
});

// ---------- send money ----------
sendBtn.addEventListener('click', async () => {
  const toUsername = document.getElementById('toUsername').value.trim();
  const amount = Number(document.getElementById('amount').value);

  if (!toUsername) { showError('Enter a recipient username.'); return; }
  if (!amount || amount <= 0 || !Number.isFinite(amount)) { showError('Enter a valid amount.'); return; }

  setButtonsDisabled(true);
  showStatus('Sending payment…');

  try {
    // Look up recipient uid from username
    const usernameSnap = await getDoc(doc(db, 'usernames', toUsername));
    if (!usernameSnap.exists()) {
      throw new Error(`No user found with username "${toUsername}".`);
    }
    const toUid = usernameSnap.data().uid;
    if (toUid === currentUid) {
      throw new Error('You cannot send money to yourself.');
    }

    const fromRef = doc(db, 'users', currentUid);
    const toRef = doc(db, 'users', toUid);

    let fromUsernameForLog, toUsernameForLog;

    await runTransaction(db, async (transaction) => {
      const fromSnap = await transaction.get(fromRef);
      const toSnap = await transaction.get(toRef);

      if (!fromSnap.exists() || !toSnap.exists()) {
        throw new Error('Account not found.');
      }
      const fromData = fromSnap.data();
      const toData = toSnap.data();

      if (fromData.balance < amount) {
        throw new Error('Insufficient balance.');
      }

      fromUsernameForLog = fromData.username;
      toUsernameForLog = toData.username;

      transaction.update(fromRef, { balance: fromData.balance - amount });
      transaction.update(toRef, { balance: toData.balance + amount });
    });

    // Log the transaction (append-only, after transfer succeeds)
    await addDoc(collection(db, 'transactions'), {
      type: 'transfer',
      from: currentUid,
      to: toUid,
      fromUsername: fromUsernameForLog,
      toUsername: toUsernameForLog,
      amount: amount,
      participants: [currentUid, toUid],
      createdAt: serverTimestamp()
    });

    document.getElementById('toUsername').value = '';
    document.getElementById('amount').value = '';
    hideStatus();
    showSuccess(`Sent ₹${amount} to ${toUsername}.`);
  } catch (err) {
    hideStatus();
    showError(err.message || String(err));
  } finally {
    setButtonsDisabled(false);
  }
});

// ---------- admin: mint money ----------
mintBtn.addEventListener('click', async () => {
  const username = document.getElementById('mintUsername').value.trim();
  const amount = Number(document.getElementById('mintAmount').value);

  if (!username) { showError('Enter a username to credit.'); return; }
  if (!amount || amount <= 0 || !Number.isFinite(amount)) { showError('Enter a valid amount.'); return; }

  setButtonsDisabled(true);
  showStatus('Minting…');

  try {
    const usernameSnap = await getDoc(doc(db, 'usernames', username));
    if (!usernameSnap.exists()) {
      throw new Error(`No user found with username "${username}".`);
    }
    const toUid = usernameSnap.data().uid;
    const toRef = doc(db, 'users', toUid);

    let toUsernameForLog;
    await runTransaction(db, async (transaction) => {
      const toSnap = await transaction.get(toRef);
      if (!toSnap.exists()) throw new Error('Account not found.');
      const toData = toSnap.data();
      toUsernameForLog = toData.username;
      transaction.update(toRef, { balance: toData.balance + amount });
    });

    await addDoc(collection(db, 'transactions'), {
      type: 'mint',
      from: currentUid,
      to: toUid,
      toUsername: toUsernameForLog,
      amount: amount,
      participants: [currentUid, toUid],
      createdAt: serverTimestamp()
    });

    document.getElementById('mintUsername').value = '';
    document.getElementById('mintAmount').value = '';
    hideStatus();
    showSuccess(`Minted ₹${amount} to ${username}.`);
  } catch (err) {
    hideStatus();
    showError(err.message || String(err));
  } finally {
    setButtonsDisabled(false);
  }
});
</script>
</body>
</html>
