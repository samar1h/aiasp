<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>BrowserIDE</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#252836;--border:#2e3147;--text:#e2e8f0;--text2:#94a3b8;--accent:#6366f1;--accent2:#818cf8;--red:#f87171;--yellow:#fbbf24;--green:#34d399;--blue:#60a5fa;--radius:6px;--font:'Fira Code',monospace;--fs:14px;--tab:2;
}
body.light{
  --bg:#f8fafc;--bg2:#ffffff;--bg3:#f1f5f9;--border:#e2e8f0;--text:#0f172a;--text2:#64748b;--accent:#4f46e5;--accent2:#6366f1;--red:#dc2626;--yellow:#d97706;--green:#059669;--blue:#2563eb;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:var(--fs);height:100dvh;display:flex;flex-direction:column;overflow:hidden}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
#header{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;padding:0 8px;height:44px;flex-shrink:0;z-index:50}
#sidebar{background:var(--bg2);border-right:1px solid var(--border);width:250px;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:transform .2s}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#editor-wrap{flex:1;overflow:hidden;position:relative}
#console-panel{background:var(--bg2);border-top:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:height .15s}
#console-panel.collapsed{height:32px!important}
#console-resize{height:4px;background:var(--border);cursor:row-resize;flex-shrink:0}
#console-output{flex:1;overflow-y:auto;padding:4px 8px;font-size:12px;line-height:1.6}
#layout{flex:1;display:flex;overflow:hidden}
.btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:4px 10px;cursor:pointer;font-size:13px;white-space:nowrap;min-height:32px;display:inline-flex;align-items:center;gap:4px}
.btn:hover{background:var(--border)}
.btn.accent{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.accent:hover{background:var(--accent2)}
.btn.danger{background:var(--red);border-color:var(--red);color:#fff}
.icon-btn{background:none;border:none;color:var(--text2);cursor:pointer;padding:6px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;min-width:36px;min-height:36px}
.icon-btn:hover{background:var(--bg3);color:var(--text)}
#tabs{display:flex;align-items:center;gap:2px;overflow-x:auto;flex:1;min-width:0}
#tabs::-webkit-scrollbar{height:3px}
.tab{display:flex;align-items:center;gap:4px;padding:0 10px;height:36px;border-radius:var(--radius);cursor:pointer;white-space:nowrap;color:var(--text2);font-size:12px;border:1px solid transparent;min-width:80px;max-width:160px}
.tab.active{background:var(--bg3);border-color:var(--border);color:var(--text)}
.tab:hover:not(.active){background:var(--bg3)}
.tab-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);display:none}.tab.dirty .tab-dot{display:block}
.tab-close{margin-left:auto;opacity:.5;font-size:14px;line-height:1}.tab-close:hover{opacity:1}
.drawer{position:fixed;top:0;bottom:0;background:var(--bg2);z-index:100;display:flex;flex-direction:column;overflow:hidden;transition:transform .25s;box-shadow:0 0 24px rgba(0,0,0,.4)}
.drawer.left{left:0;width:min(280px,85vw);transform:translateX(-100%)}
.drawer.right{right:0;width:min(320px,90vw);transform:translateX(100%)}
.drawer.open{transform:translateX(0)}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90;display:none}
#overlay.show{display:block}
.tree-item{display:flex;align-items:center;gap:4px;padding:3px 8px;cursor:pointer;border-radius:4px;min-height:30px;position:relative;user-select:none}
.tree-item:hover{background:var(--bg3)}
.tree-item.active{background:var(--accent);color:#fff}
.tree-item .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px}
.tree-item input.rename{background:var(--bg);border:1px solid var(--accent);border-radius:3px;color:var(--text);padding:0 4px;width:100%;font:inherit}
.folder-children{padding-left:16px}
.ctx-menu{position:fixed;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);z-index:200;min-width:160px;box-shadow:0 4px 20px rgba(0,0,0,.4);overflow:hidden}
.ctx-item{padding:8px 12px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;min-height:36px}
.ctx-item:hover{background:var(--bg3)}
.ctx-item.danger{color:var(--red)}
.ctx-sep{height:1px;background:var(--border);margin:2px 0}
#bottom-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:2px solid var(--border);border-radius:16px 16px 0 0;z-index:200;transform:translateY(100%);transition:transform .25s;max-height:70vh;overflow-y:auto}
#bottom-sheet.open{transform:translateY(0)}
.bs-item{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;font-size:15px;min-height:48px}
.bs-item:hover{background:var(--bg3)}
.bs-item.danger{color:var(--red)}
.bs-sep{height:1px;background:var(--border)}
.dialog-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px}
.dialog{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;width:100%;max-width:400px}
.dialog h3{margin-bottom:12px;font-size:16px}
.dialog input,.dialog textarea,.dialog select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:8px;font:inherit;margin-bottom:12px}
.dialog textarea{resize:vertical;min-height:80px}
.dialog-btns{display:flex;gap:8px;justify-content:flex-end}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);gap:8px}
.setting-row label{font-size:13px;color:var(--text2);flex-shrink:0}
.toggle{position:relative;width:42px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:12px;cursor:pointer;transition:.2s}
.toggle-slider:before{content:'';position:absolute;width:18px;height:18px;border-radius:50%;left:3px;top:3px;background:#fff;transition:.2s}
.toggle input:checked+.toggle-slider{background:var(--accent)}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px)}
.console-line{display:flex;gap:8px;align-items:flex-start;font-size:12px;line-height:1.5;padding:1px 0}
.console-line .ts{color:var(--text2);flex-shrink:0;font-size:10px;margin-top:2px}
.console-line.log{color:var(--text)}
.console-line.warn{color:var(--yellow)}
.console-line.error{color:var(--red)}
.console-line.info{color:var(--blue)}
.console-line.sys{color:var(--text2);font-style:italic}
.plugin-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);gap:8px}
#pyodide-progress{display:none;position:absolute;bottom:40px;right:16px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;font-size:12px;z-index:10}
.cm-editor{height:100%!important;font-family:var(--font)!important;font-size:var(--fs)!important}
.cm-editor.cm-focused{outline:none}
.cm-scroller{overflow:auto!important}
.cm-line{font-family:var(--font)!important}
@media(max-width:767px){
  #sidebar{display:none}
  #sidebar-drawer .drawer{display:flex}
  #console-panel{height:200px}
}
@media(min-width:768px){
  #sidebar{display:flex}
  #mob-burger{display:none}
  #console-panel{height:200px}
  #sidebar-drawer{display:none}
}
.sidebar-section{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);padding:8px 8px 4px;margin-top:4px}
select.ui-sel{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:4px 6px;font:inherit;font-size:13px}
input[type=range]{accent-color:var(--accent)}
#proj-name-btn{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <button class="icon-btn" id="mob-burger" title="Files">☰</button>
  <button class="btn" id="proj-name-btn" title="Switch project">📁 <span id="proj-label">Project</span></button>
  <div id="tabs" class="hidden md:flex"></div>
  <div style="flex:1"></div>
  <button class="btn accent" id="run-btn" title="Run (Ctrl+Enter)">▶ Run</button>
  <button class="icon-btn" id="settings-btn" title="Settings">⚙</button>
</div>

<!-- MAIN LAYOUT -->
<div id="layout">
  <!-- SIDEBAR (desktop always visible) -->
  <div id="sidebar">
    <div style="padding:8px;display:flex;gap:4px;border-bottom:1px solid var(--border);flex-shrink:0">
      <button class="btn" style="flex:1;font-size:12px" id="new-file-btn">+ File</button>
      <button class="btn" style="flex:1;font-size:12px" id="new-folder-btn">+ Folder</button>
      <button class="icon-btn" id="upload-btn" title="Upload">⬆</button>
    </div>
    <div id="file-tree" style="flex:1;overflow-y:auto;padding:4px"></div>
  </div>

  <!-- EDITOR + CONSOLE -->
  <div id="main">
    <!-- Tab bar (also mobile) -->
    <div style="background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;overflow-x:auto;flex-shrink:0;min-height:36px" id="tab-bar">
      <div id="tabs-container" style="display:flex;align-items:center;gap:2px;padding:0 4px;flex:1;overflow-x:auto"></div>
    </div>
    <div id="editor-wrap" style="position:relative">
      <div id="editor-mount" style="height:100%;overflow:hidden"></div>
      <div id="preview-panel" style="display:none;position:absolute;top:0;right:0;bottom:0;width:50%;background:var(--bg);border-left:1px solid var(--border);overflow:auto;padding:16px"></div>
      <div id="pyodide-progress">⏳ Loading Python runtime…</div>
    </div>
    <div id="console-resize"></div>
    <div id="console-panel" style="height:200px">
      <div style="display:flex;align-items:center;gap:6px;padding:4px 8px;border-bottom:1px solid var(--border);flex-shrink:0;min-height:32px">
        <button class="icon-btn" id="console-toggle" style="font-size:12px">▼ Console</button>
        <div style="flex:1"></div>
        <button class="icon-btn" id="console-clear" title="Clear" style="font-size:11px">✕</button>
        <button class="icon-btn" id="console-copy" title="Copy" style="font-size:11px">⎘</button>
      </div>
      <div id="console-output"></div>
    </div>
  </div>
</div>

<!-- SIDEBAR DRAWER (mobile) -->
<div id="sidebar-drawer">
  <div class="drawer left" id="mob-sidebar">
    <div style="padding:8px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border);flex-shrink:0">
      <span style="font-size:13px;font-weight:600">Files</span>
      <div style="flex:1"></div>
      <button class="btn" style="font-size:12px" id="mob-new-file-btn">+ File</button>
      <button class="btn" style="font-size:12px" id="mob-new-folder-btn">+ Folder</button>
    </div>
    <div id="mob-file-tree" style="flex:1;overflow-y:auto;padding:4px"></div>
  </div>
</div>

<!-- SETTINGS DRAWER -->
<div class="drawer right" id="settings-drawer">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0">
    <span style="font-size:16px;font-weight:600">Settings</span>
    <button class="icon-btn" id="settings-close">✕</button>
  </div>
  <div style="flex:1;overflow-y:auto;padding:0 16px 16px">
    <div class="sidebar-section">Appearance</div>
    <div class="setting-row"><label>Dark mode</label><label class="toggle"><input type="checkbox" id="theme-toggle" checked><span class="toggle-slider"></span></label></div>
    <div class="setting-row"><label>Font size <span id="fs-val">14</span>px</label><input type="range" id="fs-slider" min="10" max="24" value="14" style="width:100px"></div>
    <div class="setting-row"><label>Font family</label>
      <select class="ui-sel" id="font-sel">
        <option value="'Fira Code',monospace">Fira Code</option>
        <option value="'JetBrains Mono',monospace">JetBrains Mono</option>
        <option value="'Cascadia Code',monospace">Cascadia Code</option>
        <option value="Courier New,monospace">Courier New</option>
      </select>
    </div>
    <div class="setting-row"><label>Tab size</label>
      <select class="ui-sel" id="tab-sel"><option value="2">2 spaces</option><option value="4">4 spaces</option></select>
    </div>
    <div class="setting-row"><label>Word wrap</label><label class="toggle"><input type="checkbox" id="wrap-toggle"><span class="toggle-slider"></span></label></div>

    <div class="sidebar-section" style="margin-top:12px">Run command</div>
    <div class="setting-row" style="flex-direction:column;align-items:flex-start;gap:4px">
      <label style="font-size:12px;color:var(--text2)">e.g. "python main.py" or "node app.js"</label>
      <input type="text" id="run-cmd-input" placeholder="auto" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:6px 8px;font:inherit">
    </div>

    <div class="sidebar-section" style="margin-top:12px">Plugins</div>
    <div id="plugin-list"></div>
    <button class="btn" style="width:100%;margin-top:8px" id="add-plugin-btn">+ Add Plugin</button>
    <button class="btn" style="width:100%;margin-top:4px" id="add-plugin-url-btn">+ Add Plugin by URL</button>

    <div class="sidebar-section" style="margin-top:12px">Projects</div>
    <div id="settings-proj-list"></div>
    <button class="btn" style="width:100%;margin-top:8px" id="new-proj-btn-s">+ New Project</button>

    <div class="sidebar-section" style="margin-top:12px">Keyboard Shortcuts</div>
    <div style="font-size:12px;color:var(--text2);line-height:2">
      <div>Run: <code>Ctrl+Enter</code></div>
      <div>Save: <code>Ctrl+S</code></div>
      <div>Toggle sidebar: <code>Ctrl+B</code></div>
      <div>Toggle console: <code>Ctrl+J</code></div>
    </div>
  </div>
</div>

<!-- OVERLAY -->
<div id="overlay"></div>

<!-- CONTEXT MENU (desktop) -->
<div id="ctx-menu" class="ctx-menu" style="display:none"></div>

<!-- BOTTOM SHEET (mobile context / project switcher) -->
<div id="bottom-sheet">
  <div style="text-align:center;padding:8px"><div style="width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto"></div></div>
  <div id="bottom-sheet-content"></div>
</div>

<!-- DIALOG CONTAINER -->
<div id="dialog-bg" class="dialog-bg" style="display:none">
  <div id="dialog" class="dialog"></div>
</div>

<!-- HIDDEN UPLOAD INPUT -->
<input type="file" id="file-upload" style="display:none" multiple>
<input type="file" id="folder-upload" style="display:none" webkitdirectory multiple>
<input type="file" id="zip-upload" style="display:none" accept=".zip">

<!-- CDN SCRIPTS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

<!-- CodeMirror 6 via esm.sh -->
<script type="module">
// ─── CodeMirror 6 imports ───
import{EditorState,Compartment}from'https://esm.sh/@codemirror/state@6.4.1';
import{EditorView,keymap,lineNumbers,drawSelection,highlightActiveLine,highlightActiveLineGutter,dropCursor}from'https://esm.sh/@codemirror/view@6.26.3';
import{defaultKeymap,history,historyKeymap,indentWithTab}from'https://esm.sh/@codemirror/commands@6.6.0';
import{javascript}from'https://esm.sh/@codemirror/lang-javascript@6.2.2';
import{html}from'https://esm.sh/@codemirror/lang-html@6.4.9';
import{css}from'https://esm.sh/@codemirror/lang-css@6.3.1';
import{python}from'https://esm.sh/@codemirror/lang-python@6.1.6';
import{json}from'https://esm.sh/@codemirror/lang-json@6.0.1';
import{markdown}from'https://esm.sh/@codemirror/lang-markdown@6.2.5';
import{oneDark}from'https://esm.sh/@codemirror/theme-one-dark@6.1.2';
import{autocompletion,closeBrackets,closeBracketsKeymap,completionKeymap}from'https://esm.sh/@codemirror/autocomplete@6.18.1';
import{indentOnInput,syntaxHighlighting,defaultHighlightStyle,bracketMatching,foldKeymap}from'https://esm.sh/@codemirror/language@6.10.3';
import{searchKeymap,highlightSelectionMatches}from'https://esm.sh/@codemirror/search@6.5.6';
import{lintKeymap}from'https://esm.sh/@codemirror/lint@6.8.1';
import{StreamLanguage}from'https://esm.sh/@codemirror/language@6.10.3';

// ─── Global state ───
const S={
  fs:{},          // virtual FS: path -> {content,modified,type}
  proj:'default', // current project slug
  projects:{},    // slug -> {name,settings}
  openTabs:[],    // array of paths
  activeTab:null, // current path
  dirty:{},       // path -> bool
  consoleClosed:false,
  pyodide:null,
  pyodideLoading:false,
  plugins:{},     // id -> plugin obj
  pluginCode:{},  // id -> source code
  settings:{theme:'dark',fs:14,font:"'Fira Code',monospace",tab:2,wrap:false,runCmd:''},
  sortables:[],
  isMobile:()=>window.innerWidth<768,
};

const LS_PREFIX=()=>`ide:${S.proj}:`;
function lsGet(k){try{return localStorage.getItem(k)}catch(e){return null}}
function lsSet(k,v){try{localStorage.setItem(k,v)}catch(e){
  if(e.name==='QuotaExceededError'){showDialog({title:'Storage Full',body:'<p style="margin-bottom:12px">localStorage is full. Delete old projects or download a backup.</p>',buttons:[{label:'Download backup',cls:'btn accent',cb:()=>exportProject()},{label:'Cancel',cls:'btn',cb:()=>closeDialog()}]});}
}}

// ─── Debounce helper ───
function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms)}}

// ─── FS operations ───
function fsKey(){return LS_PREFIX()+'fs'}
function settKey(){return LS_PREFIX()+'settings'}
const saveFS=debounce(()=>{lsSet(fsKey(),JSON.stringify(S.fs))},500);
function loadFS(){
  try{const d=lsGet(fsKey());if(d)S.fs=JSON.parse(d);else S.fs={'index.html':{content:'<!DOCTYPE html>\n<html>\n<head><title>Hello</title></head>\n<body>\n<h1>Hello, BrowserIDE!</h1>\n</body>\n</html>',modified:Date.now(),type:'file'}}}
  catch(e){consolePrint('FS load error: '+e.message,'error');S.fs={};showToast('FS corrupted — reset to empty')}
}
function saveSettings(){lsSet(settKey(),JSON.stringify(S.settings))}
function loadSettings(){try{const d=lsGet(settKey());if(d)Object.assign(S.settings,JSON.parse(d))}catch(e){}}

// ─── Project management ───
const PROJS_KEY='ide:projects';
function loadProjects(){
  try{const d=lsGet(PROJS_KEY);if(d)S.projects=JSON.parse(d);}
  catch(e){S.projects={}}
  if(!Object.keys(S.projects).length){S.projects={default:{name:'My Project',settings:{}}};saveProjects();}
}
function saveProjects(){lsSet(PROJS_KEY,JSON.stringify(S.projects))}
function getSlug(name){return name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'project'}
function switchProject(slug){
  if(!S.projects[slug])return;
  const u=new URL(location.href);u.searchParams.set('p',slug);history.pushState({},'',u);
  S.proj=slug;S.openTabs=[];S.activeTab=null;S.dirty={};
  loadFS();loadSettings();applySettings();renderTree();renderTabs();
  document.getElementById('proj-label').textContent=S.projects[slug].name;
  closeAll();
}
function createProject(name){
  const slug=getSlug(name);
  S.projects[slug]={name,settings:{}};
  saveProjects();
  S.proj=slug;S.fs={};S.openTabs=[];S.activeTab=null;S.dirty={};S.settings={theme:'dark',fs:14,font:"'Fira Code',monospace",tab:2,wrap:false,runCmd:''};
  saveFS();saveSettings();
  switchProject(slug);
}
function deleteProject(slug){
  const keys=Object.keys(localStorage).filter(k=>k.startsWith(`ide:${slug}:`));
  keys.forEach(k=>localStorage.removeItem(k));
  delete S.projects[slug];saveProjects();
  const remaining=Object.keys(S.projects);
  if(remaining.length)switchProject(remaining[0]);
  else createProject('My Project');
}
function renameProject(slug,name){
  const newSlug=getSlug(name);
  if(newSlug===slug){S.projects[slug].name=name;saveProjects();document.getElementById('proj-label').textContent=name;return;}
  const keys=Object.keys(localStorage).filter(k=>k.startsWith(`ide:${slug}:`));
  keys.forEach(k=>{const nk=k.replace(`ide:${slug}:`,`ide:${newSlug}:`);lsSet(nk,localStorage.getItem(k));localStorage.removeItem(k)});
  S.projects[newSlug]={...S.projects[slug],name};
  delete S.projects[slug];saveProjects();
  S.proj=newSlug;
  const u=new URL(location.href);u.searchParams.set('p',newSlug);history.replaceState({},'',u);
  document.getElementById('proj-label').textContent=name;
}

// ─── FS helpers ───
function getAllPaths(){return Object.keys(S.fs).sort()}
function getFolder(path){const i=path.lastIndexOf('/');return i<0?'':path.substring(0,i)}
function getFilename(path){return path.split('/').pop()}
function fileExt(path){const p=path.lastIndexOf('.');return p<0?'':path.substring(p)}
function uniquePath(path){
  if(!S.fs[path])return path;
  const ext=fileExt(path);const base=path.slice(0,path.length-ext.length);
  let i=2;while(S.fs[`${base}_${i}${ext}`])i++;return`${base}_${i}${ext}`;
}
function createFile(path,content=''){
  if(S.fs[path]){const p=uniquePath(path);path=p;}
  S.fs[path]={content,modified:Date.now(),type:'file'};
  saveFS();renderTree();return path;
}
function createFolder(path){
  if(!S.fs[path])S.fs[path]={content:'',modified:Date.now(),type:'folder'};
  saveFS();renderTree();
}
function deleteFile(path){
  delete S.fs[path];
  closeTab(path);saveFS();renderTree();
}
function deleteFolder(path){
  getAllPaths().filter(p=>p===path||p.startsWith(path+'/')).forEach(p=>{delete S.fs[p];closeTab(p)});
  saveFS();renderTree();
}
function renameItem(oldPath,newName){
  const dir=getFolder(oldPath);const newPath=dir?(dir+'/'+newName):newName;
  if(S.fs[newPath]){showToast('Name already exists');return null;}
  getAllPaths().filter(p=>p===oldPath||p.startsWith(oldPath+'/')).forEach(p=>{
    const np=newPath+p.slice(oldPath.length);
    S.fs[np]=S.fs[p];delete S.fs[p];
    if(S.openTabs.includes(p)){const i=S.openTabs.indexOf(p);S.openTabs[i]=np;if(S.activeTab===p)S.activeTab=np;}
  });
  saveFS();renderTree();renderTabs();return newPath;
}
function moveItem(srcPath,destFolder){
  const name=getFilename(srcPath);
  const newPath=destFolder?(destFolder+'/'+name):name;
  if(S.fs[newPath]){showToast('Destination already exists');return;}
  getAllPaths().filter(p=>p===srcPath||p.startsWith(srcPath+'/')).forEach(p=>{
    const np=newPath+p.slice(srcPath.length);
    S.fs[np]=S.fs[p];delete S.fs[p];
    if(S.openTabs.includes(p)){const i=S.openTabs.indexOf(p);S.openTabs[i]=np;if(S.activeTab===p)S.activeTab=np;}
  });
  saveFS();renderTree();renderTabs();
}
function duplicateItem(path){
  const isFolder=S.fs[path]?.type==='folder';
  const ext=isFolder?'':fileExt(path);const base=isFolder?path:(path.slice(0,path.length-ext.length));
  const copyPath=base+'_copy'+ext;const finalPath=uniquePath(copyPath);
  if(isFolder){
    getAllPaths().filter(p=>p===path||p.startsWith(path+'/')).forEach(p=>{
      const np=finalPath+p.slice(path.length);S.fs[np]={...S.fs[p],modified:Date.now()};
    });
  } else {S.fs[finalPath]={...S.fs[path],modified:Date.now()};}
  saveFS();renderTree();return finalPath;
}
function getItemInfo(path){
  const item=S.fs[path];if(!item)return null;
  const isFolder=item.type==='folder';
  if(isFolder){
    const children=getAllPaths().filter(p=>p!==path&&p.startsWith(path+'/'));
    const size=children.reduce((a,p)=>(a+(S.fs[p]?.content?.length||0)),0);
    return{name:getFilename(path),path,type:'folder',fileCount:children.length,size};
  }
  return{name:getFilename(path),path,type:fileExt(path)||'file',size:item.content?.length||0,modified:new Date(item.modified).toLocaleString()};
}

// ─── Download helpers ───
function downloadFile(path){

async function downloadFolder(path){

    if(S.fs[p].type!=='folder')zip.file(p.slice(path.length+1)||getFilename(p),S.fs[p].content||'');

async function exportProject(){

async function importZipIntoProject(file,projName){
  const zip=await JSZip.loadAsync(file);
  const slug=getSlug(projName);
  S.projects[slug]={name:projName,settings:{}};saveProjects();

// ─── File icons ───
function fileIcon(path,type){
  if(type==='folder')return'📁';
  const ext=fileExt(path);
  return{'.js':'🟨','.ts':'🟦','.html':'🌐','.css':'🎨','.py':'🐍','.json':'{}','.md':'📝','.txt':'📄','.zip':'🗜','.png':'🖼','.jpg':'🖼','.gif':'🖼','.svg':'🖼'}[ext]||'📄';
}

// ─── Tree rendering ───
function buildTree(paths){
  const tree={};
  paths.forEach(p=>{
    const parts=p.split('/');let node=tree;
    parts.forEach((part,i)=>{if(!node[part])node[part]={__isDir:i<parts.length-1,__path:parts.slice(0,i+1).join('/'),__children:{}};node=node[part].__children;});
  });
  return tree;
}
const expandedFolders=new Set();
function renderTreeNode(node,container,level=0){
  Object.keys(node).sort((a,b)=>{
    const aD=node[a].__isDir,bD=node[b].__isDir;
    if(aD!==bD)return bD?1:-1;return a.localeCompare(b);
  }).forEach(name=>{
    const item=node[name];const path=item.__path;const isDir=item.__isDir||S.fs[path]?.type==='folder';
    const div=document.createElement('div');div.className='tree-item';div.dataset.path=path;div.dataset.type=isDir?'folder':'file';
    div.style.paddingLeft=(8+level*14)+'px';
    const icon=document.createElement('span');icon.textContent=isDir?(expandedFolders.has(path)?'▾':'▸')+' '+fileIcon(path,'folder'):fileIcon(path,'file');icon.style.flexShrink=0;
    const nameSpan=document.createElement('span');nameSpan.className='name';nameSpan.textContent=name;
    div.appendChild(icon);div.appendChild(nameSpan);
    if(S.activeTab===path&&!isDir)div.classList.add('active');
    div.addEventListener('click',e=>{
      if(isDir){if(expandedFolders.has(path))expandedFolders.delete(path);else expandedFolders.add(path);renderTree();}
      else openTab(path);
      closeAll();
    });
    div.addEventListener('dblclick',e=>{e.preventDefault();startInlineRename(div,nameSpan,path)});
    div.addEventListener('contextmenu',e=>{e.preventDefault();if(S.isMobile())showBottomSheet(path,isDir);else showCtxMenu(e,path,isDir)});
    let pressTimer;
    div.addEventListener('touchstart',e=>{pressTimer=setTimeout(()=>{e.preventDefault();showBottomSheet(path,isDir)},600)},{passive:false});
    div.addEventListener('touchend',()=>clearTimeout(pressTimer));
    container.appendChild(div);
    if(isDir&&expandedFolders.has(path)){
      const childDiv=document.createElement('div');childDiv.className='folder-children';
      renderTreeNode(item.__children,childDiv,level+1);
      container.appendChild(childDiv);
    }
  });
}
function renderTree(){
  const tree=buildTree(getAllPaths());
  ['file-tree','mob-file-tree'].forEach(id=>{
    const el=document.getElementById(id);if(!el)return;
    el.innerHTML='';renderTreeNode(tree,el);
    initSortable(el);
  });
}
function initSortable(el){
  if(el._sortable){el._sortable.destroy();}
  el._sortable=Sortable.create(el,{group:'tree',animation:100,handle:'.tree-item',fallbackOnBody:true,swapThreshold:.5,
    onEnd(evt){
      const srcPath=evt.item.dataset.path;
      let destEl=evt.item.parentElement.closest('.folder-children');
      let destFolder='';
      if(destEl){const prev=destEl.previousElementSibling;if(prev&&prev.dataset.path)destFolder=prev.dataset.path;}
      if(srcPath&&srcPath!==destFolder)moveItem(srcPath,destFolder);
    }
  });
}

// ─── Inline rename ───
function startInlineRename(div,nameSpan,path){
  const oldName=getFilename(path);
  const input=document.createElement('input');input.className='rename';input.value=oldName;
  nameSpan.replaceWith(input);input.focus();input.select();
  const finish=()=>{
    const newName=input.value.trim();
    if(newName&&newName!==oldName)renameItem(path,newName);
    else renderTree();
  };
  input.addEventListener('blur',finish);
  input.addEventListener('keydown',e=>{if(e.key==='Enter')finish();if(e.key==='Escape')renderTree();});
}

// ─── Tabs ───
function openTab(path){
  if(!S.fs[path]||S.fs[path].type==='folder')return;

  S.activeTab=path;renderTabs();loadFileIntoEditor(path);
}
function closeTab(path){
  S.openTabs=S.openTabs.filter(p=>p!==path);delete S.dirty[path];
  if(S.activeTab===path){S.activeTab=S.openTabs[S.openTabs.length-1]||null;if(S.activeTab)loadFileIntoEditor(S.activeTab);}

  const c=document.getElementById('tabs-container');c.innerHTML='';

    tab.innerHTML=`<span style="font-size:14px">${fileIcon(path,'file')}</span><span style="overflow:hidden;text-overflow:ellipsis">${getFilename(path)}</span><span class="tab-dot"></span><span class="tab-close" data-path="${path}">×</span>`;
    tab.addEventListener('click',e=>{if(!e.target.classList.contains('tab-close'))openTab(path)});

// ─── CodeMirror ───
const langMap={
  '.js':javascript,'.ts':javascript,'.jsx':javascript,'.tsx':javascript,
  '.html':html,'.htm':html,'.css':css,'.py':python,'.json':json,'.md':markdown
};
const wrapComp=new Compartment();
const tabComp=new Compartment();
const langComp=new Compartment();
let editorView=null;
let ignoreNextChange=false;
function initEditor(){
  const startState=EditorState.create({
    doc:'// Welcome to BrowserIDE\n// Open or create a file to start',
    extensions:[
      lineNumbers(),highlightActiveLine(),highlightActiveLineGutter(),drawSelection(),dropCursor(),
      history(),indentOnInput(),bracketMatching(),closeBrackets(),
      autocompletion(),highlightSelectionMatches(),
      keymap.of([...defaultKeymap,...historyKeymap,...closeBracketsKeymap,...completionKeymap,...searchKeymap,...foldKeymap,
        indentWithTab,
        {key:'Ctrl-Enter',run:()=>{runCurrentFile();return true}},
        {key:'Ctrl-s',run:()=>{saveCurrentFile();return true}},
        {key:'Ctrl-b',run:()=>{toggleSidebar();return true}},
        {key:'Ctrl-j',run:()=>{toggleConsole();return true}},
      ]),
      langComp.of([]),wrapComp.of(EditorView.lineWrapping),
      oneDark,
      tabComp.of(EditorState.tabSize.of(2)),
      EditorView.updateListener.of(update=>{
        if(update.docChanged&&!ignoreNextChange&&S.activeTab){
          S.dirty[S.activeTab]=true;
          S.fs[S.activeTab].content=update.state.doc.toString();
          S.fs[S.activeTab].modified=Date.now();
          saveFS();renderTabs();
          if(['.md'].includes(fileExt(S.activeTab)))updateMarkdownPreview();
        }
      }),
      EditorView.theme({'&':{height:'100%'},'& .cm-scroller':{overflow:'auto'}})
    ]
  });
  editorView=new EditorView({state:startState,parent:document.getElementById('editor-mount')});
}
function loadFileIntoEditor(path){
  if(!editorView)return;
  const item=S.fs[path];if(!item||item.type==='folder')return;
  if(item.content?.length>500000){
    showToast('File >500KB — showing first 500KB');
  }
  const ext=fileExt(path);const langFn=langMap[ext];
  ignoreNextChange=true;
  editorView.dispatch({changes:{from:0,to:editorView.state.doc.length,insert:item.content||''},effects:[langComp.reconfigure(langFn?[langFn()]:[]),]});
  ignoreNextChange=false;
  if(ext==='.md'){showMarkdownPreview();}else{hideMarkdownPreview();}
}
function saveCurrentFile(){
  if(S.activeTab&&editorView){
    S.fs[S.activeTab].content=editorView.state.doc.toString();
    S.fs[S.activeTab].modified=Date.now();
    S.dirty[S.activeTab]=false;
    saveFS();renderTabs();showToast('Saved');
  }
}
function applyWrap(on){
  if(editorView)editorView.dispatch({effects:wrapComp.reconfigure(on?EditorView.lineWrapping:[])});
}
function applyTabSize(n){
  if(editorView)editorView.dispatch({effects:tabComp.reconfigure(EditorState.tabSize.of(n))});
}

// ─── HTML Runtime ───
function runHTML(code){
  if(runIframe){runIframe.remove();runIframe=null}
  // Rewrite local src/href to use FS content
  let html=code;
  html=html.replace(/(src|href|url\()=?["']([^"')\s]+)["']/gi,(m,attr,url)=>{
    if(url.startsWith('http')||url.startsWith('data:')||url.startsWith('#'))return m;
    const content=S.fs[url]?.content;if(!content)return m;
    const blob=new Blob([content],[{type:'text/plain'}]);
    const burl=URL.createObjectURL(blob);
    return attr==='url('?`url("${burl}")`:` ${attr}="${burl}"`;
  });
  const frame=document.createElement('iframe');frame.style.display='none';frame.sandbox='allow-scripts allow-same-origin';
  document.body.appendChild(frame);runIframe=frame;
  frame.srcdoc=html;
  consolePrint('▶ Running HTML…','sys');
  // Show preview
  showHTMLPreview(html);
}
function showHTMLPreview(html){
  const pp=document.getElementById('preview-panel');pp.style.display='block';
  document.getElementById('editor-mount').style.width='50%';
  if(!pp._frame||!pp.contains(pp._frame)){const f=document.createElement('iframe');f.style.cssText='width:100%;height:100%;border:none;background:#fff';pp.innerHTML='';pp.appendChild(f);pp._frame=f;}
  pp._frame.srcdoc=html;
}

// ─── Python Runtime (Pyodide) ───
async function loadPyodide(){
  if(S.pyodide)return S.pyodide;
  if(S.pyodideLoading)return null;
  S.pyodideLoading=true;
  document.getElementById('pyodide-progress').style.display='block';
  consolePrint('⏳ Loading Pyodide…','info');
  try{
    const py=await loadPyodideLib();S.pyodide=py;S.pyodideLoading=false;
    document.getElementById('pyodide-progress').style.display='none';
    consolePrint('✅ Pyodide ready','info');return py;
  }catch(e){S.pyodideLoading=false;document.getElementById('pyodide-progress').style.display='none';consolePrint('❌ Pyodide load failed: '+e.message,'error');return null;}
}
function loadPyodideLib(){
  return new Promise((resolve,reject)=>{
    if(window.loadPyodide){resolve(window.loadPyodide({indexURL:'https://cdn.jsdelivr.net/pyodide/v0.25.1/full/'}));return;}
    const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js';
    s.onload=()=>resolve(window.loadPyodide({indexURL:'https://cdn.jsdelivr.net/pyodide/v0.25.1/full/'}));
    s.onerror=()=>reject(new Error('Failed to load Pyodide script'));
    document.head.appendChild(s);
  });
}
async function runPython(code,entryPath){
  const py=await loadPyodide();if(!py){return;}
  // Mount FS
  getAllPaths().filter(p=>S.fs[p].type!=='folder').forEach(p=>{
    try{
      const parts=p.split('/');let dir='/project';
      for(let i=0;i<parts.length-1;i++){dir+='/'+parts[i];try{py.FS.mkdir(dir)}catch(e){}}
      py.FS.writeFile('/project/'+p,S.fs[p].content||'');
    }catch(e){}
  });
  try{py.FS.mkdir('/project')}catch(e){}
  // Redirect stdout/stderr
  py.runPython(`
import sys,io
class _Capture:
  def __init__(self,t):self.t=t
  def write(self,s):
    import js
    js.window.__py_out__(self.t,s)
  def flush(self):pass
sys.stdout=_Capture('log')
sys.stderr=_Capture('error')
sys.path.insert(0,'/project')
`);
  window.__py_out__=(type,msg)=>{if(msg.trim())consolePrint(msg.trimEnd(),type)};
  consolePrint(`▶ Running ${entryPath||'Python'}…`,'sys');
  try{
    await py.runPythonAsync(code);
    // Sync back files Pyodide wrote
    try{
      const listing=py.FS.readdir('/project');
      listing.forEach(name=>{if(name==='.'||name==='..')return;
        try{const c=py.FS.readFile('/project/'+name,{encoding:'utf8'});if(!S.fs[name])S.fs[name]={modified:Date.now(),type:'file'};S.fs[name].content=c;}catch(e){}
      });saveFS();renderTree();
    }catch(e){}
  }catch(e){consolePrint('🐍 '+e.toString(),'error');}
}

// ─── Run file ───
function runFile(path){
  if(!path||!S.fs[path])return;
  const code=S.fs[path].content||'';
  const ext=fileExt(path);
  if(ext==='.py')runPython(code,path);
  else if(ext==='.html'||ext==='.htm')runHTML(code);
  else if(ext==='.js'||ext==='.ts'||ext==='.mjs')runJS(code,path);
  else if(ext==='.md'){showMarkdownPreview();consolePrint('Markdown preview shown','info');}
  else{
    // Try plugins
    const plug=Object.values(S.plugins).find(p=>p.extensions.includes(ext));
    if(plug){
      const snap=Object.fromEntries(Object.entries(S.fs).map(([k,v])=>[k,v.content||'']));
      try{plug.run(snap,path,(msg,t='log')=>consolePrint(msg,t));}
      catch(e){consolePrint('Plugin error: '+e.message,'error');}
    } else consolePrint(`No runtime for ${ext} files`,'warn');
  }
}
function runCurrentFile(){
  if(!S.activeTab){consolePrint('No file open','warn');return;}
  const cmd=S.settings.runCmd?.trim();
  if(cmd){
    const parts=cmd.split(/\s+/);const lang=parts[0];const entryFile=parts[1];
    const ep=entryFile||S.activeTab;
    if(!S.fs[ep]){consolePrint(`Entry file not found: ${ep}`,'error');return;}
    if(lang==='python'||lang==='python3')runPython(S.fs[ep].content||'',ep);
    else if(lang==='node'||lang==='js')runJS(S.fs[ep].content||'',ep);
    else runFile(ep);
  } else runFile(S.activeTab);
}

// ─── Settings apply ───
function applySettings(){
  const s=S.settings;
  document.body.classList.toggle('light',s.theme==='light');
  document.documentElement.style.setProperty('--fs',s.fs+'px');
  document.documentElement.style.setProperty('--font',s.font);
  document.getElementById('theme-toggle').checked=s.theme!=='light';
  document.getElementById('fs-slider').value=s.fs;
  document.getElementById('fs-val').textContent=s.fs;
  document.getElementById('font-sel').value=s.font;
  document.getElementById('tab-sel').value=s.tab;
  document.getElementById('wrap-toggle').checked=!!s.wrap;
  document.getElementById('run-cmd-input').value=s.runCmd||'';
  applyWrap(!!s.wrap);applyTabSize(+s.tab||2);
  // Load non-default font
  if(s.font.includes('JetBrains Mono'))loadFont('JetBrains+Mono');
  else if(s.font.includes('Cascadia Code'))loadFont('Cascadia+Code');
}
function loadFont(name){
  if(document.querySelector(`link[data-font="${name}"]`))return;
  const l=document.createElement('link');l.rel='stylesheet';l.href=`https://fonts.googleapis.com/css2?family=${name}&display=swap`;l.dataset.font=name;document.head.appendChild(l);
}

document.getElementById('theme-toggle').addEventListener('change',e=>{S.settings.theme=e.target.checked?'dark':'light';saveSettings();applySettings()});
document.getElementById('fs-slider').addEventListener('input',e=>{S.settings.fs=+e.target.value;document.getElementById('fs-val').textContent=e.target.value;document.documentElement.style.setProperty('--fs',e.target.value+'px');saveSettings()});
document.getElementById('font-sel').addEventListener('change',e=>{S.settings.font=e.target.value;document.documentElement.style.setProperty('--font',e.target.value);saveSettings();applySettings()});
document.getElementById('tab-sel').addEventListener('change',e=>{S.settings.tab=+e.target.value;applyTabSize(+e.target.value);saveSettings()});
document.getElementById('wrap-toggle').addEventListener('change',e=>{S.settings.wrap=e.target.checked;applyWrap(e.target.checked);saveSettings()});
document.getElementById('run-cmd-input').addEventListener('input',e=>{S.settings.runCmd=e.target.value;saveSettings()});

// ─── Plugins ───
window.__IDE_PLUGINS__={
  _reg:{},
  register(plugin){
    if(!plugin.id||!plugin.run)throw new Error('Invalid plugin: need id and run');
    this._reg[plugin.id]=plugin;S.plugins[plugin.id]=plugin;renderPluginList();consolePrint(`✅ Plugin registered: ${plugin.name}`,'info');
  }
};
function loadPlugins(){
  const d=lsGet('ide:plugins');if(!d)return;
  try{
    const codes=JSON.parse(d);
    Object.entries(codes).forEach(([id,code])=>{
      try{eval(code);S.pluginCode[id]=code;}catch(e){consolePrint(`Plugin ${id} load error: ${e.message}`,'error');}
    });
  }catch(e){}
}
function savePluginCode(id,code){
  const d=lsGet('ide:plugins');let all={};try{if(d)all=JSON.parse(d);}catch(e){}
  all[id]=code;lsSet('ide:plugins',JSON.stringify(all));
}
function removePlugin(id){
  delete S.plugins[id];delete window.__IDE_PLUGINS__._reg[id];
  const d=lsGet('ide:plugins');let all={};try{if(d)all=JSON.parse(d);}catch(e){}
  delete all[id];lsSet('ide:plugins',JSON.stringify(all));renderPluginList();
}
function renderPluginList(){
  const el=document.getElementById('plugin-list');el.innerHTML='';
  Object.values(S.plugins).forEach(p=>{
    const div=document.createElement('div');div.className='plugin-item';
    div.innerHTML=`<span style="font-size:13px">${p.name} <span style="color:var(--text2);font-size:11px">[${p.extensions?.join(',')||''}]</span></span>`;
    const rm=document.createElement('button');rm.className='btn danger';rm.textContent='Remove';rm.style.fontSize='11px';rm.style.padding='2px 6px';
    rm.addEventListener('click',()=>removePlugin(p.id));div.appendChild(rm);el.appendChild(div);
  });
  if(!Object.keys(S.plugins).length)el.innerHTML='<div style="font-size:12px;color:var(--text2);padding:8px 0">No plugins installed</div>';
}
function installPluginCode(code){
  try{eval(code);
    const newIds=Object.keys(window.__IDE_PLUGINS__._reg).filter(id=>S.plugins[id]);
    newIds.forEach(id=>savePluginCode(id,code));
    return true;
  }catch(e){consolePrint('Plugin install error: '+e.message,'error');return false;}
}
document.getElementById('add-plugin-btn').addEventListener('click',()=>{
  showDialog({title:'Add Plugin',body:`<textarea id="dlg-plugin" placeholder="window.__IDE_PLUGINS__.register({...})" style="height:160px;font-family:monospace;font-size:12px"></textarea>`,
    buttons:[{label:'Install',cls:'btn accent',cb:()=>{const code=document.getElementById('dlg-plugin').value;if(!code.includes('register'))return consolePrint('Invalid plugin code','error');if(installPluginCode(code))closeDialog();}},{label:'Cancel',cls:'btn',cb:closeDialog}]});

document.getElementById('add-plugin-url-btn').addEventListener('click',()=>{
  showDialog({title:'Add Plugin by URL',body:`<input id="dlg-url" type="text" placeholder="https://example.com/plugin.js">`,
    buttons:[{label:'Fetch & Install',cls:'btn accent',cb:async()=>{

});

// ─── Project switcher UI ───
function showProjectSwitcher(){
  const c=document.getElementById('bottom-sheet-content');c.innerHTML='';
  const h=document.createElement('div');h.style.cssText='padding:8px 16px;font-size:14px;font-weight:600';h.textContent='Projects';c.appendChild(h);
  Object.entries(S.projects).forEach(([slug,proj])=>{
    const d=document.createElement('div');d.className='bs-item';
    d.innerHTML=`<span style="font-size:18px">${slug===S.proj?'✅':'📁'}</span><span style="flex:1">${proj.name}</span>`;
    if(slug!==S.proj){
      const del=document.createElement('button');del.className='btn danger';del.textContent='Delete';del.style.fontSize='11px';del.style.padding='2px 6px';
      del.addEventListener('click',e=>{e.stopPropagation();closeBS();showDialog({title:'Delete project?',body:`<p>Delete <strong>${proj.name}</strong> permanently?</p>`,buttons:[{label:'Delete',cls:'btn danger',cb:()=>{closeDialog();deleteProject(slug)}},{label:'Cancel',cls:'btn',cb:closeDialog}]})});
      d.appendChild(del);
    }
    const ren=document.createElement('button');ren.className='btn';ren.textContent='⟳';ren.title='Rename';ren.style.fontSize='11px';ren.style.padding='2px 6px';
    ren.addEventListener('click',e=>{e.stopPropagation();closeBS();showDialog({title:'Rename project',body:`<input id="dlg-pname" type="text" value="${proj.name}">`,buttons:[{label:'Rename',cls:'btn accent',cb:()=>{const n=document.getElementById('dlg-pname').value.trim();if(n){closeDialog();renameProject(slug,n);renderSettingsProjList();}}},{label:'Cancel',cls:'btn',cb:closeDialog}]});});
    d.appendChild(ren);
    d.addEventListener('click',()=>{closeBS();if(slug!==S.proj)switchProject(slug)});
    c.appendChild(d);
  });
  const np=document.createElement('div');np.className='bs-item';np.innerHTML=`<span style="font-size:18px">➕</span><span>New Project</span>`;
  np.addEventListener('click',()=>{closeBS();showDialog({title:'New Project',body:`<input id="dlg-pname" type="text" placeholder="Project Name">`,buttons:[{label:'Create',cls:'btn accent',cb:()=>{const n=document.getElementById('dlg-pname').value.trim();if(n){closeDialog();createProject(n);}}},{label:'Cancel',cls:'btn',cb:closeDialog}]},()=>document.getElementById('dlg-pname').focus())});
  c.appendChild(np);
  const exp=document.createElement('div');exp.className='bs-item';exp.innerHTML=`<span style="font-size:18px">⬇</span><span>Export current project as ZIP</span>`;
  exp.addEventListener('click',()=>{closeBS();exportProject()});c.appendChild(exp);
  const imp=document.createElement('div');imp.className='bs-item';imp.innerHTML=`<span style="font-size:18px">📂</span><span>Import .zip as new project</span>`;
  imp.addEventListener('click',()=>{closeBS();document.getElementById('zip-upload').click()});c.appendChild(imp);
  document.getElementById('bottom-sheet').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}

// ─── Init ───
(function init(){
  loadProjects();
  const params=new URLSearchParams(location.search);const slug=params.get('p');
  if(slug&&S.projects[slug])S.proj=slug;
  else{S.proj=Object.keys(S.projects)[0]||'default';}
  loadFS();loadSettings();
  initEditor();
  applySettings();
  renderTree();
  // Open last file or first file
  const allFiles=getAllPaths().filter(p=>S.fs[p].type!=='file'?false:true);
  if(allFiles.length>0)openTab(allFiles[0]);
  document.getElementById('proj-label').textContent=S.projects[S.proj]?.name||S.proj;
  renderPluginList();renderSettingsProjList();
  loadPlugins();
  // Load console state
  if(lsGet('ide:consoleClosed')==='1')toggleConsole();
  consolePrint('🚀 BrowserIDE ready. Open a file or create one to start.','sys');
})();
