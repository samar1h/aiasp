/* ============================= STATE ============================= */

const SAVE_KEY = 'reboot_py_save_v1';
function loadState(){
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if(raw) return JSON.parse(raw);
  } catch(e){}
  return { progress: {}, xp: 0, streak: 0, lastPlayed: null, stats: {} };
}
function saveState(){ localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }
let state = loadState();
if(!state.stats) state.stats = {};

function statKey(sysId, lessonIdx){ return sysId + ':' + lessonIdx; }
function getStat(sysId, lessonIdx){
  const k = statKey(sysId, lessonIdx);
  if(!state.stats[k]) state.stats[k] = { attempts: 0, wrong: 0, hintUsed: false, cleared: false };
  return state.stats[k];
}
function recordAttempt(sysId, lessonIdx, {correct, usedHint, singleShot}={}){
  const s = getStat(sysId, lessonIdx);
  s.attempts += 1;
  if(usedHint) s.hintUsed = true;
  if(correct){ s.cleared = true; }
  else {
    s.wrong += 1;
    if(singleShot) s.cleared = true; // MCQ: one shot only, still "attempted" even if missed
  }
  saveState();
}
/* Score for one lesson: 100 if correct first try with no hint, scaled down for retries/hints/wrong MCQ, 0 if never attempted */
function lessonScore(sysId, lessonIdx){
  const s = state.stats[statKey(sysId, lessonIdx)];
  if(!s || !s.cleared) return 0;
  if(s.wrong > 0 && s.attempts <= 1) return 0; // MCQ answered wrong on its one attempt
  let score = 100;
  score -= Math.min(s.wrong, 4) * 15;   // each wrong attempt costs points
  if(s.hintUsed) score -= 15;
  return Math.max(score, 10); // cleared always worth something
}

function sysProgress(sysId){
  return state.progress[sysId] || 0;
}
function isSysUnlocked(idx){
  if(idx === 0) return true;
  const prev = SYSTEMS[idx-1];
  return sysProgress(prev.id) >= prev.lessons.length;
}
function isSysComplete(sys){
  return sysProgress(sys.id) >= sys.lessons.length;
}
function totalLessons(){ return SYSTEMS.reduce((a,s)=>a+s.lessons.length,0); }
function totalDone(){ return SYSTEMS.reduce((a,s)=>a+Math.min(sysProgress(s.id), s.lessons.length),0); }

  <svg viewBox="0 0 200 240" class="w-28 h-32 mx-auto">

    <g style="${glow('voice')}">
      <rect x="70" y="10" width="60" height="50" rx="10" fill="none" stroke="${c('voice')}" stroke-width="3"/>
      <circle cx="88" cy="35" r="4" fill="${c('sensors')}" style="${glow('sensors')}"/>
      <circle cx="112" cy="35" r="4" fill="${c('sensors')}" style="${glow('sensors')}"/>

      <path d="M135 95L165 130L160 155" fill="none" stroke="${c('arms')}" stroke-width="3" stroke-linecap="round"/>

}

/* ============================= NAV ============================= */

let activeSys = null;
let activeLessonIdx = 0;

const app = document.getElementById('app');

function go(view, opts={}){
  currentView = view;
  if(opts.sys !== undefined) activeSys = opts.sys;
  if(opts.lessonIdx !== undefined) activeLessonIdx = opts.lessonIdx;
  render();
  window.scrollTo(0,0);
}

function advanceLesson(sys){
  const key = sys.id;
  const wasAlreadyComplete = isSysComplete(sys);
  state.progress[key] = Math.max(sysProgress(key), activeLessonIdx+1);
  state.xp += 10;
  state.streak = (state.streak||0)+1;
  saveState();
  const wasLast = activeLessonIdx+1 >= sys.lessons.length;
  const justCompletedSystem = wasLast && !wasAlreadyComplete;
  const allNowComplete = SYSTEMS.every(s=>isSysComplete(s));

  if(justCompletedSystem){
    confetti({ particleCount: 90, spread: 75, origin:{y:0.6}, colors:['#00FF9C','#7DF9FF','#FFB800'] });
  }
  setTimeout(()=>{
    if(wasLast){
      if(justCompletedSystem && allNowComplete){
        go('home');
        setTimeout(()=>showRobotCompleteOverlay(), 350);
      } else if(justCompletedSystem){
        go('home');
        setTimeout(()=>showSystemOnlineOverlay(sys), 350);
      } else {
        go('home');
      }
    }
    else { go('lesson', { sys: activeSys, lessonIdx: activeLessonIdx+1 }); }
  }, wasLast ? 1400 : 250);
}

function runCode(sys, lesson, getHintUsed){
  const src = cmEditor.getValue();
  const outputEl = document.getElementById('output');
  let out = '';
  Sk.configure({
    output: (t)=> out += t,
    read: (f)=> {
      if(Sk.builtinFiles === undefined || Sk.builtinFiles["files"][f] === undefined) throw "File not found: '" + f + "'";
      return Sk.builtinFiles["files"][f];
    }
  });
  Sk.misceval.asyncToPromise(()=>Sk.importMainWithBody("<stdin>", false, src, true))
    .then(()=>{
      const passed = lesson.check(out, src);
      recordAttempt(sys.id, activeLessonIdx, { correct: passed, usedHint: getHintUsed() });
      renderRunResult(outputEl, out, passed, sys, lesson);
    })
    .catch(err=>{
      recordAttempt(sys.id, activeLessonIdx, { correct: false, usedHint: getHintUsed() });
      renderRunResult(outputEl, out, false, sys, lesson, err.toString());
    });
}

function renderRunResult(outputEl, out, passed, sys, lesson, errMsg){
  if(errMsg){
    outputEl.innerHTML = `
      <div class="rounded-lg border border-amber/40 bg-amber/5 p-3 text-xs">
        <div class="text-amber font-semibold mb-1">ERROR</div>
        <pre class="allow-select whitespace-pre-wrap text-amber/90">${escapeHtml(errMsg)}</pre>
      </div>`;
  } else {
    outputEl.innerHTML = `
      <div class="rounded-lg border ${passed?'border-reactor/40 bg-reactor/5':'border-line bg-bg'} p-3 text-xs">
        <div class="${passed?'text-reactor':'text-dim'} font-semibold mb-1">OUTPUT</div>
        <pre class="allow-select whitespace-pre-wrap ${passed?'text-ink':'text-ink/70'}">${escapeHtml(out) || '(no output)'}</pre>
        ${passed ? `<div class="mt-2 text-reactor font-semibold">✓ ${escapeHtml(lesson.success)}</div>` : `<div class="mt-2 text-dim">Not quite the expected result yet — try again.</div>`}
      </div>`;
  }
  const cont = document.getElementById('continueBtn');
  if(passed){
    cont.disabled = false;
    cont.className = 'btn-press w-full mt-4 rounded-xl bg-reactor text-bg font-bold py-3.5 text-sm tracking-wide';
    cont.textContent = 'CONTINUE';
    cont.onclick = ()=>advanceLesson(sys);
  }
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function buildReportData(){
  let totalScore = 0, maxScore = 0, attemptedCount = 0;
  const perSystem = SYSTEMS.map(sys=>{
    let sysScore = 0, sysMax = 0, weak = [];
    sys.lessons.forEach((lesson, idx)=>{
      const s = state.stats[statKey(sys.id, idx)];
      sysMax += 100;
      if(s && s.cleared){
        attemptedCount++;
        const sc = lessonScore(sys.id, idx);
        sysScore += sc;
        if(sc < 85){
          weak.push({
            label: lesson.type === 'mcq' ? lesson.q.split('\n')[0].slice(0,60) : (lesson.type==='code' ? lesson.prompt.slice(0,60) : lesson.title),
            score: sc, wrong: s.wrong, hintUsed: s.hintUsed, type: lesson.type
          });
        }
      }
    });
    totalScore += sysScore; maxScore += sysMax;
    return { sys, sysScore, sysMax, pct: sysMax ? Math.round((sysScore/sysMax)*100) : 0, weak };
  });
  const overallPct = maxScore ? Math.round((totalScore/maxScore)*100) : 0;
  return { perSystem, overallPct, totalScore, maxScore, attemptedCount, totalLessons: totalLessons() };
}

function reportShareText(data){
  let lines = [];

  lines.push('');
  data.perSystem.forEach(r=>{
    lines.push(`${r.sys.name}: ${r.pct}%`);
    r.weak.forEach(w=>{
      lines.push(`  - weak spot (${w.score}%): ${w.label}${w.hintUsed?' [used hint]':''}${w.wrong?` [${w.wrong} wrong attempt(s)]`:''}`);
    });
  });
  return lines.join('\n');
}

      </div>

      <button id="shareBtn" class="btn-press w-full mt-5 rounded-xl bg-reactor text-bg font-bold py-3.5 text-sm tracking-wide">SHARE REPORT</button>
      <button id="copyBtn" class="btn-press w-full mt-2 rounded-xl border border-line text-ink font-semibold py-3 text-xs">COPY AS TEXT</button>
    </div>
  </div>`;

  document.getElementById('backBtn').addEventListener('click', ()=>go('home'));

  document.getElementById('shareBtn').addEventListener('click', async ()=>{
    const text = reportShareText(data);
    if(navigator.share){
      try { await navigator.share({ title: 'REBOOT — Python Progress Report', text }); }
      catch(e){ /* user cancelled share, ignore */ }
    } else {
      try {
        await navigator.clipboard.writeText(text);
        flashToast('Copied to clipboard — no share sheet on this browser.');
      } catch(e){ flashToast('Could not share or copy automatically.'); }
    }
  });

  document.getElementById('copyBtn').addEventListener('click', async ()=>{
    const text = reportShareText(data);
    try {
      await navigator.clipboard.writeText(text);
      flashToast('Report copied to clipboard.');
    } catch(e){ flashToast('Could not copy — clipboard access denied.'); }
  });
}

function flashToast(msg){
  const el = document.createElement('div');
  el.className = 'fixed bottom-6 left-1/2 toast-in z-50 bg-panel2 border border-line rounded-xl px-4 py-2.5 text-xs text-ink shadow-glow';
  el.style.transform = 'translateX(-50%)';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 2400);
}

/* ============================= MAIN RENDER ============================= */

function render(){
  if(currentView === 'home') renderHome();
  else if(currentView === 'lesson') renderLesson();
  else if(currentView === 'terminal') renderTerminal();
  else if(currentView === 'report') renderReport();
}

render();
</script>
</body>
</html>
