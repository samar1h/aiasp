<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🐾 M.Pharm MRA — Syllabus</title>
<style>
  :root {
    --bg: #0f0f11;
    --surface: #1a1a1f;
    --surface2: #22222a;
    --border: #2e2e38;
    --accent: #f5a623;
    --accent2: #e07b00;
    --text: #e8e8ec;
    --muted: #888899;
    --tag: #2a2a35;
    --sem1: #1e3a4a;
    --sem2: #1a3a2a;
    --sem3: #3a2a1e;
    --sem4: #2a1e3a;
    --good: #3aaf6a;
    --radius: 10px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 15px; line-height: 1.55; -webkit-text-size-adjust: 100%; }
  body { min-height: 100vh; padding-bottom: 100px; }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 10px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .paw { font-size: 22px; }
  .app-title { font-size: 17px; font-weight: 700; color: var(--accent); letter-spacing: -0.3px; }
  .app-sub { font-size: 11px; color: var(--muted); }
  .search-wrap { position: relative; }
  .search-wrap input {
    width: 100%; padding: 9px 12px 9px 36px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 20px; color: var(--text); font-size: 14px;
    outline: none; -webkit-appearance: none;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; pointer-events: none; }
  .search-clear {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: var(--muted); color: var(--bg); border: none; border-radius: 50%;
    width: 18px; height: 18px; font-size: 11px; cursor: pointer;
    display: none; align-items: center; justify-content: center;
    font-weight: 700; line-height: 1;
  }
  .search-clear.show { display: flex; }

  /* NAV TABS */
  .nav-tabs {
    display: flex; overflow-x: auto; gap: 6px; padding: 10px 16px 0;
    border-bottom: 1px solid var(--border);
    scrollbar-width: none; background: var(--surface);
    position: sticky; top: 97px; z-index: 99;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex-shrink: 0; padding: 7px 14px; border-radius: 20px 20px 0 0;
    background: transparent; border: 1px solid transparent; border-bottom: none;
    color: var(--muted); font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all .18s; white-space: nowrap;
  }
  .tab-btn.active { background: var(--bg); color: var(--accent); border-color: var(--border); margin-bottom: -1px; }
  .tab-btn:not(.active):hover { color: var(--text); }

  /* CONTENT SECTIONS */
  .section { display: none; padding: 14px 16px; }
  .section.active { display: block; }

  /* SEMESTER PILLS */
  .sem-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .sem-pill {
    padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 13px;
    font-weight: 500; cursor: pointer; transition: all .18s;
  }
  .sem-pill.s1 { border-color: #1e6a8a; }
  .sem-pill.s2 { border-color: #1a6a3a; }
  .sem-pill.s3 { border-color: #6a4a1e; }
  .sem-pill.s4 { border-color: #4a2a6a; }
  .sem-pill.active, .sem-pill:hover { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
  .sem-pill.s1.active, .sem-pill.s1:hover { background: #1e6a8a; color: #fff; border-color: #1e6a8a; }
  .sem-pill.s2.active, .sem-pill.s2:hover { background: #1a6a3a; color: #fff; border-color: #1a6a3a; }
  .sem-pill.s3.active, .sem-pill.s3:hover { background: #6a4a1e; color: #fff; border-color: #6a4a1e; }
  .sem-pill.s4.active, .sem-pill.s4:hover { background: #4a2a6a; color: #fff; border-color: #4a2a6a; }

  /* SUBJECT CARDS */
  .subject-list { display: flex; flex-direction: column; gap: 8px; }
  .subject-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    transition: border-color .18s;
  }
  .subject-card:hover { border-color: var(--accent); }
  .subject-header {
    padding: 13px 15px; cursor: pointer; display: flex; align-items: flex-start; gap: 10px;
    -webkit-tap-highlight-color: transparent;
  }
  .subject-code {
    font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 0.5px;
    background: rgba(245,166,35,0.12); padding: 2px 7px; border-radius: 5px;
    flex-shrink: 0; margin-top: 1px; white-space: nowrap;
  }
  .subject-name { font-size: 15px; font-weight: 600; flex: 1; }
  .subject-type {
    font-size: 11px; color: var(--muted); flex-shrink: 0; margin-top: 2px;
  }
  .chevron { margin-left: auto; font-size: 13px; color: var(--muted); transition: transform .22s; flex-shrink: 0; padding-top: 2px; }
  .subject-card.open .chevron { transform: rotate(180deg); }
  .subject-body { display: none; padding: 0 15px 15px; }
  .subject-card.open .subject-body { display: block; }

  /* META ROW */
  .meta-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; padding-top: 4px; }
  .meta-badge {
    font-size: 11px; padding: 3px 9px; border-radius: 5px;
    background: var(--tag); color: var(--muted); border: 1px solid var(--border);
  }
  .meta-badge.marks { color: var(--good); border-color: #1a4a2a; background: #0f2a18; }

  /* SCOPE / OBJECTIVES */
  .info-block { margin-bottom: 14px; }
  .info-label { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 6px; }
  .info-text { font-size: 13.5px; color: #c8c8d0; line-height: 1.6; }
  .obj-list { padding-left: 0; list-style: none; }
  .obj-list li { font-size: 13px; color: #c0c0cc; padding: 3px 0 3px 18px; position: relative; }
  .obj-list li::before { content: "→"; position: absolute; left: 0; color: var(--accent); }

  /* UNITS */
  .units-section { margin-bottom: 14px; }
  .unit-item { border-left: 2px solid var(--border); padding: 8px 12px; margin-bottom: 8px; border-radius: 0 6px 6px 0; background: var(--surface2); }
  .unit-item:hover { border-left-color: var(--accent); }
  .unit-header { display: flex; align-items: center; gap: 8px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .unit-num { font-size: 10px; font-weight: 700; color: var(--accent); letter-spacing: 0.5px; background: rgba(245,166,35,0.1); padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }
  .unit-title-text { font-size: 13.5px; font-weight: 600; flex: 1; }
  .unit-hrs { font-size: 11px; color: var(--muted); flex-shrink: 0; }
  .unit-chevron { font-size: 11px; color: var(--muted); transition: transform .2s; }
  .unit-item.open .unit-chevron { transform: rotate(180deg); }
  .unit-body { display: none; font-size: 13px; color: #b8b8c4; line-height: 1.6; margin-top: 8px; }
  .unit-item.open .unit-body { display: block; }

  /* REFS */
  .refs-section { margin-top: 10px; }
  .ref-item { font-size: 12.5px; color: #a0a0b0; padding: 5px 0; border-top: 1px solid var(--border); line-height: 1.5; }
  .ref-num { color: var(--accent); font-weight: 600; margin-right: 4px; }
  .website-link { color: #6ab4f5; word-break: break-all; font-size: 12px; }

  /* PRACTICALS */
  .practical-list { list-style: none; }
  .practical-list li { font-size: 13px; color: #b8b8c4; padding: 5px 0 5px 22px; border-top: 1px solid var(--border); position: relative; }
  .practical-list li::before { content: attr(data-n); position: absolute; left: 0; color: var(--accent); font-weight: 700; font-size: 11px; min-width: 18px; }

  /* DIVIDER */
  .divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

  /* MARKS TABLE */
  .marks-table { width: 100%; border-collapse: collapse; font-size: 12.5px; margin-bottom: 10px; }
  .marks-table th { background: var(--tag); color: var(--accent); padding: 7px 9px; text-align: left; font-size: 11px; letter-spacing: 0.3px; }
  .marks-table td { padding: 7px 9px; border-top: 1px solid var(--border); color: var(--text); }
  .marks-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  /* GRADES TABLE */
  .grade-O { color: #f5c842; font-weight: 700; }
  .grade-A { color: #7fc8f8; }
  .grade-B { color: #7af09a; }
  .grade-pass { color: var(--good); }
  .grade-F { color: #f07a7a; }

  /* SEARCH RESULTS */
  .search-results { display: flex; flex-direction: column; gap: 8px; }
  .result-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .result-card:active { background: var(--surface2); }
  .result-sem { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
  .result-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .result-snippet { font-size: 12.5px; color: var(--muted); }
  mark { background: rgba(245,166,35,0.28); color: var(--text); border-radius: 2px; padding: 0 1px; }
  .no-results { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 15px; }
  .no-results .dog { font-size: 40px; display: block; margin-bottom: 10px; }

  /* QUICK REF */
  .quick-grid { display: flex; flex-direction: column; gap: 10px; }
  .quick-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px 15px; }
  .quick-card h3 { font-size: 14px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
  .quick-card p, .quick-card li { font-size: 13px; color: #c0c0cc; line-height: 1.6; }
  .quick-card ul { padding-left: 16px; }
  .quick-card li { margin-bottom: 3px; }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; padding: 8px 0 env(safe-area-inset-bottom, 8px);
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 4px 0; cursor: pointer; color: var(--muted);
    transition: color .18s; -webkit-tap-highlight-color: transparent; border: none; background: none;
  }
  .nav-item.active { color: var(--accent); }
  .nav-icon { font-size: 20px; }
  .nav-label { font-size: 10px; font-weight: 500; }

  /* SWIPE HINT */
  .breadcrumb { font-size: 12px; color: var(--muted); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .bc-sep { opacity: 0.4; }

  /* BACK BTN */
  .back-btn {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 13px; color: var(--accent); margin-bottom: 12px;
    cursor: pointer; border: none; background: none; padding: 4px 0;
    -webkit-tap-highlight-color: transparent;
  }
  .back-btn:hover { opacity: 0.8; }

  /* PROGRESS BAR */
  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 10px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); transition: width .3s; }

  /* ANNOUNCEMENT */
  .announce { background: rgba(245,166,35,0.1); border: 1px solid rgba(245,166,35,0.3); border-radius: 8px; padding: 10px 13px; font-size: 12.5px; color: var(--accent); margin-bottom: 14px; }

  /* FLOATING SEARCH HINT */
  .hint { font-size: 12px; color: var(--muted); text-align: center; padding: 8px; }
</style>
</head>

function renderSubjects(sem) {
  const container = document.getElementById("subjectList");
  const subjects = SEMESTERS[sem].subjects;
  container.innerHTML = subjects.map((sub, idx) => buildSubjectCard(sub, idx)).join("");

}

function buildSubjectCard(sub, idx) {
  const typeClass = sub.type === "Practical" ? "🔬" : sub.type === "Seminar" ? "🗣️" : sub.type === "Research" ? "🧪" : sub.type === "Internal Assessment" ? "📋" : "📖";
  const hasContent = (sub.units && sub.units.length > 0) || (sub.practicals && sub.practicals.length > 0) || sub.scope;
  return `<div class="subject-card" data-idx="${idx}">
    <div class="subject-header" onclick="toggleSubject(this.parentElement)">
      <span class="subject-code">${sub.code}</span>
      <div style="flex:1">
        <div class="subject-name">${sub.name}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">${typeClass} ${sub.type} · ${sub.marks.total} marks${sub.hours ? ' · ' + sub.hours + 'hrs' : ''}</div>
      </div>
      ${hasContent ? '<span class="chevron">▾</span>' : ''}
    </div>
    ${hasContent ? `<div class="subject-body">${buildSubjectBody(sub)}</div>` : ''}
  </div>`;
}

function buildSubjectBody(sub) {
  let html = '';
  
  // Meta badges
  html += `<div class="meta-row">
    <span class="meta-badge">Int: ${sub.marks.internal}M</span>
    <span class="meta-badge">Ext: ${sub.marks.external}M</span>
    <span class="meta-badge marks">Total: ${sub.marks.total}M</span>
    ${sub.hours ? `<span class="meta-badge">${sub.hours} hrs</span>` : ''}
    ${sub.credits && sub.credits !== '-' ? `<span class="meta-badge">${sub.credits} credits</span>` : ''}
  </div>`;
  
  // Scope
  if (sub.scope) {
    html += `<div class="info-block"><div class="info-label">Scope</div><div class="info-text">${sub.scope}</div></div>`;
  }
  
  // Objectives
  if (sub.objectives && sub.objectives.length > 0) {
    html += `<div class="info-block"><div class="info-label">Objectives</div><ul class="obj-list">
      ${sub.objectives.map(o => `<li>${o}</li>`).join("")}
    </ul></div>`;
  }
  
  // Units
  if (sub.units && sub.units.length > 0) {
    html += `<div class="info-label">Units</div><div class="units-section">
      ${sub.units.map((u, ui) => `<div class="unit-item" data-ui="${ui}">
        <div class="unit-header" onclick="toggleUnit(this.parentElement)">
          <span class="unit-num">${u.num}</span>
          <span class="unit-title-text">${u.title}</span>
          ${u.hrs ? `<span class="unit-hrs">${u.hrs}h</span>` : ''}
          <span class="unit-chevron">▾</span>
        </div>
        <div class="unit-body">${u.content}</div>
      </div>`).join("")}
    </div>`;
  }
  
  // Practicals
  if (sub.practicals && sub.practicals.length > 0) {
    html += `<div class="info-label" style="margin-top:10px">Practical Exercises</div>
    <ul class="practical-list" style="margin-top:8px">
      ${sub.practicals.map((p, i) => `<li data-n="${i+1}">${p}</li>`).join("")}
    </ul>`;
  }
  
  // References
  if (sub.refs && sub.refs.length > 0) {
    html += `<hr class="divider">
    <div class="refs-section">
      <div class="info-label">References</div>
      ${sub.refs.map((r, i) => `<div class="ref-item"><span class="ref-num">${i+1}.</span>${r}</div>`).join("")}
    </div>`;
  }
  
  // Websites
  if (sub.websites && sub.websites.length > 0) {
    html += `<div class="refs-section" style="margin-top:6px">
      <div class="info-label">Recommended Websites</div>
      ${sub.websites.map(w => `<div class="ref-item"><span class="website-link">${w}</span></div>`).join("")}
    </div>`;
  }
  
  return html;
}

// ===== SEARCH =====
function performSearch(query) {
  const q = query.trim().toLowerCase();
  if (!q) {
    document.getElementById("searchResults").innerHTML = `<div class="hint">🐾 Type above to search subjects, units, topics, and references</div>`;
    return;
  }
  
  const results = [];
  Object.entries(SEMESTERS).forEach(([sem, semData]) => {
    semData.subjects.forEach(sub => {
      let snippets = [];
      let score = 0;
      const searchable = [sub.name, sub.code, sub.scope || '', ...(sub.objectives||[]), ...(sub.units||[]).flatMap(u=>[u.title, u.content]), ...(sub.refs||[])].join(" ").toLowerCase();
      
      if (sub.name.toLowerCase().includes(q)) { score += 10; snippets.push(highlight(sub.name, q)); }
      if (sub.code.toLowerCase().includes(q)) { score += 8; }
      
      (sub.units||[]).forEach(u => {
        if (u.title.toLowerCase().includes(q)) { score += 6; snippets.push(highlight(u.num + ": " + u.title, q)); }
        if (u.content.toLowerCase().includes(q)) { score += 4; snippets.push(highlight(extractSnippet(u.content, q), q)); }
      });
      
      if (sub.scope && sub.scope.toLowerCase().includes(q)) { score += 3; if (!snippets.length) snippets.push(highlight(extractSnippet(sub.scope, q), q)); }
      (sub.refs||[]).forEach(r => { if (r.toLowerCase().includes(q)) { score += 2; snippets.push("Ref: " + highlight(extractSnippet(r, q), q)); } });
      (sub.practicals||[]).forEach(p => { if (p.toLowerCase().includes(q)) { score += 3; snippets.push(highlight(p, q)); } });
      
      if (score > 0) {
        results.push({ sem: semData.label, sub, semNum: parseInt(sem), snippet: snippets[0] || '', score });
      }
    });
  });
  
  results.sort((a, b) => b.score - a.score);
  
  const container = document.getElementById("searchResults");
  if (!results.length) {
    container.innerHTML = `<div class="no-results"><span class="dog">🐶</span>No results for "<b>${escHTML(query)}</b>"<br><span style="font-size:13px;color:var(--muted)">Try a different keyword</span></div>`;
    return;
  }
  
  container.innerHTML = results.map(r => `
    <div class="result-card" onclick="goToSubject(${r.semNum}, '${escHTML(r.sub.code)}')">
      <div class="result-sem">${r.sem} · ${r.sub.code}</div>
      <div class="result-name">${r.sub.name}</div>
      ${r.snippet ? `<div class="result-snippet">${r.snippet}</div>` : ''}
    </div>`).join("");
}

function highlight(text, q) {
  const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp('(' + escaped + ')', 'gi'), '<mark>$1</mark>');
}

function extractSnippet(text, q) {
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if (idx === -1) return text.substring(0, 80) + "…";
  const start = Math.max(0, idx - 30);
  const end = Math.min(text.length, idx + q.length + 50);
  return (start > 0 ? "…" : "") + text.substring(start, end) + (end < text.length ? "…" : "");
}

function escHTML(s) { return s.replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function goToSubject(semNum, code) {
  // Switch to syllabus tab, select semester, open subject
  switchNav("syllabus");
  currentSem = semNum;
  document.querySelectorAll(".sem-pill").forEach(p => p.classList.toggle("active", p.dataset.sem == semNum));
  renderSubjects(semNum);
  setTimeout(() => {
    const cards = document.querySelectorAll(".subject-card");
    cards.forEach(card => {
      const codeEl = card.querySelector(".subject-code");
      if (codeEl && codeEl.textContent.trim() === code.trim()) {
        if (!card.classList.contains("open")) toggleSubject(card);
        card.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    });
  }, 80);
  // Clear search
  document.getElementById("searchInput").value = "";
  document.getElementById("searchClear").classList.remove("show");
}

// ===== NAVIGATION =====
function switchNav(nav) {
  currentNav = nav;
  document.querySelectorAll(".nav-item").forEach(b => b.classList.toggle("active", b.dataset.nav === nav));
  
  const sections = { syllabus: "syllabusSection", search: "searchSection", refs: "refsSection", quick: "quickSection" };
  Object.entries(sections).forEach(([key, id]) => {
    const el = document.getElementById(id);
    el.style.display = key === nav ? "block" : "none";
    el.classList.toggle("active", key === nav);
  });
  
  if (nav === "refs" && !document.getElementById("refsBySubject").innerHTML) renderRefs();
  if (nav === "quick" && !document.getElementById("quickGrid").innerHTML) renderQuick();
  if (nav === "search") {
    setTimeout(() => document.getElementById("searchInput").focus(), 100);
  }
  window.scrollTo(0, 0);
}

// ===== INIT =====
document.addEventListener("DOMContentLoaded", () => {
  renderSubjects(1);
  
  // Sem pills
  document.getElementById("semPills").addEventListener("click", e => {
    const pill = e.target.closest(".sem-pill");
    if (!pill) return;
    document.querySelectorAll(".sem-pill").forEach(p => p.classList.remove("active"));
    pill.classList.add("active");
    currentSem = parseInt(pill.dataset.sem);
    renderSubjects(currentSem);
  });
  
  // Bottom nav
  document.querySelectorAll(".nav-item").forEach(btn => {
    btn.addEventListener("click", () => switchNav(btn.dataset.nav));
  });
  
  // Search
  const searchInput = document.getElementById("searchInput");
  const searchClear = document.getElementById("searchClear");
  
  searchInput.addEventListener("input", e => {
    const val = e.target.value;
    searchClear.classList.toggle("show", val.length > 0);
    
    if (val.trim() && currentNav !== "search") {
      switchNav("search");
    }
    
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => performSearch(val), 250);
  });
  
  searchInput.addEventListener("focus", () => {
    if (currentNav !== "search") switchNav("search");
    if (!searchInput.value.trim()) {
      document.getElementById("searchResults").innerHTML = `<div class="hint">🐾 Type above to search subjects, units, topics, and references</div>`;
    }
  });
  
  searchClear.addEventListener("click", () => {
    searchInput.value = "";
    searchClear.classList.remove("show");
    document.getElementById("searchResults").innerHTML = `<div class="hint">🐾 Type above to search subjects, units, topics, and references</div>`;
    switchNav("syllabus");
  });
});
