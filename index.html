<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AI Assisted Projects</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'card-bg': '#1e1f28',
                        'surface': '#2a2b36',
                    }
                }
            }
        }
    </script>
    <!-- Font Awesome 6 FREE (Solid + Brands only, Regular requires PRO or different setup) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- js-yaml -->
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0f0f14;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }
        @media (hover: hover) {
            .card-hover:hover {
                transform: translateY(-2px);
                transition: all 0.2s ease;
                background-color: #2d2e3a;
            }
        }
        .card-hover {
            transition: all 0.2s ease;
        }
        .loader {
            border: 3px solid #2a2b36;
            border-top: 3px solid #8b5cf6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        input:focus {
            outline: none;
            ring: 2px solid #8b5cf6;
            border-color: #8b5cf6;
        }
        /* Fix for line-clamp (Tailwind doesn't include by default via CDN) */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-[#0f0f14] text-gray-200 antialiased">
    <main class="max-w-3xl mx-auto px-4 py-6 pb-20">
        <div class="relative mb-6">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
            <input type="text" id="searchInput" placeholder="Search projects..." 
                   class="w-full bg-[#1e1f28] border border-gray-700 rounded-2xl py-3.5 pl-11 pr-4 text-base text-gray-200 placeholder:text-gray-500 focus:border-purple-500/70 transition-all">
        </div>
        <div id="cardsContainer" class="space-y-3">
            <div class="loader"></div>
        </div>
    </main>

    <script>
        const YAML_PATH = 'projects.yml';
        let projects = [];
        let renderTimeout = null;

        // Mapping from simple icon names to Font Awesome solid icons
        function getIconClass(iconName) {
            // If it's already a full FA class (starts with fa-)
            if (iconName && iconName.startsWith('fa-')) {
                // Convert fa-regular to fa-solid if needed
                let fixed = iconName.replace('fa-regular', 'fa-solid');
                // Ensure fa-solid is present
                if (!fixed.includes('fa-solid')) {
                    fixed = 'fa-solid ' + fixed;
                }
                return fixed;
            }
            
            // Default icon mapping based on keywords
            const iconMap = {
                'link': 'fa-solid fa-link',
                'url': 'fa-solid fa-link',
                'code': 'fa-solid fa-code',
                'terminal': 'fa-solid fa-terminal',
                'json': 'fa-solid fa-brackets-curly',
                'database': 'fa-solid fa-database',
                'folder': 'fa-solid fa-folder',
                'file': 'fa-solid fa-file',
                'image': 'fa-solid fa-image',
                'video': 'fa-solid fa-video',
                'music': 'fa-solid fa-music',
                'settings': 'fa-solid fa-gear',
                'user': 'fa-solid fa-user',
                'home': 'fa-solid fa-house',
                'download': 'fa-solid fa-download',
                'upload': 'fa-solid fa-upload',
                'copy': 'fa-solid fa-copy',
                'paste': 'fa-solid fa-paste',
                'save': 'fa-solid fa-floppy-disk',
                'delete': 'fa-solid fa-trash',
                'edit': 'fa-solid fa-pen',
                'add': 'fa-solid fa-plus',
                'remove': 'fa-solid fa-minus',
                'check': 'fa-solid fa-check',
                'close': 'fa-solid fa-xmark',
                'warning': 'fa-solid fa-triangle-exclamation',
                'info': 'fa-solid fa-circle-info',
                'help': 'fa-solid fa-circle-question',
                'calendar': 'fa-solid fa-calendar',
                'clock': 'fa-solid fa-clock',
                'location': 'fa-solid fa-location-dot',
                'email': 'fa-solid fa-envelope',
                'phone': 'fa-solid fa-phone',
                'lock': 'fa-solid fa-lock',
                'unlock': 'fa-solid fa-unlock',
                'eye': 'fa-solid fa-eye',
                'eye-slash': 'fa-solid fa-eye-slash',
                'heart': 'fa-solid fa-heart',
                'star': 'fa-solid fa-star',
                'cube': 'fa-solid fa-cube',
                'cubes': 'fa-solid fa-cubes',
                'box': 'fa-solid fa-box',
                'archive': 'fa-solid fa-box-archive'
            };
            
            if (iconName && iconMap[iconName.toLowerCase()]) {
                return iconMap[iconName.toLowerCase()];
            }
            
            // Default fallback
            return 'fa-solid fa-cube';
        }

        async function loadProjects() {
            const container = document.getElementById('cardsContainer');
            try {
                container.innerHTML = `<div class="loader"></div>`;
                
                const response = await fetch(YAML_PATH);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: Could not load projects.yml`);
                }
                const yamlText = await response.text();
                const parsed = jsyaml.load(yamlText);
                
                if (!Array.isArray(parsed)) {
                    throw new Error('YAML root must be an array of projects');
                }
                
                projects = parsed.map((item, idx) => ({
                    id: idx,
                    title: item.title || 'Untitled',
                    description: item.description || 'No description provided',
                    icon: item.icon || null,
                    url: item.url || '#'
                }));
                
                if (projects.length === 0) {
                    container.innerHTML = `<div class="text-center py-12 text-gray-500"><i class="fa-regular fa-folder-open text-3xl mb-2 block"></i> No projects found in YAML.</div>`;
                    return;
                }
                
                renderProjects(projects);
                
            } catch (err) {
                console.error('YAML load error:', err);
                container.innerHTML = `
                    <div class="bg-red-950/30 border border-red-800/50 rounded-2xl p-5 text-center">
                        <i class="fa-solid fa-triangle-exclamation text-red-400 text-2xl mb-2 block"></i>
                        <p class="text-red-300 font-medium">Failed to load projects.yml</p>
                        <p class="text-gray-400 text-xs mt-2">${escapeHtml(err.message)}</p>
                        <p class="text-gray-500 text-xs mt-3">Make sure <span class="font-mono bg-black/30 px-1 rounded">projects.yml</span> exists in the same folder as index.html</p>
                    </div>
                `;
            }
        }
        
        function renderProjects(projectsToRender) {
            const container = document.getElementById('cardsContainer');
            
            if (!projectsToRender.length) {
                container.innerHTML = `<div class="text-center py-12 text-gray-500"><i class="fa-solid fa-magnifying-glass text-3xl mb-2 block"></i> No matching projects</div>`;
                return;
            }
            
            let html = '';
            for (const proj of projectsToRender) {
                let iconHtml = '';
                
                // Case 1: Icon is an image URL
                if (proj.icon && (proj.icon.startsWith('http://') || proj.icon.startsWith('https://') || proj.icon.startsWith('data:'))) {
                    iconHtml = `<img src="${escapeHtml(proj.icon)}" class="w-8 h-8 rounded-full object-cover bg-gray-800 flex-shrink-0" alt="icon" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">`;
                    iconHtml += `<div class="w-8 h-8 rounded-full bg-gray-800 flex items-center justify-center flex-shrink-0 hidden"><i class="fa-solid fa-cube text-purple-400 text-sm"></i></div>`;
                } 
                // Case 2: Icon is a simple name or FA class
                else {
                    let finalIconClass = getIconClass(proj.icon);
                    iconHtml = `<div class="w-8 h-8 rounded-full bg-gray-800 flex items-center justify-center flex-shrink-0"><i class="${finalIconClass} text-purple-400 text-sm"></i></div>`;
                }
                
                html += `
                    <div class="card-hover bg-[#1e1f28] rounded-2xl border border-gray-800 p-4 transition-all duration-200">
                        <a href="${escapeHtml(proj.url)}" target="_blank" rel="noopener noreferrer" class="block">
                            <div class="flex gap-3 items-start">
                                <div class="flex-shrink-0">
                                    ${iconHtml}
                                </div>
                                <div class="flex-1 min-w-0">
                                    <h3 class="font-semibold text-base text-gray-100 truncate">${escapeHtml(proj.title)}</h3>
                                    <p class="text-gray-400 text-sm mt-1 break-words line-clamp-2">${escapeHtml(proj.description)}</p>
                                    <div class="flex items-center gap-1 mt-2 text-xs text-purple-400/70">
                                        <i class="fa-solid fa-arrow-up-right-from-square text-[10px]"></i>
                                        <span>open</span>
                                    </div>
                                </div>
                            </div>
                        </a>
                    </div>
                `;
            }
            container.innerHTML = html;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function filterProjects(searchTerm) {
            if (!searchTerm.trim()) {
                renderProjects(projects);
                return;
            }
            const term = searchTerm.trim().toLowerCase();
            const filtered = projects.filter(proj => 
                proj.title.toLowerCase().includes(term) || 
                proj.description.toLowerCase().includes(term)
            );
            renderProjects(filtered);
        }
        
        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            if (!searchInput) return;
            
            searchInput.addEventListener('input', (e) => {
                if (renderTimeout) clearTimeout(renderTimeout);
                renderTimeout = setTimeout(() => {
                    filterProjects(e.target.value);
                }, 200);
            });
        }
        
        async function init() {
            setupSearch();
            await loadProjects();
        }
        
        init();
    </script>
</body>
</html>
