<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#050508">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Vibe IDE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/theme/dracula.min.css">
<style>
:root{
  --bg:#050508;--s0:#0c0c12;--s1:#13131c;--s2:#1a1a26;--s3:#222230;
  --border:#24243a;--border-hi:#333350;
  --tx:#d4d4e8;--tx2:#7272a0;--tx3:#3e3e60;
  --acc:#7c6bfd;--acc-dim:#5e50d4;--acc-glow:rgba(124,107,253,.12);
  --teal:#3ecfb8;--amber:#e8a230;--red:#f05060;
  --font:'IBM Plex Sans',system-ui,sans-serif;
  --mono:'IBM Plex Mono','Cascadia Code',monospace;
  --r:8px;--t:130ms cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;height:100dvh;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--font);font-size:14px;line-height:1.5}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:radial-gradient(circle,rgba(124,107,253,.06) 1px,transparent 1px);background-size:28px 28px}
button{cursor:pointer;border:none;background:none;color:inherit;font:inherit}
input,textarea{font:inherit;color:var(--tx);background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;width:100%;outline:none;transition:border-color var(--t)}
input:focus,textarea:focus{border-color:var(--acc)}
textarea{resize:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:3px}

/* ─── App shell ─── */
#app{display:flex;flex-direction:column;height:100dvh;position:relative;z-index:1}
#hdr{display:flex;align-items:center;gap:8px;padding:0 12px;height:46px;background:rgba(5,5,8,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);flex-shrink:0;z-index:200}
.logo{font-family:var(--mono);font-weight:600;font-size:12px;color:var(--acc);letter-spacing:.14em;display:flex;align-items:center;gap:6px}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--acc);box-shadow:0 0 7px var(--acc);animation:bpulse 2.4s ease-in-out infinite;flex-shrink:0}
@keyframes bpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:background .2s}
.idle{background:var(--tx3)}.loading{background:var(--amber);animation:bpulse 1s infinite}
.ready{background:var(--teal)}.generating{background:var(--acc);animation:bpulse .8s infinite}.err{background:var(--red)}
.chip{background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:3px 12px;font-size:11px;font-family:var(--mono);color:var(--tx2);white-space:nowrap;transition:all var(--t)}
.chip:hover{border-color:var(--acc);color:var(--acc)}
.sp{flex:1}
.ibtn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:6px;color:var(--tx3);font-size:15px;transition:all var(--t)}
.ibtn:hover{background:var(--s2);color:var(--tx)}

/* project bar */
#pbar{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--s0);border-bottom:1px solid var(--border);flex-shrink:0}
.pname{font-weight:600;font-size:13px;display:flex;align-items:center;gap:4px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pname .arr{color:var(--tx3);font-size:10px}
.pname:hover{color:var(--acc);cursor:pointer}
.pdesc{font-size:11px;color:var(--tx3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* body */
#body{display:flex;flex:1;overflow:hidden;min-height:0}

/* ─── Sidebar ─── */
#sb{width:256px;flex-shrink:0;background:var(--s0);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;position:relative}
#sb-hdr{display:flex;align-items:center;padding:7px 10px;border-bottom:1px solid var(--border);flex-shrink:0;gap:4px}
.sb-title{font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;flex:1}
.sb-act{display:flex;gap:2px}
#ftree{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px}

/* file tree items */
.ft-row{position:relative;display:flex;align-items:center;gap:0;height:28px;cursor:pointer;user-select:none}
.ft-row:hover{background:var(--s1)}
.ft-row.active{background:var(--acc-glow)}
.ft-row.active .ft-nm{color:var(--acc)}
.ft-row.renaming{background:var(--s2)}
.ft-indent{flex-shrink:0}
.ft-arr{width:16px;flex-shrink:0;font-size:9px;color:var(--tx3);text-align:center;transition:transform var(--t)}
.ft-arr.open{transform:rotate(90deg)}
.ft-ic{font-size:13px;flex-shrink:0;width:18px;text-align:center}
.ft-nm{flex:1;font-size:12px;font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:4px}
.ft-sz{font-size:10px;color:var(--tx3);font-family:var(--mono);flex-shrink:0;padding-right:8px}
.ft-acts{display:none;position:absolute;right:0;top:50%;transform:translateY(-50%);background:var(--s1);border-left:1px solid var(--border);padding:0 4px;gap:2px;align-items:center}
.ft-row:hover .ft-acts{display:flex}
.ft-act{width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:4px;font-size:11px;color:var(--tx3)}
.ft-act:hover{background:var(--s3);color:var(--tx)}
.ft-rename-input{flex:1;background:var(--s3);border:1px solid var(--acc);border-radius:4px;padding:1px 6px;font-size:12px;font-family:var(--mono);height:22px;color:var(--tx);width:0}
.ft-empty{padding:20px 16px;text-align:center;color:var(--tx3);font-size:12px;line-height:1.7}
.ft-ctx-eye{width:16px;height:16px;border-radius:3px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--tx3);margin-right:4px;flex-shrink:0;transition:all var(--t)}
.ft-ctx-eye.on{border-color:var(--acc);color:var(--acc);background:var(--acc-glow)}

/* ─── context menu ─── */
#ctx-menu{position:fixed;background:var(--s1);border:1px solid var(--border-hi);border-radius:8px;min-width:170px;z-index:900;box-shadow:0 8px 32px rgba(0,0,0,.6);padding:4px 0;display:none}
#ctx-menu.show{display:block}
.ctx-item{padding:7px 14px;font-size:12px;color:var(--tx);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background var(--t)}
.ctx-item:hover{background:var(--s2)}
.ctx-item.danger{color:var(--red)}
.ctx-sep{height:1px;background:var(--border);margin:4px 0}

/* ─── Main ─── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.mtabs{display:flex;background:var(--s0);border-bottom:1px solid var(--border);flex-shrink:0}
.mtab{padding:9px 18px;font-size:12px;font-weight:500;color:var(--tx2);border-bottom:2px solid transparent;transition:all var(--t);letter-spacing:.02em}
.mtab.active{color:var(--acc);border-bottom-color:var(--acc)}
.mtab:hover:not(.active){color:var(--tx)}
.mpanel{flex:1;display:none;flex-direction:column;overflow:hidden;min-height:0}
.mpanel.active{display:flex}

/* ─── Chat ─── */
#pchat{background:var(--bg)}
#msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.msg{display:flex;flex-direction:column;gap:3px;animation:fadein .15s ease}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.mrole{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em}
.msg.user .mrole{color:var(--acc-dim);text-align:right}
.mbub{padding:10px 14px;border-radius:10px;background:var(--s1);border:1px solid var(--border);max-width:94%;line-height:1.65;font-size:13px;word-break:break-word}
.msg.user .mbub{background:rgba(124,107,253,.08);border-color:rgba(124,107,253,.2);margin-left:auto}
.mbub p{margin:4px 0}
.mbub p:first-child{margin-top:0}.mbub p:last-child{margin-bottom:0}
.mbub pre{background:var(--s0);border:1px solid var(--border);border-radius:6px;padding:10px 12px;overflow-x:auto;margin:8px 0;font-size:12px;font-family:var(--mono);line-height:1.5}
.mbub code{font-family:var(--mono);font-size:12px;background:var(--s0);padding:1px 5px;border-radius:3px}
.mbub pre code{background:none;padding:0}
.mmeta{font-size:10px;color:var(--tx3);font-family:var(--mono)}
.msg.user .mmeta{text-align:right}
.cur{animation:cur .7s step-end infinite}
@keyframes cur{50%{opacity:0}}
.fres{margin-top:8px;padding:8px 11px;background:rgba(62,207,184,.07);border:1px solid rgba(62,207,184,.18);border-radius:7px;font-size:12px;line-height:1.6}
.fres-link{color:var(--teal);cursor:pointer;text-decoration:none;font-family:var(--mono)}
.fres-link:hover{text-decoration:underline}
.ctxbar{height:3px;background:var(--s2);flex-shrink:0}
.ctxfill{height:100%;border-radius:0 2px 2px 0;transition:width .4s,background .4s}
.cinwrap{display:flex;align-items:flex-end;gap:6px;padding:8px 12px;border-top:1px solid var(--border);background:var(--s0);flex-shrink:0;padding-bottom:calc(8px + env(safe-area-inset-bottom,0px))}
.cin{flex:1;min-height:36px;max-height:120px;background:var(--s1);border:1px solid var(--border);border-radius:9px;padding:8px 12px;font-size:13px;resize:none;-webkit-overflow-scrolling:touch;line-height:1.5;transition:border-color var(--t)}
.cin:focus{border-color:var(--acc);outline:none}
.sndbtn{width:34px;height:34px;border-radius:8px;background:var(--acc);color:#fff;font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background var(--t)}
.sndbtn:hover{background:var(--acc-dim)}.sndbtn:disabled{opacity:.35;cursor:default}
.stpbtn{width:34px;height:34px;border-radius:8px;background:var(--red);color:#fff;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stpbtn:hover{opacity:.85}
.perr-btn{padding:4px 9px;border-radius:6px;font-size:11px;color:var(--amber);border:1px solid rgba(232,162,48,.18);flex-shrink:0}
.perr-btn:hover{background:rgba(232,162,48,.07)}
.ctxlbl{font-size:10px;color:var(--tx3);font-family:var(--mono);text-align:right;padding:1px 8px 0}

/* ─── Editor ─── */
#pedit{background:var(--bg)}
.etbar{display:flex;align-items:center;gap:7px;padding:5px 12px;border-bottom:1px solid var(--border);background:var(--s0);flex-shrink:0;flex-wrap:wrap;min-height:38px}
.ebread{font-family:var(--mono);font-size:12px;color:var(--tx2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.langbadge{font-size:10px;font-family:var(--mono);color:var(--tx3);background:var(--s2);padding:2px 6px;border-radius:8px;border:1px solid var(--border)}
.sdot2{width:7px;height:7px;border-radius:50%;display:inline-block;transition:background .3s}
.unsaved{background:var(--amber)}.saved{background:var(--teal)}
.eacts{display:flex;gap:4px;flex-shrink:0}
.btn-sm{padding:4px 10px;border-radius:6px;font-size:11px;background:var(--s2);border:1px solid var(--border);color:var(--tx2);transition:all var(--t);white-space:nowrap}
.btn-sm:hover{border-color:var(--acc);color:var(--acc)}
.btn-acc{background:var(--acc);border-color:var(--acc);color:#fff!important}.btn-acc:hover{background:var(--acc-dim)!important}
.econtainer{flex:1;overflow:hidden}
.econtainer .CodeMirror{height:100%;font-family:var(--mono);font-size:13px;line-height:1.65;background:var(--bg)}
.CodeMirror-scroll{-webkit-overflow-scrolling:touch}
.CodeMirror-gutters{background:var(--s0)!important;border-right:1px solid var(--border)!important}

/* ─── Buttons ─── */
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;transition:all var(--t)}
.btn-primary{background:var(--acc);color:#fff;border:none}.btn-primary:hover{background:var(--acc-dim)}
.btn-ghost{background:var(--s2);color:var(--tx2);border:1px solid var(--border)}.btn-ghost:hover{border-color:var(--acc);color:var(--acc)}
.btn-danger{background:rgba(240,80,96,.12);color:var(--red);border:1px solid rgba(240,80,96,.18)}.btn-danger:hover{background:rgba(240,80,96,.22)}

/* ─── Mobile tabs ─── */
#mobtabs{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(12,12,18,.96);backdrop-filter:blur(14px);border-top:1px solid var(--border);z-index:200;padding-bottom:env(safe-area-inset-bottom,0px)}
.mobtab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px;min-height:52px;color:var(--tx3);font-size:10px;border-top:2px solid transparent;transition:all var(--t)}
.mobtab.active{color:var(--acc);border-top-color:var(--acc)}
.mobtab-ic{font-size:19px;margin-bottom:2px}

/* ─── Overlay / sheets / modals ─── */
#ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:none;backdrop-filter:blur(3px)}
#ov.on{display:block}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid var(--border);border-radius:14px 14px 0 0;z-index:400;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;max-height:88vh;overflow:hidden}
.sheet.on{transform:none}
.shdr{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.stitle{font-weight:600;font-size:14px;flex:1}
.xbtn{width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--tx3);background:var(--s2)}
.xbtn:hover{color:var(--tx);background:var(--s3)}
.modal{position:fixed;inset:0;z-index:500;display:none;align-items:center;justify-content:center;padding:16px}
.modal.on{display:flex}
.mbox{background:var(--s1);border:1px solid var(--border);border-radius:12px;width:100%;max-width:460px}
.mhdr{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border);font-weight:600;font-size:14px}
.mbody{padding:16px;display:flex;flex-direction:column;gap:11px}
.mbody label{display:flex;flex-direction:column;gap:5px;font-size:12px;color:var(--tx2);font-weight:500}
.mfoot{padding:11px 16px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.drawer{position:fixed;top:0;right:0;bottom:0;width:320px;max-width:100%;background:var(--s1);border-left:1px solid var(--border);z-index:400;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.drawer.on{transform:none}
.dcontent{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:14px}

/* ─── Model sheet ─── */
.mlist{overflow-y:auto;flex:1;padding:10px;display:flex;flex-direction:column;gap:7px}
.mcard{background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:11px 13px;transition:border-color var(--t)}
.mcard.active{border-color:var(--teal)}
.mchdr{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.mcname{font-weight:600;font-size:13px;flex:1}
.mbadge{font-size:10px;font-family:var(--mono);padding:2px 6px;border-radius:8px}
.bf{background:rgba(62,207,184,.1);color:var(--teal)}.bb{background:rgba(124,107,253,.1);color:var(--acc)}
.bc{background:rgba(232,162,48,.1);color:var(--amber)}.bl{background:rgba(240,80,96,.1);color:var(--red)}
.bg{background:rgba(62,207,184,.1);color:var(--teal)}.bcode{background:rgba(124,107,253,.15);color:#a89fff}
.mcdesc{font-size:11px;color:var(--tx3);margin-bottom:9px}
.mprog{margin:6px 0 8px}
.mprog-row{display:flex;justify-content:space-between;font-size:10px;font-family:var(--mono);color:var(--tx3);margin-bottom:3px}
.pbar-wrap{height:3px;background:var(--s3);border-radius:2px;overflow:hidden}
.pbar-fill{height:100%;background:var(--acc);border-radius:2px;transition:width .15s}
.gsect{padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0}
.gsect-t{font-size:10px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px}
.slrow{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.sllbl{font-size:11px;color:var(--tx2);width:120px;flex-shrink:0}
.slval{font-size:11px;font-family:var(--mono);color:var(--acc);width:34px;text-align:right;flex-shrink:0}
input[type=range]{flex:1;accent-color:var(--acc);height:3px;cursor:pointer}

/* project list */
.prlist{overflow-y:auto;flex:1;padding:10px;display:flex;flex-direction:column;gap:6px}
.pritem{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:all var(--t)}
.pritem:hover{border-color:var(--acc-dim)}.pritem.cur{border-color:var(--acc);background:var(--acc-glow)}
.prinfo{flex:1;min-width:0}
.prname{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prdate{font-size:10px;color:var(--tx3);margin-top:1px}

/* debug */
.dbrow{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.dbk{color:var(--tx3)}.dbv{font-family:var(--mono);color:var(--tx2)}

/* preview */
#prev-sh{max-height:72vh;height:72vh}

/* toast */
#toast-c{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);z-index:800;display:flex;flex-direction:column;gap:5px;align-items:center;pointer-events:none}
.toast{background:var(--s1);border:1px solid var(--border);border-radius:7px;padding:7px 15px;font-size:12px;white-space:nowrap;pointer-events:auto;box-shadow:0 4px 24px rgba(0,0,0,.5);animation:fadein .15s ease}
.toast-s{border-color:rgba(62,207,184,.28);color:var(--teal)}
.toast-e{border-color:rgba(240,80,96,.28);color:var(--red)}
.toast-i{color:var(--tx2)}

/* welcome */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:14px;text-align:center;padding:28px 20px}
.wt{font-size:20px;font-weight:600}.ws{font-size:12px;color:var(--tx3);max-width:300px;line-height:1.75}
.wsteps{display:flex;flex-direction:column;gap:7px;margin:6px 0}
.wstep{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--tx2);text-align:left}
.wnum{width:20px;height:20px;border-radius:50%;background:var(--acc-glow);border:1px solid rgba(124,107,253,.25);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--acc);font-weight:600;flex-shrink:0}
.chip-sug{background:var(--s2);border:1px solid var(--border);border-radius:16px;padding:6px 14px;font-size:12px;color:var(--tx2);cursor:pointer;transition:all var(--t)}
.chip-sug:hover{border-color:var(--acc);color:var(--acc)}
.wbadge{font-size:11px;color:var(--tx3);border:1px solid var(--border);border-radius:5px;padding:3px 10px}

/* spinner */
.spin{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* responsive */
@media(min-width:768px){
  #mobtabs{display:none!important}
  #sb{display:flex!important}
  .mtabs{display:flex!important}
  #main{display:flex!important}
  #toast-c{bottom:18px}
}
@media(max-width:767px){
  #sb{display:none;width:100%}
  #mobtabs{display:flex}
  .mtabs{display:none!important}
  #body{padding-bottom:calc(54px + env(safe-area-inset-bottom,0px))}
}
</style>
</head>
<body>
<div id="app">
  <header id="hdr">
    <div class="logo"><span class="pulse"></span>VIBE IDE</div>
    <span class="sp"></span>
    <span id="sdot" class="sdot idle"></span>
    <button id="model-btn" class="chip">No model</button>
    <button id="settings-btn" class="ibtn" title="Settings">⚙</button>

<!-- ===== WORKER SOURCE (inert) ===== -->
<script id="wsrc" type="text/x-worker">
self.addEventListener('error',function(e){self.postMessage({type:'error',msg:'Worker crash: '+e.message});e.preventDefault();},true);
self.addEventListener('unhandledrejection',function(e){self.postMessage({type:'error',msg:(e.reason&&e.reason.message)||String(e.reason)});e.preventDefault();});

var HAS_SAB=typeof SharedArrayBuffer!=='undefined';
var THREADS=HAS_SAB?Math.min(navigator.hardwareConcurrency||2,4):1;
var pipe=null,Streamer=null,shouldAbort=false;

async function init(){
  var mod=await import('https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.4.1');
  mod.env.backends.onnx.wasm.numThreads=THREADS;
  mod.env.allowRemoteModels=true;
  mod.env.allowLocalModels=false;
  Streamer=mod.TextStreamer;
  // store pipeline constructor
  self._pipeline=mod.pipeline;
  self.postMessage({type:'ready',threads:THREADS,sab:HAS_SAB});
}
init().catch(function(err){self.postMessage({type:'error',msg:'Init failed: '+err.message});});

self.addEventListener('message',async function(e){
  var msg=e.data;

  if(msg.type==='load'){
    try{
      self.postMessage({type:'load_start',modelId:msg.modelId});
      pipe=await self._pipeline('text-generation',msg.modelId,{
        dtype:msg.dtype||'q4',
        progress_callback:function(info){
          var f=info.file||info.name||'model';
          if(info.status==='progress'){
            self.postMessage({type:'progress',file:f,loaded:info.loaded||0,total:info.total||0,pct:info.progress||0});
          } else if(info.status==='done'){
            self.postMessage({type:'prog_done',file:f});
          } else if(info.status==='initiate'){
            self.postMessage({type:'progress',file:f,loaded:0,total:0,pct:0});
          }
        }
      });
      self.postMessage({type:'loaded',modelId:msg.modelId});
    }catch(err){
      pipe=null;
      self.postMessage({type:'error',msg:'Load failed: '+err.message});
    }
  }

  if(msg.type==='generate'){
    if(!pipe){self.postMessage({type:'error',msg:'No model loaded'});return;}
    shouldAbort=false;
    var count=0,t0=Date.now();
    var streamer=new Streamer(pipe.tokenizer,{
      skip_prompt:true,
      skip_special_tokens:true,
      callback_function:function(text){
        if(shouldAbort) throw new Error('__ABORT__');
        count++;
        var tps=((Date.now()-t0)/1000)>0.1?(count/((Date.now()-t0)/1000)).toFixed(1):'…';
        self.postMessage({type:'token',text:text,tps:tps});
      }
    });
    try{
      await pipe(msg.messages,{
        max_new_tokens:msg.maxTokens||512,
        temperature:msg.temp||0.7,
        top_p:msg.topP||0.9,
        repetition_penalty:msg.repP||1.1,
        do_sample:(msg.temp||0.7)>0,
        streamer:streamer,
        return_full_text:false,
      });
      self.postMessage({type:'done'});
    }catch(err){
      if(err.message==='__ABORT__'||shouldAbort){
        self.postMessage({type:'aborted'});
      } else {
        self.postMessage({type:'error',msg:'Generation: '+err.message});
      }
    }
  }

  if(msg.type==='abort'){
    shouldAbort=true;
  }
});
</script>

  {id:'HuggingFaceTB/SmolLM2-1.7B-Instruct',       name:'SmolLM2 1.7B',        desc:'~1.1 GB · Best general quality · needs 2 GB',badge:'Large',   bc:'bl', dtype:'q4', ctx:8192},

    'https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/css/css.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/htmlmixed/htmlmixed.min.js',
  ],

  markdown:['https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/markdown/markdown.min.js'],

};

// ────────────────────────── STATE ──────────────────────────
var S={
  db:null,worker:null,editor:null,
  project:null,file:null,
  activeTab:'chat',
  modelStatus:'idle',modelId:null,modelCtx:2048,
  generating:false,
  chat:[],   // {role,content}
  pastedErr:'',
  loadedModes:new Set(),
  loadingModelId:null,fileProgress:{},

  expandedFolders:new Set(),
};

// ────────────────────────── VFS (IndexedDB) ──────────────────────────
var DB={
  _r:function(r){return new Promise(function(res,rej){r.onsuccess=function(){res(r.result);};r.onerror=function(){rej(r.error);};});},
  _s:function(name,mode){return S.db.transaction(name,mode||'readonly').objectStore(name);},
  id:function(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);},
  lang:function(path){
    var ext=(path.split('.').pop()||'').toLowerCase();
    return {js:'javascript',ts:'javascript',jsx:'javascript',tsx:'javascript',mjs:'javascript',
            html:'htmlmixed',htm:'htmlmixed',svelte:'htmlmixed',vue:'htmlmixed',
            css:'css',scss:'css',less:'css',
            py:'python',md:'markdown',markdown:'markdown',
            sh:'shell',bash:'shell',zsh:'shell',
            rs:'rust',rb:'plaintext',php:'plaintext',go:'plaintext',
            json:'javascript',jsonc:'javascript',toml:'plaintext',yaml:'plaintext',yml:'plaintext',
            txt:'plaintext',env:'plaintext'}[ext]||'plaintext';
  },
  icon:function(lang,path){
    var ext=(path.split('.').pop()||'').toLowerCase();
    var m={js:'🟨',ts:'🔷',jsx:'⚛',tsx:'⚛',html:'🌐',css:'🎨',scss:'🎨',
           py:'🐍',md:'📝',sh:'🔧',json:'{ }',rs:'🦀',vue:'💚',svelte:'🔸',
           env:'🔑',gitkeep:'👁',txt:'📄'};
    return m[ext]||'📄';
  },

  open:function(){
    var self=this;
    return new Promise(function(res,rej){
      var req=indexedDB.open('VibeIDE',2);
      req.onupgradeneeded=function(e){
        var db=e.target.result;
        if(!db.objectStoreNames.contains('projects')) db.createObjectStore('projects',{keyPath:'id'});
        if(!db.objectStoreNames.contains('files')){
          var fs=db.createObjectStore('files',{keyPath:'id'});
          fs.createIndex('projectId','projectId',{unique:false});
        }
      };
      req.onsuccess=function(e){S.db=e.target.result;res();};
      req.onerror=function(){rej(req.error);};
    });
  },

  createProject:function(name,desc){
    var p={id:this.id(),name:name||'Untitled',description:desc||'',createdAt:Date.now(),updatedAt:Date.now()};
    return this._r(this._s('projects','readwrite').add(p)).then(function(){return p;});
  },
  listProjects:function(){return this._r(this._s('projects').getAll()).then(function(a){return a.sort(function(a,b){return b.updatedAt-a.updatedAt;});});},
  getProject:function(id){return this._r(this._s('projects').get(id));},
  updateProject:function(id,fields){
    var self=this;
    return self.getProject(id).then(function(p){
      if(!p)return null;
      Object.assign(p,fields,{updatedAt:Date.now()});
      return self._r(self._s('projects','readwrite').put(p)).then(function(){return p;});
    });
  },
  deleteProject:function(id){
    var self=this;
    return self.listFiles(id).then(function(files){
      var tx=S.db.transaction('files','readwrite');
      var store=tx.objectStore('files');
      files.forEach(function(f){store.delete(f.id);});
      return new Promise(function(res,rej){tx.oncomplete=res;tx.onerror=rej;});
    }).then(function(){return self._r(self._s('projects','readwrite').delete(id));});
  },

  createFile:function(projectId,path,content){
    var f={id:this.id(),projectId:projectId,path:path,content:content||'',
           language:this.lang(path),createdAt:Date.now(),updatedAt:Date.now()};
    return this._r(this._s('files','readwrite').add(f)).then(function(){return f;});
  },
  readFile:function(id){return this._r(this._s('files').get(id));},
  updateFile:function(id,content){
    var self=this;
    return self.readFile(id).then(function(f){
      if(!f)return null;
      f.content=content;f.updatedAt=Date.now();
      return self._r(self._s('files','readwrite').put(f)).then(function(){return f;});
    });
  },
  renameFile:function(id,newPath){
    var self=this;
    return self.readFile(id).then(function(f){
      if(!f)return null;
      f.path=newPath;f.language=self.lang(newPath);f.updatedAt=Date.now();
      return self._r(self._s('files','readwrite').put(f)).then(function(){return f;});
    });
  },
  deleteFile:function(id){return this._r(this._s('files','readwrite').delete(id));},
  listFiles:function(pid){
    return this._r(this._s('files').index('projectId').getAll(pid));
  },
  getFileByPath:function(pid,path){
    return this.listFiles(pid).then(function(files){return files.find(function(f){return f.path===path;})||null;});
  },
  upsertFile:function(pid,path,content){
    var self=this;
    return self.getFileByPath(pid,path).then(function(existing){
      if(existing){
        var old=existing.content||'';
        return self.updateFile(existing.id,content).then(function(f){f._wasUpdate=true;f._oldLen=old.split('\n').length;return f;});
      }
      return self.createFile(pid,path,content);
    });
  },
};

// ────────────────────────── WORKER ──────────────────────────
function bootWorker(){
  try{
    var code=document.getElementById('wsrc').textContent;
    var blob=new Blob([code],{type:'text/javascript'});
    var url=URL.createObjectURL(blob);
    S.worker=new Worker(url,{type:'module'});
    URL.revokeObjectURL(url);
    S.worker.onmessage=onWMsg;
    S.worker.onerror=function(e){toast('Worker error: '+e.message,'e');setStatus('err');};
  }catch(err){toast('Worker failed: '+err.message,'e');}
}

function onWMsg(e){
  var m=e.data;
  if(m.type==='ready'){setStatus('idle');}
  else if(m.type==='load_start'){S.loadingModelId=m.modelId;S.fileProgress={};setStatus('loading');renderModelSheet();}
  else if(m.type==='progress'){S.fileProgress[m.file]={loaded:m.loaded,total:m.total,pct:m.pct};renderModelSheet();}
  else if(m.type==='prog_done'){if(S.fileProgress[m.file])S.fileProgress[m.file].pct=100;renderModelSheet();}
  else if(m.type==='loaded'){
    S.modelId=m.modelId;S.loadingModelId=null;S.fileProgress={};
    var mod=MODELS.find(function(x){return x.id===m.modelId;});
    S.modelCtx=mod?mod.ctx:2048;
    setStatus('ready');
    q('#model-btn').textContent=mod?mod.name:'Model';
    renderModelSheet();
    toast('Loaded: '+(mod?mod.name:m.modelId),'s');
    closeSheet('model-sh');
  }
  else if(m.type==='token'){onToken(m.text,m.tps);}
  else if(m.type==='done'){onDone(false);}
  else if(m.type==='aborted'){onDone(true);}
  else if(m.type==='error'){onWErr(m.msg);}
}

// ────────────────────────── GENERATION ──────────────────────────
function buildSysPrompt(){
  var p=S.project;
  var sys='You are an expert coding AI in Vibe IDE.\n';
  if(p){sys+='Project: '+p.name+'\n';if(p.description)sys+='Description: '+p.description+'\n';}
  sys+='\nTo create or modify files use EXACTLY this format for each file:\n<<<FILE: path/to/file.ext>>>\n[complete file content here]\n<<<END>>>\n\nAlways write complete file content. Keep explanations brief. Prefer working code.\n';
  // context files
  var ctxFiles=S.files.filter(function(f){return S.ctxFiles.has(f.id);});
  if(!ctxFiles.length) ctxFiles=S.files.slice(0,3);
  var chars=0;var fp='';
  for(var i=0;i<ctxFiles.length;i++){
    var f=ctxFiles[i];
    var snip=(f.content||'').slice(0,1000);
    if(chars+snip.length>4000)break;
    fp+='--- '+f.path+' ---\n'+snip+(f.content&&f.content.length>1000?'\n…[truncated]':'')+'\n\n';
    chars+=snip.length;
  }
  if(fp)sys+='\nProject files:\n'+fp;
  return sys;
}

function buildMsgs(){
  var sys=buildSysPrompt();
  var msgs=[{role:'system',content:sys}];
  S.chat.slice(-12).forEach(function(m){msgs.push({role:m.role,content:m.content});});
  return msgs;
}

function estTokens(msgs){
  return Math.ceil(msgs.reduce(function(a,m){return a+(m.content||'').length;},0)/4);
}

function sendMessage(){
  var inp=q('#cin');
  var txt=inp.value.trim();
  if(!txt||S.generating)return;
  if(!S.project){toast('Create a project first','i');return;}

  if(S.pastedErr){txt='I got this error:\n```\n'+S.pastedErr+'\n```\n\n'+txt;S.pastedErr='';}

  inp.value='';inp.style.height='auto';
  S.chat.push({role:'user',content:txt});
  appendMsg('user',txt);

  var msgs=buildMsgs();
  var est=estTokens(msgs);
  var pct=Math.min(100,Math.round(est/S.modelCtx*100));
  showCtxBar(pct);

  if(!S.modelId){appendMsg('assistant','Please load a model first using the model button in the header.',false);return;}
  doGenerate(msgs);
}

function doGenerate(msgs){
  S.generating=true;S.streamText='';S.lastTps='';
  setStatus('generating');
  q('#send-btn').style.display='none';q('#stop-btn').style.display='flex';
  q('#cin').disabled=true;

  S.streamId='sm'+Date.now();
  appendStreamBubble(S.streamId);

  S.thinkTimer=setTimeout(function(){
    if(S.generating&&!S.streamText){
      var b=q('#'+S.streamId+' .mbub');
      if(b)b.innerHTML='<em style="color:var(--tx3)">Thinking…</em><span class="cur"> ▋</span>';
    }
  },3000);

  S.worker.postMessage({type:'generate',messages:msgs,
    maxTokens:S.gen.maxT,temp:S.gen.temp,topP:S.gen.topP,repP:S.gen.repP});
}

function onToken(text,tps){
  clearTimeout(S.thinkTimer);
  S.streamText+=text;S.lastTps=tps;
  var b=q('#'+S.streamId+' .mbub');
  if(b){b.innerHTML=mdSafe(S.streamText)+'<span class="cur"> ▋</span>';}
  var meta=q('#'+S.streamId+' .mmeta');
  if(meta)meta.textContent=tps+' tok/s';
  var el=q('#msgs');if(el)el.scrollTop=el.scrollHeight;
}

function onDone(aborted){
  clearTimeout(S.thinkTimer);
  S.generating=false;
  setStatus(S.modelId?'ready':'idle');
  q('#send-btn').style.display='flex';q('#stop-btn').style.display='none';
  q('#cin').disabled=false;
  var b=q('#'+S.streamId+' .mbub');
  var meta=q('#'+S.streamId+' .mmeta');
  var final=S.streamText||(aborted?'[Stopped]':'');
  if(b)b.innerHTML=mdSafe(final);
  if(meta)meta.textContent=S.lastTps?S.lastTps+' tok/s':'';
  if(!aborted&&final){
    S.chat.push({role:'assistant',content:final});
    parseApplyFiles(final,S.streamId);
  }
}

function onWErr(msg){
  clearTimeout(S.thinkTimer);
  S.generating=false;
  setStatus('err');
  q('#send-btn').style.display='flex';q('#stop-btn').style.display='none';
  q('#cin').disabled=false;
  var b=S.streamId&&q('#'+S.streamId+' .mbub');
  if(b)b.innerHTML='<span style="color:var(--red)">⚠ '+esc(msg)+'</span>';
  toast(msg,'e');
}

// ────────────────────────── FILE BLOCKS ──────────────────────────
function parseBlocks(text){
  var re=/<<<FILE:\s*(.+?)>>>([\s\S]*?)<<<END>>>/g,files=[],m;
  while((m=re.exec(text))!==null) files.push({path:m[1].trim(),content:m[2].trim()});
  return files;
}

function parseApplyFiles(text,msgId){
  if(!S.project)return;
  var blocks=parseBlocks(text);
  if(!blocks.length)return;
  var pid=S.project.id;
  Promise.all(blocks.map(function(b){
    return DB.upsertFile(pid,b.path,b.content).then(function(f){
      var newL=(b.content||'').split('\n').length;
      var oldL=f._oldLen||0;
      return {path:b.path,id:f.id,diff:newL-oldL,updated:f._wasUpdate};
    });
  })).then(function(res){
    return loadFiles(pid).then(function(){
      renderTree();
      var el=q('#'+msgId);if(!el)return;
      var html='<div class="fres">✓ '+(res.length===1?'1 file':res.length+' files')+': ';
      html+=res.map(function(r){
        var ds=r.diff>=0?'(+'+r.diff+'L)':'('+r.diff+'L)';
        return '<a class="fres-link" data-fid="'+r.id+'">'+esc(r.path)+'</a> '+ds;
      }).join(', ')+'</div>';
      el.insertAdjacentHTML('beforeend',html);
      el.querySelectorAll('.fres-link').forEach(function(a){
        a.addEventListener('click',function(){openFile(a.dataset.fid);});
      });
    });
  }).catch(function(err){toast('Apply files: '+err.message,'e');});
}

function loadProject(project){
  S.project=project;S.chat=[];S.ctxFiles=new Set();
  q('#pname-txt').textContent=project.name;
  q('#pdesc-txt').textContent=project.description||'';
  q('#msgs').innerHTML='';
  return loadFiles(project.id).then(function(){renderTree();});

function loadFiles(pid){
  return DB.listFiles(pid).then(function(files){
    S.files=files.sort(function(a,b){return a.path.localeCompare(b.path);});
    var total=S.files.reduce(function(a,f){return a+(f.content||'').length;},0);
    if(total<6000) S.ctxFiles=new Set(S.files.map(function(f){return f.id;}));
    return S.files;
  });
}

function renderProjects(){
  DB.listProjects().then(function(projects){

// ────────────────────────── FILE TREE ──────────────────────────
function renderTree(){
  var el=q('#ftree');
  if(!S.project){el.innerHTML='<div class="ft-empty">No project open</div>';return;}
  if(!S.files.length){
    el.innerHTML='<div class="ft-empty">No files yet.<br><br>Click <strong>+</strong> to create a file<br>or ask the AI to build something.</div>';
    return;
  }

  // Build tree structure
  var tree={}; // dir -> [file]
  S.files.forEach(function(f){
    var parts=f.path.split('/');
    var dir=parts.length>1?parts.slice(0,-1).join('/'):'';
    if(!tree[dir])tree[dir]=[];
    tree[dir].push(f);
  });

  var dirs=Object.keys(tree).sort();
  var html='';

  dirs.forEach(function(dir){
    var depth=dir?dir.split('/').length:0;
    if(dir){
      var open=S.expandedFolders.has(dir);
      html+='<div class="ft-row ft-folder-row" data-dir="'+esc(dir)+'" style="padding-left:'+(depth*12+4)+'px">'
        +'<span class="ft-arr'+(open?' open':'')+'">▶</span>'
        +'<span class="ft-ic">📁</span>'
        +'<span class="ft-nm">'+esc(dir.split('/').pop())+'</span>'
        +'</div>';
      if(!open) return;
    }
    tree[dir].forEach(function(f){
      var active=S.file&&S.file.id===f.id;
      var inCtx=S.ctxFiles.has(f.id);
      var indent=(depth+1)*12+4;
      var sz=f.content?fmtSize(f.content.length):'0B';
      html+='<div class="ft-row'+(active?' active':'')+'" data-fid="'+f.id+'" data-fpath="'+esc(f.path)+'" style="padding-left:'+indent+'px">'
        +'<span class="ft-ic">'+DB.icon(f.language,f.path)+'</span>'
        +'<span class="ft-nm">'+esc(f.path.split('/').pop())+'</span>'
        +'<span class="ft-sz">'+sz+'</span>'
        +'<span class="ft-ctx-eye'+(inCtx?' on':'')+'" data-eye="'+f.id+'" title="Include in AI context">👁</span>'
        +'<div class="ft-acts">'
        +'<span class="ft-act" data-act-rename="'+f.id+'" title="Rename">✏</span>'
        +'<span class="ft-act" data-act-dup="'+f.id+'" title="Duplicate">⧉</span>'
        +'<span class="ft-act" data-act-del="'+f.id+'" title="Delete" style="color:var(--red)">🗑</span>'
        +'</div>'
        +'</div>';
    });
  });

  el.innerHTML=html;

  // ── Event delegation ──
  el.onclick=function(e){
    var row=e.target.closest('.ft-row');
    if(!row)return;

    // eye toggle
    if(e.target.dataset.eye){
      e.stopPropagation();
      var fid=e.target.dataset.eye;
      if(S.ctxFiles.has(fid))S.ctxFiles.delete(fid);else S.ctxFiles.add(fid);
      renderTree();return;
    }
    // rename btn
    if(e.target.dataset.actRename){e.stopPropagation();beginRename(e.target.dataset.actRename);return;}
    // dup btn
    if(e.target.dataset.actDup){e.stopPropagation();dupFile(e.target.dataset.actDup);return;}
    // del btn
    if(e.target.dataset.actDel){e.stopPropagation();delFile(e.target.dataset.actDel);return;}

    // folder toggle
    if(row.classList.contains('ft-folder-row')){
      var dir=row.dataset.dir;
      if(S.expandedFolders.has(dir))S.expandedFolders.delete(dir);else S.expandedFolders.add(dir);
      renderTree();return;
    }

    // file open
    if(row.dataset.fid){
      openFile(row.dataset.fid);
    }
  };

  // right-click context menu
  el.oncontextmenu=function(e){
    var row=e.target.closest('.ft-row[data-fid]');
    if(!row)return;
    e.preventDefault();
    S.ctxMenuTarget=row.dataset.fid;
    showCtxMenu(e.clientX,e.clientY);
  };
}

function fmtSize(n){
  if(n<1024)return n+'B';
  if(n<1024*1024)return Math.round(n/1024)+'K';
  return (n/1048576).toFixed(1)+'M';
}

// ────────────────────────── FILE OPERATIONS ──────────────────────────
function openFile(id){
  DB.readFile(id).then(function(f){
    if(!f){toast('File not found','e');return;}
    S.file=f;
    ensureMode(f.language).then(function(){
      if(!S.editor)initEditor();
      S.editor.setValue(f.content||'');
      S.editor.setOption('mode',f.language||'plaintext');
      S.editor.clearHistory();
      q('#ebread').textContent=f.path;
      q('#elang').textContent=f.language||'text';
      q('#prev-btn').style.display=(f.language==='htmlmixed'?'inline-flex':'none');
      setSaved(true);
      renderTree();
      if(window.innerWidth<768)switchMobTab('editor');else switchTab('editor');
      setTimeout(function(){if(S.editor)S.editor.refresh();},50);
    });
  }).catch(function(err){toast('Open file: '+err.message,'e');});
}

function beginRename(fid){
  var file=S.files.find(function(f){return f.id===fid;});
  if(!file)return;
  q('#rn-path').value=file.path;
  q('#do-rename').dataset.fid=fid;
  openModal('rename-m');
  setTimeout(function(){q('#rn-path').select();},80);
}

function doRename(){
  var fid=q('#do-rename').dataset.fid;
  var newPath=q('#rn-path').value.trim();
  if(!newPath||!fid)return;
  DB.renameFile(fid,newPath).then(function(f){
    if(!f){toast('Rename failed','e');return;}
    if(S.file&&S.file.id===fid){
      S.file=f;
      q('#ebread').textContent=f.path;
      q('#elang').textContent=f.language||'text';
      q('#prev-btn').style.display=(f.language==='htmlmixed'?'inline-flex':'none');
      if(S.editor) S.editor.setOption('mode',f.language||'plaintext');
    }
    closeModal('rename-m');
    return loadFiles(S.project.id).then(function(){renderTree();toast('Renamed to '+newPath,'s');});
  }).catch(function(err){toast('Rename: '+err.message,'e');});
}

function dupFile(fid){
  DB.readFile(fid).then(function(f){
    if(!f)return;
    var parts=f.path.split('.');
    var newPath=parts.length>1?parts.slice(0,-1).join('.')+'_copy.'+parts[parts.length-1]:f.path+'_copy';
    return DB.createFile(S.project.id,newPath,f.content).then(function(){
      return loadFiles(S.project.id).then(function(){renderTree();toast('Duplicated to '+newPath,'s');});
    });
  }).catch(function(err){toast('Duplicate: '+err.message,'e');});
}

function delFile(fid){
  var file=S.files.find(function(f){return f.id===fid;});
  var name=file?file.path:'file';
  if(!confirm('Delete "'+name+'"?'))return;
  DB.deleteFile(fid).then(function(){
    if(S.file&&S.file.id===fid){
      S.file=null;
      if(S.editor)S.editor.setValue('');
      q('#ebread').textContent='No file open';
      q('#elang').textContent='';
      q('#prev-btn').style.display='none';
    }
    return loadFiles(S.project.id).then(function(){renderTree();toast('Deleted "'+name+'"','i');});
  }).catch(function(err){toast('Delete: '+err.message,'e');});
}

function createFileFromModal(){
  if(!S.project){toast('Create a project first','i');return;}
  var path=q('#nf-path').value.trim();
  var content=q('#nf-content').value;
  if(!path){toast('Enter a file path','i');return;}
  DB.createFile(S.project.id,path,content).then(function(f){
    closeModal('newfile-m');
    return loadFiles(S.project.id).then(function(){renderTree();openFile(f.id);toast('Created '+path,'s');});
  }).catch(function(err){toast('Create file: '+err.message,'e');});
}

function createFolderFromModal(){
  if(!S.project){toast('Create a project first','i');return;}
  var dir=q('#nfold-path').value.trim().replace(/\/+$/,'');
  if(!dir){toast('Enter a folder path','i');return;}
  DB.createFile(S.project.id,dir+'/.gitkeep','').then(function(){
    S.expandedFolders.add(dir);
    closeModal('newfolder-m');
    return loadFiles(S.project.id).then(function(){renderTree();toast('Created folder '+dir,'s');});
  }).catch(function(err){toast('Create folder: '+err.message,'e');});
}

// ────────────────────────── CONTEXT MENU ──────────────────────────
function showCtxMenu(x,y){
  var menu=q('#ctx-menu');
  menu.classList.add('show');
  var bx=x,by=y;
  if(x+180>window.innerWidth)bx=x-180;
  if(y+180>window.innerHeight)by=y-180;
  menu.style.left=bx+'px';menu.style.top=by+'px';
}
function hideCtxMenu(){q('#ctx-menu').classList.remove('show');}

q('#ctx-menu').addEventListener('click',function(e){
  var item=e.target.closest('.ctx-item');
  if(!item)return;
  var action=item.dataset.action;
  var fid=S.ctxMenuTarget;
  hideCtxMenu();
  if(!fid)return;
  if(action==='open') openFile(fid);
  else if(action==='rename') beginRename(fid);
  else if(action==='duplicate') dupFile(fid);
  else if(action==='copy-path'){
    var f=S.files.find(function(x){return x.id===fid;});
    if(f) navigator.clipboard.writeText(f.path).then(function(){toast('Copied path','s');});
  }
  else if(action==='delete') delFile(fid);
});

document.addEventListener('click',function(e){
  if(!q('#ctx-menu').contains(e.target)) hideCtxMenu();
});

// ────────────────────────── EDITOR ──────────────────────────
function initEditor(){
  var c=q('#econtainer');
  S.editor=CodeMirror(c,{
    theme:'dracula',lineNumbers:true,autoCloseBrackets:true,matchBrackets:true,
    indentWithTabs:false,tabSize:2,indentUnit:2,lineWrapping:false,autofocus:false,
    extraKeys:{Tab:'indentMore','Shift-Tab':'indentLess'},mode:'plaintext',
  });
  S.editor.on('change',function(){
    setSaved(false);
    clearTimeout(S.saveTimer);
    S.saveTimer=setTimeout(autoSave,500);
  });
}

function setSaved(clean){
  var d=q('#sdot2');
  if(d){d.className='sdot2 '+(clean?'saved':'unsaved');d.title=clean?'Saved':'Unsaved';}
}

function autoSave(){
  if(!S.file||!S.editor)return;
  var content=S.editor.getValue();
  DB.updateFile(S.file.id,content).then(function(f){
    if(!f)return;
    S.file=f;
    var idx=S.files.findIndex(function(x){return x.id===f.id;});
    if(idx>=0)S.files[idx]=f;
    setSaved(true);
  }).catch(function(err){toast('Auto-save: '+err.message,'e');});
}

function manualSave(){
  if(!S.file||!S.editor){toast('No file open','i');return;}
  clearTimeout(S.saveTimer);
  autoSave();
  toast('Saved','s',1400);
}

function ensureMode(lang){
  if(!lang||lang==='plaintext'||S.loadedModes.has(lang))return Promise.resolve();
  var urls=CM_MODES[lang];
  if(!urls)return Promise.resolve();
  var loaded=0;
  return new Promise(function(res){
    urls.forEach(function(url){
      var s=document.createElement('script');
      s.src=url;
      s.onload=s.onerror=function(){if(++loaded===urls.length){S.loadedModes.add(lang);res();}};
      document.head.appendChild(s);
    });
  });
}

// ────────────────────────── MODEL SHEET ──────────────────────────
function renderModelSheet(){
  var el=q('#mlist');
  el.innerHTML=MODELS.map(function(m){
    var loaded=S.modelId===m.id;
    var loading=S.loadingModelId===m.id;
    var prog=S.fileProgress;
    var progHtml='';
    if(loading&&Object.keys(prog).length){
      progHtml='<div class="mprog">';
      Object.keys(prog).forEach(function(fn){
        var p=prog[fn];var pct=p.pct||0;
        var lmb=p.loaded?(p.loaded/1048576).toFixed(1):0;
        var tmb=p.total?(p.total/1048576).toFixed(1):'?';
        progHtml+='<div class="mprog-row"><span>'+esc(fn.split('/').pop())+'</span><span>'+lmb+'/'+tmb+' MB</span></div>'
          +'<div class="pbar-wrap"><div class="pbar-fill" style="width:'+pct+'%"></div></div>';
      });
      progHtml+='</div>';
    }
    var btnHtml=loaded
      ?'<span style="color:var(--teal);font-size:11px;font-family:var(--mono)">✓ Loaded</span>'
      :loading
        ?'<span style="font-size:12px;color:var(--amber)"><span class="spin"></span> Loading…</span>'
        :'<button class="btn-sm btn-acc" style="cursor:pointer" onclick="loadModel(\''+m.id+'\',\''+m.dtype+'\')">Load</button>';
    return '<div class="mcard'+(loaded?' active':'')+'">'
      +'<div class="mchdr"><span class="mcname">'+esc(m.name)+'</span><span class="mbadge '+m.bc+'">'+m.badge+'</span></div>'
      +'<div class="mcdesc">'+esc(m.desc)+'</div>'
      +progHtml+btnHtml+'</div>';
  }).join('');
}

window.loadModel=function(id,dtype){
  if(S.generating){toast('Cannot load model while generating','i');return;}
  if(!S.worker){toast('Worker not ready','e');return;}
  S.worker.postMessage({type:'load',modelId:id,dtype:dtype});
};

// ────────────────────────── SETTINGS ──────────────────────────
function renderSettings(){
  var sab=typeof SharedArrayBuffer!=='undefined';
  q('#dcontent').innerHTML=
    '<div><div class="gsect-t">Model</div>'
    +'<div class="dbrow"><span class="dbk">Loaded</span><span class="dbv">'+(S.modelId||'None')+'</span></div>'
    +'<div class="dbrow"><span class="dbk">Status</span><span class="dbv">'+S.modelStatus+'</span></div>'
    +'<div class="dbrow"><span class="dbk">Context Size</span><span class="dbv">'+S.modelCtx+' tokens</span></div>'
    +'</div>'
    +'<div><div class="gsect-t">Environment</div>'
    +'<div class="dbrow"><span class="dbk">CPU Cores</span><span class="dbv">'+(navigator.hardwareConcurrency||'?')+'</span></div>'
    +'<div class="dbrow"><span class="dbk">SharedArrayBuffer</span><span class="dbv">'+(sab?'✓ Yes':'✗ No')+'</span></div>'
    +'<div class="dbrow"><span class="dbk">Worker Threads</span><span class="dbv">'+(sab?Math.min(navigator.hardwareConcurrency||2,4):1)+'</span></div>'
    +'</div>'
    +'<div><div class="gsect-t">Actions</div>'
    +'<button class="btn-sm" onclick="exportProject()" style="width:100%;text-align:left;margin-bottom:7px">⬇ Export Project (JSON)</button>'
    +'<button class="btn-sm" onclick="clearCache()" style="width:100%;text-align:left;margin-bottom:7px">🗑 Clear Model Cache</button>'
    +'</div>'
    +'<div style="font-size:11px;color:var(--tx3);line-height:1.8;border-top:1px solid var(--border);padding-top:12px">Vibe IDE runs entirely in your browser. All AI inference is local via @huggingface/transformers. No data is sent anywhere.</div>';
}

window.exportProject=function(){
  if(!S.project){toast('No project open','i');return;}
  var blob=new Blob([JSON.stringify({project:S.project,files:S.files},null,2)],{type:'application/json'});
  dlBlob(blob,S.project.name.replace(/\s+/g,'-')+'.json');toast('Exported','s');
};
window.clearCache=function(){
  caches.keys().then(function(names){return Promise.all(names.map(function(n){return caches.delete(n);}));})
    .then(function(){toast('Cache cleared','s');});
};

// ────────────────────────── ZIP ──────────────────────────
function downloadZip(){
  if(!S.project){toast('No project open','i');return;}
  if(!S.files.length){toast('No files to zip','i');return;}
  function run(){
    var zip=new JSZip();
    S.files.forEach(function(f){zip.file(f.path,f.content||'');});
    zip.generateAsync({type:'blob'}).then(function(blob){
      dlBlob(blob,S.project.name.replace(/\s+/g,'-')+'.zip');toast('ZIP downloaded','s');
    });
  }
  if(typeof JSZip!=='undefined'){run();return;}
  var s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
  s.onload=run;s.onerror=function(){toast('Failed to load JSZip','e');};
  document.head.appendChild(s);
}

function dlCurrentFile(){
  if(!S.file||!S.editor){toast('No file open','i');return;}
  dlBlob(new Blob([S.editor.getValue()],{type:'text/plain'}),S.file.path.split('/').pop());
}

function dlBlob(blob,name){
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();
  setTimeout(function(){URL.revokeObjectURL(a.href);},1000);
}

// ────────────────────────── PREVIEW ──────────────────────────
function openPreview(){
  if(!S.file||!S.editor)return;
  q('#prev-frame').srcdoc=S.editor.getValue();
  openSheet('prev-sh');
}

// ────────────────────────── SHEET / MODAL HELPERS ──────────────────────────
function openSheet(id){q('#ov').classList.add('on');q('#'+id).classList.add('on');}
function closeSheet(id){
  q('#'+id).classList.remove('on');
  if(!document.querySelector('.sheet.on, .drawer.on'))q('#ov').classList.remove('on');
}
function openModal(id){q('#'+id).classList.add('on');q('#ov').classList.add('on');}
function closeModal(id){
  q('#'+id).classList.remove('on');
  if(!document.querySelector('.modal.on'))q('#ov').classList.remove('on');
}
function closeAll(){
  qa('.sheet.on,.drawer.on,.modal.on').forEach(function(el){el.classList.remove('on');});
  q('#ov').classList.remove('on');
}

// ────────────────────────── EVENTS ──────────────────────────
function setupEvents(){
  // header
  q('#model-btn').onclick=function(){renderModelSheet();openSheet('model-sh');};
  q('#settings-btn').onclick=function(){renderSettings();q('#settings-dr').classList.add('on');q('#ov').classList.add('on');};

  // project bar
  q('#proj-sw-btn').onclick=function(){renderProjects();openSheet('proj-sw-sh');};
  q('#new-proj-btn').onclick=function(){q('#np-name').value='';q('#np-desc').value='';openModal('newproj-m');setTimeout(function(){q('#np-name').focus();},80);};
  q('#from-switcher-new').onclick=function(){closeSheet('proj-sw-sh');q('#np-name').value='';q('#np-desc').value='';openModal('newproj-m');setTimeout(function(){q('#np-name').focus();},80);};
  q('#do-create-proj').onclick=function(){
    var name=q('#np-name').value.trim();if(!name){toast('Enter a name','i');return;}
    DB.createProject(name,q('#np-desc').value.trim()).then(function(p){closeModal('newproj-m');return loadProject(p);}).then(function(){toast('Project created','s');});
  };

  // files
  q('#new-file-btn').onclick=function(){if(!S.project){toast('Create a project first','i');return;}q('#nf-path').value='';q('#nf-content').value='';openModal('newfile-m');setTimeout(function(){q('#nf-path').focus();},80);};
  q('#new-folder-btn').onclick=function(){if(!S.project){toast('Create a project first','i');return;}q('#nfold-path').value='';openModal('newfolder-m');setTimeout(function(){q('#nfold-path').focus();},80);};
  q('#do-create-file').onclick=createFileFromModal;
  q('#do-create-folder').onclick=createFolderFromModal;
  q('#do-rename').onclick=doRename;
  q('#zip-btn').onclick=downloadZip;

  // chat
  q('#send-btn').onclick=sendMessage;
  q('#stop-btn').onclick=function(){if(S.worker){S.worker.postMessage({type:'abort'});}};
  q('#cin').oninput=function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';};
  q('#cin').onkeydown=function(e){if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();sendMessage();}};
  q('#perr-btn').onclick=function(){q('#err-txt').value=S.pastedErr||'';openModal('perr-m');};
  q('#do-use-err').onclick=function(){S.pastedErr=q('#err-txt').value.trim();closeModal('perr-m');if(S.pastedErr)toast('Error attached — now send your message','i');};

  // editor
  q('#save-btn').onclick=manualSave;
  q('#dlf-btn').onclick=dlCurrentFile;
  q('#prev-btn').onclick=openPreview;
  q('#prev-reload').onclick=function(){if(S.file&&S.editor)q('#prev-frame').srcdoc=S.editor.getValue();};

  // desktop tabs
  qa('.mtab').forEach(function(b){b.onclick=function(){switchTab(b.dataset.tab);};});

  // mobile tabs
  qa('.mobtab').forEach(function(b){b.onclick=function(){switchMobTab(b.dataset.tab);};});

  // generic close buttons
  document.addEventListener('click',function(e){
    var xbtn=e.target.closest('[data-close]');
    if(!xbtn)return;
    var id=xbtn.dataset.close;
    var el=q('#'+id);
    if(el.classList.contains('modal'))closeModal(id);
    else if(el.classList.contains('drawer')){el.classList.remove('on');if(!document.querySelector('.sheet.on,.modal.on'))q('#ov').classList.remove('on');}
    else closeSheet(id);
  });

  // overlay click
  q('#ov').onclick=function(e){
    if(e.target!==q('#ov'))return;
    qa('.sheet.on').forEach(function(s){s.classList.remove('on');});
    qa('.drawer.on').forEach(function(d){d.classList.remove('on');});
    if(!document.querySelector('.modal.on'))q('#ov').classList.remove('on');
  };

  // sliders
  [['#sl-temp','#sv-temp','temp',2],['#sl-maxt','#sv-maxt','maxT',0],
   ['#sl-topp','#sv-topp','topP',2],['#sl-rep','#sv-rep','repP',2]].forEach(function(d){
    var sl=q(d[0]),sv=q(d[1]);if(!sl)return;
    sl.oninput=function(){var v=d[3]===0?parseInt(this.value):parseFloat(parseFloat(this.value).toFixed(d[3]));sv.textContent=v;S.gen[d[2]]=v;};
  });

  // keyboard
  document.addEventListener('keydown',function(e){
    if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();manualSave();}
    if(e.key==='Escape'){
      if(document.querySelector('.modal.on')){
        var m=document.querySelector('.modal.on');m.classList.remove('on');
        if(!document.querySelector('.modal.on'))q('#ov').classList.remove('on');
      } else closeAll();
    }
    if((e.ctrlKey||e.metaKey)&&e.key==='`'){e.preventDefault();switchTab(S.activeTab==='chat'?'editor':'chat');}
  });

  // enter in modals
  q('#np-name').onkeydown=function(e){if(e.key==='Enter')q('#do-create-proj').click();};
  q('#nf-path').onkeydown=function(e){if(e.key==='Enter')q('#do-create-file').click();};
  q('#nfold-path').onkeydown=function(e){if(e.key==='Enter')q('#do-create-folder').click();};
  q('#rn-path').onkeydown=function(e){if(e.key==='Enter')q('#do-rename').click();};

  window.onresize=function(){if(S.editor)S.editor.refresh();};
}

// ────────────────────────── BOOT ──────────────────────────
async function boot(){
  try{await DB.open();}catch(err){toast('IndexedDB failed: '+err.message,'e');return;}
  bootWorker();
  setupEvents();
  initEditor();

  var projects=await DB.listProjects();
  if(projects.length){
    await loadProject(projects[0]);
    if(S.files.length){
      q('#msgs').innerHTML='';
      appendMsg('assistant','**Welcome back to '+projects[0].name+'** — I have '+S.files.length+' file(s) ready. What would you like to build or change?');
    } else {
      showWelcome();
    }
  } else {
    q('#pname-txt').textContent='No project';
    showWelcome();
  }
}

boot().catch(function(err){toast('Boot error: '+err.message,'e');console.error(err);});
</script>
