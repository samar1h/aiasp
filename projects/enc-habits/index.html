<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Habits</title>
  <style>
    :root {
      --bg:          #09090d;
      --s1:          #0f0f15;
      --s2:          #161620;
      --border:      #1e1e2c;
      --border-2:    #26263a;
      --t1:          #e0e0eb;
      --t2:          #64647a;
      --t3:          #2e2e3e;
      --accent:      #c9a96e;
      --accent-dim:  rgba(201,169,110,.09);
      --accent-glow: rgba(201,169,110,.20);
      --err:         #c96e6e;
      --r:           12px;
      --r-lg:        18px;
      --fab:         52px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: -apple-system, 'Helvetica Neue', 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--t1);
      min-height: 100dvh;
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
    }

    button { font-family: inherit; cursor: pointer; border: none; background: none; }

    .screen        { display: none; }
    .screen.active { display: flex; }

    .shake { animation: shake .4s cubic-bezier(.36,.07,.19,.97) both; }
    @keyframes shake {
      10%,90%      { transform: translateX(-3px); }
      20%,80%      { transform: translateX( 4px); }
      30%,50%,70%  { transform: translateX(-5px); }
      40%,60%      { transform: translateX( 5px); }
    }


    /* ════════════════════════════
       LOCK SCREEN
    ════════════════════════════ */
    #lock {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 48px 32px;
      text-align: center;
    }

    .lock-icon {
      width: 58px; height: 58px;
      border-radius: 16px;
      background: var(--s2);
      border: 1px solid var(--border-2);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 26px;
    }

    .lock-label {
      font-size: 10.5px; font-weight: 600;
      letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--t2); margin-bottom: 8px;
    }
    .lock-title {
      font-size: 23px; font-weight: 600; letter-spacing: -.4px;
      color: var(--t1); margin-bottom: 42px;
    }

    .lock-form {
      width: 100%; max-width: 300px;
      display: flex; flex-direction: column; gap: 10px;
    }

    .pw-wrap { position: relative; }

    .pw-input {
      width: 100%;
      background: var(--s1);
      border: 1px solid var(--border-2);
      border-radius: var(--r);
      padding: 15px 46px 15px 18px;
      color: var(--t1);
      font-size: 15px; letter-spacing: 2.5px;
      outline: none; -webkit-appearance: none;
      transition: border-color .15s;
    }
    .pw-input::placeholder { letter-spacing: .4px; color: var(--t3); }
    .pw-input:focus { border-color: var(--accent); }

    .pw-toggle {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--t2); line-height: 0; padding: 4px;
    }
    .pw-toggle:hover { color: var(--t1); }

    .unlock-btn {
      background: var(--accent);
      color: #120d00;
      font-size: 13px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      border-radius: var(--r); padding: 15px;
      transition: opacity .15s, transform .1s;
    }
    .unlock-btn:active   { transform: scale(.97); opacity: .8; }
    .unlock-btn:disabled { opacity: .3; cursor: not-allowed; transform: none; }

    .lock-err {
      font-size: 12px; color: var(--err);
      text-align: center; min-height: 16px;
    }
    .lock-hint {
      font-size: 11px; color: var(--t3);
      margin-top: 28px; line-height: 1.7;
    }
    .lock-hint code { color: var(--t2); font-size: 11px; }


    /* ════════════════════════════
       MAIN SCREEN
    ════════════════════════════ */
    #main {
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      padding: 72px 32px 110px;
      width: 100%; max-width: 400px;
      margin: 0 auto;
      text-align: center;
    }

    .hd-greeting {
      font-size: 10.5px; font-weight: 600;
      letter-spacing: 2.2px; text-transform: uppercase;
      color: var(--t2); margin-bottom: 12px;
    }

    /* Static time — no blinking */
    .hd-time {
      font-size: 62px; font-weight: 200; letter-spacing: -3px;
      line-height: 1; color: var(--t1);
      font-variant-numeric: tabular-nums;
      margin-bottom: 8px;
    }

    .hd-date {
      font-size: 13px; color: var(--t2);
      margin-bottom: 54px;
    }

    /* Feed wrapper */
    #habit-feed {
      width: 100%;
      display: flex; flex-direction: column; align-items: center;
    }

    /* Dots */
    .sep {
      display: flex; gap: 5px;
      justify-content: center; align-items: center;
      padding: 12px 0;
      width: 100%;
    }
    .sep-dot {
      width: 3px; height: 3px;
      border-radius: 50%; background: var(--t3);
    }

    /* Previous habit — the one immediately before current */
    .h-prev {
      width: 100%; padding: 10px 0;
      opacity: .35;
    }
    .h-prev .h-name {
      font-size: 15px; font-weight: 500; color: var(--t1);
    }
    .h-prev .h-time {
      font-size: 12px; color: var(--t2); margin-top: 3px;
    }

    /* Current habit card */
    .h-current {
      width: 100%;
      background: var(--s1);
      border: 1px solid var(--accent);
      border-radius: var(--r-lg);
      padding: 24px 24px 20px;
      position: relative; overflow: hidden;
    }
    .h-current::before {
      content: ''; position: absolute; inset: 0;
      background: var(--accent-dim); pointer-events: none;
    }

    .now-tag {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent); color: #120d00;
      font-size: 9px; font-weight: 800;
      letter-spacing: 1.8px; text-transform: uppercase;
      padding: 3px 10px; border-radius: 30px;
      margin-bottom: 14px;
    }
    .now-pulse {
      width: 5px; height: 5px; border-radius: 50%;
      background: #120d00;
      animation: nowpulse 1.8s ease-in-out infinite;
    }
    @keyframes nowpulse { 0%,100%{opacity:1} 50%{opacity:.2} }

    .h-current .h-name {
      font-size: 24px; font-weight: 600; letter-spacing: -.5px;
      color: var(--t1); line-height: 1.2; margin-bottom: 6px;
    }
    .h-current .h-time {
      font-size: 13px; color: var(--accent);
    }
    .h-remain {
      font-size: 11px; color: var(--t2); margin-top: 12px;
    }

    /* Next habit — the one immediately after current */
    .h-next {
      width: 100%; padding: 10px 0;
      opacity: .38;
    }
    .h-next .h-name {
      font-size: 15px; font-weight: 500; color: var(--t1);
    }
    .h-next .h-time {
      font-size: 12px; color: var(--t2); margin-top: 3px;
    }

    /* Between / done states */
    .h-free {
      padding: 18px 0;
      font-size: 14px; color: var(--t2); font-style: italic;
    }
    .h-done { padding: 28px 0; }
    .h-done-mark { font-size: 20px; color: var(--t3); margin-bottom: 8px; }
    .h-done-text { font-size: 14px; color: var(--t2); }


    /* ════════════════════════════
       FAB
    ════════════════════════════ */
    .fab {
      position: fixed;
      bottom: 28px; right: 24px;
      width: var(--fab); height: var(--fab);
      border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px var(--accent-glow), 0 1px 6px rgba(0,0,0,.5);
      transition: transform .14s, box-shadow .14s;
      z-index: 100;
      -webkit-tap-highlight-color: transparent;
    }
    .fab:active { transform: scale(.90); box-shadow: 0 2px 10px var(--accent-glow); }
    .fab svg { color: #120d00; flex-shrink: 0; }


    /* ════════════════════════════
       ALL HABITS PANEL
    ════════════════════════════ */
    #panel {
      flex-direction: column;
      align-items: center;
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 200;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 72px 32px 110px;
      width: 100%; max-width: 400px;
      margin: 0 auto;
      text-align: center;
    }

    #panel.slide-in {
      animation: slideIn .26s cubic-bezier(.2,.8,.4,1) both;
    }
    @keyframes slideIn {
      from { transform: translateY(22px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .panel-title {
      font-size: 26px; font-weight: 700; letter-spacing: -.5px;
      color: var(--t1); margin-bottom: 4px;
    }
    .panel-sub {
      font-size: 12px; color: var(--t2);
      margin-bottom: 42px; letter-spacing: .2px;
    }

    /* Habit rows — clean reference list, no state styling */
    .p-row {
      width: 100%;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
    }
    .p-row:last-child { border-bottom: none; }

    /* Only the currently active habit gets the accent treatment */
    .p-row.is-now .p-name { color: var(--accent); }
    .p-row.is-now .p-time { color: var(--accent); opacity: .65; }

    .p-time {
      font-size: 11px; color: var(--t2);
      letter-spacing: .3px; margin-bottom: 5px;
      font-variant-numeric: tabular-nums;
    }
    .p-name {
      font-size: 19px; font-weight: 600; letter-spacing: -.3px;
      color: var(--t1); line-height: 1.25;
    }
    .p-days {
      font-size: 11px; color: var(--t3);
      margin-top: 5px; letter-spacing: .2px;
    }


    /* ════════════════════════════
       LOADER
    ════════════════════════════ */
    #loader {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 14px;
      z-index: 999;
    }
    #loader.hidden { display: none; }

    .spinner {
      width: 26px; height: 26px;
      border: 1.5px solid var(--border-2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-label {
      font-size: 11px; color: var(--t2);
      letter-spacing: 1.5px; text-transform: uppercase;
    }
  </style>
</head>
<body>

<!-- LOCK ─────────────────────────────────────────────────── -->
<div id="lock" class="screen active">
  <div class="lock-icon">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
         stroke="#c9a96e" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>

  <p class="lock-label">Daily Habits</p>
  <p class="lock-title">Enter your key</p>

  <div class="lock-form">
    <div class="pw-wrap">
      <input type="password" id="pw" class="pw-input"
        placeholder="Decryption key"
        autocomplete="off" autocorrect="off"
        autocapitalize="off" spellcheck="false">
      <button class="pw-toggle" id="pw-toggle" tabindex="-1" aria-label="Toggle visibility">
        <svg id="eye-svg" width="17" height="17" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
    <button class="unlock-btn" id="unlock-btn">Unlock</button>
    <p class="lock-err" id="lock-err"></p>
  </div>

  <!-- p class="lock-hint">
    Place <code>habits.enc</code> in the same folder as this file.
</p -->
</div>


<!-- MAIN ─────────────────────────────────────────────────── -->
<div id="main" class="screen">
  <p class="hd-greeting" id="greeting">Good Morning</p>
  <p class="hd-time"     id="clock">0:00</p>
  <p class="hd-date"     id="dateline">–</p>

  <div id="habit-feed"></div>

  <button class="fab" id="fab" aria-label="All habits">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.2"
         stroke-linecap="round" stroke-linejoin="round">
      <line x1="8" y1="6"  x2="20" y2="6"/>
      <line x1="8" y1="12" x2="20" y2="12"/>
      <line x1="8" y1="18" x2="20" y2="18"/>
      <circle cx="4" cy="6"  r="1.1" fill="currentColor" stroke="none"/>
      <circle cx="4" cy="12" r="1.1" fill="currentColor" stroke="none"/>
      <circle cx="4" cy="18" r="1.1" fill="currentColor" stroke="none"/>
    </svg>
  </button>
</div>


<!-- PANEL ────────────────────────────────────────────────── -->
<div id="panel" class="screen">
  <p class="panel-title">All Habits</p>
  <p class="panel-sub" id="panel-sub">–</p>
  <div id="panel-list" style="width:100%"></div>

  <button class="fab" id="fab-back" aria-label="Back">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.2"
         stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"/>
      <polyline points="12 19 5 12 12 5"/>
    </svg>
  </button>
</div>


<!-- LOADER ───────────────────────────────────────────────── -->
<div id="loader" class="hidden">
  <div class="spinner"></div>
  <p class="loader-label">Decrypting</p>
</div>


<script>
/* ── CRYPTO  (PBKDF2-SHA256 + AES-256-GCM) ───────────────── */
function b64ToBytes(b64) {
  return Uint8Array.from(atob(b64), c => c.charCodeAt(0));
}

async function decryptEnc({ salt, iv, ct, iter = 600000 }, password) {
  const raw = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(password),
    'PBKDF2', false, ['deriveKey']
  );
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: b64ToBytes(salt), iterations: iter, hash: 'SHA-256' },
    raw, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
  );
  const buf = await crypto.subtle.decrypt(
    { name: 'AES-GCM', iv: b64ToBytes(iv) }, key, b64ToBytes(ct)
  );
  return new TextDecoder().decode(buf);
}


/* ── YAML PARSER (habits schema only) ───────────────────── */
function parseYAML(text) {
  const items = []; let cur = null;
  for (const raw of text.split('\n')) {
    const line = raw.trimStart();
    if (!line || line.startsWith('#')) continue;
    if (line.startsWith('- ')) {
      if (cur) items.push(cur);
      cur = {};
      const rest = line.slice(2).trim();
      if (rest) kv(rest, cur);
    } else if (cur) { kv(line, cur); }
  }
  if (cur) items.push(cur);
  return items;
}

function kv(str, obj) {
  const i = str.indexOf(':'); if (i === -1) return;
  const k = str.slice(0, i).trim();
  let   v = str.slice(i + 1).trim();
  if ((v[0] === '"' && v.at(-1) === '"') ||
      (v[0] === "'" && v.at(-1) === "'")) v = v.slice(1, -1);
  if (k) obj[k] = v;
}


/* ── DAY MATCHING ───────────────────────────────────────── */
const SHORT = ['sun','mon','tue','wed','thu','fri','sat'];
const LONG  = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];

function matchesDay(daysStr, date) {
  if (!daysStr || /^every\s*day$/i.test(daysStr.trim()) || !daysStr.trim()) return true;
  const dow = date.getDay(), dom = date.getDate();
  for (const p of daysStr.toLowerCase().split(',').map(s => s.trim())) {
    if (p === 'everyday') return true;
    if ((p === 'weekdays'||p === 'weekday') && dow >= 1 && dow <= 5) return true;
    if ((p === 'weekends'||p === 'weekend') && (dow === 0 || dow === 6)) return true;
    if (SHORT[dow] === p || LONG[dow] === p) return true;
    const nth = p.match(/^(\d+)(?:st|nd|rd|th)$/);
    if (nth && +nth[1] === dom) return true;
    if (p === 'last') {
      const t = new Date(date); t.setDate(dom + 1);
      if (t.getMonth() !== date.getMonth()) return true;
    }
  }
  return false;
}


/* ── TIME UTILITIES ─────────────────────────────────────── */
function toMin(t) {
  const [h, m] = t.trim().split(':').map(Number);
  return h * 60 + (m || 0);
}
function parseRange(ts) {
  if (!ts) return null;
  const d = ts.lastIndexOf('-'); if (d === -1) return null;
  return { start: toMin(ts.slice(0, d)), end: toMin(ts.slice(d + 1)) };
}
function nowMin() { const n = new Date(); return n.getHours() * 60 + n.getMinutes(); }
function fmt12(t) {
  const [h, m] = t.trim().split(':').map(s => parseInt(s, 10));
  return `${h % 12 || 12}:${String(m || 0).padStart(2,'0')} ${h >= 12 ? 'PM' : 'AM'}`;
}
function fmtRange(ts) {
  if (!ts) return '—';
  const d = ts.lastIndexOf('-'); if (d === -1) return ts;
  return `${fmt12(ts.slice(0, d))} – ${fmt12(ts.slice(d + 1))}`;
}
function minsLeft(n) {
  if (n <= 0) return '';
  const h = Math.floor(n / 60), m = n % 60;
  if (h && m) return `${h}h ${m}m left`;
  return h ? `${h}h left` : `${m}m left`;
}
function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function daysLabel(d) {
  if (!d || /^every\s*day$/i.test(d.trim())) return 'Every day';
  return d.split(',').map(s => {
    const t = s.trim();
    return t.charAt(0).toUpperCase() + t.slice(1);
  }).join('  ·  ');
}


/* ── STATE ──────────────────────────────────────────────── */
let habits = [];


/* ── CLOCK (updates every minute — no per-second jitter) ── */
function startClock() {
  tick();
  // align to next minute boundary, then tick every 60s
  const now = new Date();
  const msToNextMin = (60 - now.getSeconds()) * 1000 - now.getMilliseconds();
  setTimeout(() => { tick(); setInterval(tick, 60000); }, msToNextMin);
}

function tick() {
  const now = new Date();
  const hh  = now.getHours();
  const mm  = String(now.getMinutes()).padStart(2, '0');

  // No blinking — plain static string
  document.getElementById('clock').textContent = `${hh}:${mm}`;

  const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
  document.getElementById('dateline').textContent =
    `${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}`;

  let gr = 'Good Morning';
  if (hh >= 12 && hh < 17) gr = 'Good Afternoon';
  else if (hh >= 17 && hh < 21) gr = 'Good Evening';
  else if (hh >= 21 || hh < 5) gr = 'Good Night';
  document.getElementById('greeting').textContent = gr;

  if (habits.length) renderFeed();
}


/* ── RENDER FEED ────────────────────────────────────────────
   Structure (exactly as specified):
     [dots]  ← only if habits existed before prev
     [prev]  ← the one habit immediately before current, dimmed
     [current card]
     [next]  ← the one habit immediately after current, dimmed
     [dots]  ← only if more habits exist after next
   ─────────────────────────────────────────────────────────── */
function renderFeed() {
  const now  = new Date();
  const nowM = nowMin();
  const feed = document.getElementById('habit-feed');

  const today = habits
    .filter(h => matchesDay(h.days, now))
    .map(h => ({ ...h, _r: parseRange(h.time) }))
    .filter(h => h._r)
    .sort((a, b) => a._r.start - b._r.start);

  if (!today.length) {
    feed.innerHTML = `<p class="h-free">No habits scheduled for today.</p>`;
    return;
  }

  const past     = today.filter(h => h._r.end    <= nowM);
  const current  = today.find( h => h._r.start   <= nowM && nowM < h._r.end) ?? null;
  const upcoming = today.filter(h => h._r.start   > nowM);

  // exactly the one immediately before & after
  const prev     = past.at(-1)    ?? null;
  const next     = upcoming[0]    ?? null;

  // dots above = more past habits exist beyond the one we show
  const dotsAbove = past.length > 1;
  // dots below = more upcoming habits exist beyond the one we show
  const dotsBelow = upcoming.length > 1;

  let html = '';

  if (dotsAbove)      html += sep();
  if (prev)           html += hPrev(prev);
  html += hMiddle(current, next, upcoming, nowM, past);
  if (next)           html += hNext(next);
  if (dotsBelow)      html += sep();

  feed.innerHTML = html;
}

function hPrev(h) {
  return `<div class="h-prev">
    <p class="h-name">${esc(h.title)}</p>
    <p class="h-time">${fmtRange(h.time)}</p>
  </div>`;
}

function hMiddle(current, next, upcoming, nowM, past) {
  if (current) {
    const left = current._r.end - nowM;
    return `<div class="h-current">
      <div class="now-tag"><span class="now-pulse"></span>Now</div>
      <p class="h-name">${esc(current.title)}</p>
      <p class="h-time">${fmtRange(current.time)}</p>
      ${left > 0 ? `<p class="h-remain">${minsLeft(left)}</p>` : ''}
    </div>`;
  }
  if (next) {
    const wait = next._r.start - nowM;
    return `<p class="h-free">Free for ${minsLeft(wait)}</p>`;
  }
  if (past.length) {
    return `<div class="h-done">
      <div class="h-done-mark">✦</div>
      <p class="h-done-text">All done for today</p>
    </div>`;
  }
  const first = upcoming[0];
  if (first) {
    const wait = first._r.start - nowM;
    return `<p class="h-free">Day starts in ${minsLeft(wait)}</p>`;
  }
  return `<p class="h-free">Nothing scheduled today.</p>`;
}

function hNext(h) {
  return `<div class="h-next">
    <p class="h-name">${esc(h.title)}</p>
    <p class="h-time">${fmtRange(h.time)}</p>
  </div>`;
}

function sep() {
  return `<div class="sep">
    <span class="sep-dot"></span>
    <span class="sep-dot"></span>
    <span class="sep-dot"></span>
  </div>`;
}


/* ── ALL HABITS PANEL ───────────────────────────────────── */
function showPanel() {
  const now = new Date(), nowM = nowMin();

  const sorted = [...habits]
    .map(h => ({ ...h, _r: parseRange(h.time) }))
    .sort((a, b) => {
      if (!a._r && !b._r) return 0;
      if (!a._r) return 1; if (!b._r) return -1;
      return a._r.start - b._r.start;
    });

  document.getElementById('panel-sub').textContent =
    `${habits.length} habit${habits.length !== 1 ? 's' : ''}`;

  document.getElementById('panel-list').innerHTML = sorted.map(h => {
    const r = h._r;
    const isNow = r && matchesDay(h.days, now) && r.start <= nowM && nowM < r.end;
    return `<div class="p-row${isNow ? ' is-now' : ''}">
      <p class="p-time">${fmtRange(h.time)}</p>
      <p class="p-name">${esc(h.title)}</p>
      <p class="p-days">${esc(daysLabel(h.days))}</p>
    </div>`;
  }).join('');

  showScreen('panel');
  const p = document.getElementById('panel');
  p.classList.add('slide-in');
  setTimeout(() => p.classList.remove('slide-in'), 350);
}


/* ── SCREEN MANAGER ─────────────────────────────────────── */
function showScreen(id) {
  ['lock','main','panel'].forEach(s =>
    document.getElementById(s).classList.toggle('active', s === id)
  );
}


/* ── UNLOCK ─────────────────────────────────────────────── */
const pwInput   = document.getElementById('pw');
const unlockBtn = document.getElementById('unlock-btn');
const errEl     = document.getElementById('lock-err');
const loader    = document.getElementById('loader');

pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });
unlockBtn.addEventListener('click', unlock);

document.getElementById('pw-toggle').addEventListener('click', () => {
  const show = pwInput.type === 'password';
  pwInput.type = show ? 'text' : 'password';
  document.getElementById('eye-svg').innerHTML = show
    ? `<path d="M17.94 17.94A10 10 0 0 1 12 20c-7 0-11-8-11-8a18 18 0 0 1 5.06-5.94"/>
       <path d="M9.9 4.24A9 9 0 0 1 12 4c7 0 11 8 11 8a18 18 0 0 1-2.16 3.19"/>
       <line x1="1" y1="1" x2="23" y2="23"/>`
    : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
       <circle cx="12" cy="12" r="3"/>`;
});

async function unlock() {
  const pw = pwInput.value.trim();
  if (!pw) { shakeErr('Enter your key'); return; }

  unlockBtn.disabled = true;
  errEl.textContent  = '';
  loader.classList.remove('hidden');

  try {
    const resp = await fetch('habits.enc');
    if (!resp.ok) throw new Error(`habits.enc not found (${resp.status})`);
    const enc  = await resp.json();
    const yaml = await decryptEnc(enc, pw);
    habits = parseYAML(yaml);
    if (!habits.length) throw new Error('No habits found in file');

    loader.classList.add('hidden');
    showScreen('main');
    startClock();
  } catch (e) {
    loader.classList.add('hidden');
    unlockBtn.disabled = false;
    shakeErr(e.name === 'OperationError' ? 'Wrong key — try again' : e.message);
  }
}

function shakeErr(msg) {
  errEl.textContent = msg;
  const f = document.querySelector('.lock-form');
  f.classList.remove('shake');
  void f.offsetWidth;
  f.classList.add('shake');
}

document.getElementById('fab').addEventListener('click', showPanel);
document.getElementById('fab-back').addEventListener('click', () => showScreen('main'));
</script>
