<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RegMap — Global Regulatory Agencies Explorer</title>
    <style>
        :root {
            --bg: #0d0f13;
            --surface: #161a20;
            --surface2: #1c2028;
            --surface3: #232832;
            --text: #e4e6eb;
            --text2: #b0b5bf;
            --text3: #7a7f8a;
            --accent: #5b9cf5;
            --accent-glow: rgba(91, 156, 245, 0.25);
            --accent-soft: rgba(91, 156, 245, 0.10);
            --border: #252a33;
            --border2: #2e3440;
            --danger: #e0556a;
            --success: #3fb986;
            --warning: #f0a855;
            --radius-sm: 10px;
            --radius: 14px;
            --radius-lg: 18px;
            --radius-xl: 22px;
            --shadow-card: 0 2px 12px rgba(0, 0, 0, 0.40);
            --shadow-elevated: 0 8px 30px rgba(0, 0, 0, 0.55);
            --font: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            font-size: 16px;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            -webkit-user-select: none;
            user-select: none;
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 3px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border2);
            border-radius: 20px;
        }

        /* Container */
        .app-container {
            width: 100%;
            max-width: 720px;
            padding: 16px 14px 40px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 4px 0 6px;
        }
        .logo-icon {
            width: 42px;
            height: 42px;
            border-radius: var(--radius-sm);
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
            box-shadow: 0 4px 18px var(--accent-glow);
        }
        .header-text {
            display: flex;
            flex-direction: column;
        }
        .app-title {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--text);
            line-height: 1.1;
        }
        .app-subtitle {
            font-size: 0.75rem;
            color: var(--text3);
            font-weight: 500;
            letter-spacing: 0.2px;
        }

        /* Search */
        .search-wrapper {
            position: relative;
        }
        .search-container {
            display: flex;
            align-items: center;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 0 6px 0 16px;
            gap: 8px;
            transition: all var(--transition);
            box-shadow: var(--shadow-card);
        }
        .search-container:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-soft), var(--shadow-elevated);
            background: var(--surface2);
        }
        .search-icon {
            flex-shrink: 0;
            color: var(--text3);
            transition: color var(--transition);
        }
        .search-container:focus-within .search-icon {
            color: var(--accent);
        }
        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 0.95rem;
            padding: 14px 0;
            font-family: var(--font);
            letter-spacing: -0.1px;
            min-width: 0;
        }
        .search-input::placeholder {
            color: var(--text3);
            font-weight: 400;
        }
        .clear-btn {
            flex-shrink: 0;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: none;
            background: var(--surface3);
            color: var(--text3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            font-size: 16px;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.8);
        }
        .clear-btn.visible {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }
        .clear-btn:active {
            background: var(--border2);
            color: var(--text);
            transform: scale(0.9);
        }

        /* Stats row */
        .stats-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .stat-chip {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text2);
            background: var(--surface2);
            padding: 7px 13px;
            border-radius: 20px;
            letter-spacing: -0.1px;
            border: 1px solid var(--border);
            white-space: nowrap;
        }
        .stat-chip .count {
            color: var(--accent);
            font-weight: 700;
        }

        /* Region filter pills */
        .region-filters {
            display: flex;
            gap: 7px;
            overflow-x: auto;
            padding: 2px 0;
            scrollbar-width: none;
            -ms-overflow-style: none;
            flex-wrap: nowrap;
        }
        .region-filters::-webkit-scrollbar {
            display: none;
        }
        .region-pill {
            flex-shrink: 0;
            padding: 8px 15px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            color: var(--text2);
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
            letter-spacing: -0.1px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .region-pill.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 2px 12px var(--accent-glow);
        }
        .region-pill:active {
            transform: scale(0.94);
            transition: transform 0.1s;
        }

        /* Agency list */
        .agency-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 200px;
        }
        .agency-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            flex-direction: column;
            gap: 4px;
            box-shadow: var(--shadow-card);
            -webkit-tap-highlight-color: transparent;
            position: relative;
            overflow: hidden;
        }
        .agency-card:active {
            transform: scale(0.985);
            background: var(--surface2);
            transition: transform 0.1s, background 0.1s;
        }
        .agency-card.expanded {
            background: var(--surface2);
            border-color: var(--border2);
            box-shadow: var(--shadow-elevated);
        }
        .card-main {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .card-flag {
            font-size: 1.6rem;
            flex-shrink: 0;
            width: 38px;
            text-align: center;
        }
        .card-info {
            flex: 1;
            min-width: 0;
        }
        .card-name {
            font-weight: 650;
            font-size: 0.9rem;
            letter-spacing: -0.2px;
            color: var(--text);
            line-height: 1.2;
        }
        .card-abbr {
            font-size: 0.73rem;
            color: var(--accent);
            font-weight: 700;
            letter-spacing: 0.3px;
            margin-top: 1px;
        }
        .card-country {
            font-size: 0.7rem;
            color: var(--text3);
            font-weight: 500;
        }
        .card-chevron {
            flex-shrink: 0;
            color: var(--text3);
            transition: transform var(--transition-slow);
            display: flex;
            align-items: center;
        }
        .agency-card.expanded .card-chevron {
            transform: rotate(180deg);
            color: var(--accent);
        }

        /* Expanded details */
        .card-details {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows var(--transition-slow);
        }
        .agency-card.expanded .card-details {
            grid-template-rows: 1fr;
        }
        .details-inner {
            overflow: hidden;
        }
        .details-content {
            padding-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-top: 1px solid var(--border);
            margin-top: 8px;
        }
        .detail-row {
            display: flex;
            gap: 8px;
            font-size: 0.76rem;
            line-height: 1.4;
        }
        .detail-label {
            color: var(--text3);
            font-weight: 500;
            flex-shrink: 0;
            min-width: 70px;
        }
        .detail-value {
            color: var(--text2);
            font-weight: 500;
            word-break: break-word;
        }
        .detail-value a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            word-break: break-all;
        }
        .detail-desc {
            font-size: 0.75rem;
            color: var(--text2);
            line-height: 1.5;
            margin-top: 2px;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text3);
        }
        .empty-state .emoji {
            font-size: 3rem;
            display: block;
            margin-bottom: 10px;
        }
        .empty-state p {
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* Loading shimmer */
        @keyframes shimmer {
            0% {
                background-position: -200px 0;
            }
            100% {
                background-position: 200px 0;
            }
        }

        /* Responsive tweaks */
        @media (min-width: 520px) {
            .app-container {
                padding: 20px 18px 50px;
            }
            .agency-card {
                padding: 16px 18px;
            }
            .card-name {
                font-size: 0.95rem;
            }
        }
    </style>
</head>

                    flag: "🇲🇻", website: "https://www.mfda.gov.mv", established: 2012,
                    desc: "Regulates food, drugs, and medical devices in the Maldives." },
                { name: "National Health Surveillance Service", abbr: "ISP", country: "Chile", region: "South America",
                    flag: "🇨🇱", website: "https://www.ispch.cl", established: 1929,
                    desc: "Public health institute regulating medicines and health products in Chile." },
                { name: "National Institute for Drugs and Food Surveillance", abbr: "INVIMA", country: "Colombia",
                    region: "South America", flag: "🇨🇴", website: "https://www.invima.gov.co", established: 1994,
                    desc: "Regulates drugs, food, medical devices, and cosmetics in Colombia." },
                { name: "National Administration of Drugs, Foods and Medical Devices", abbr: "ANMAT",
                    country: "Argentina", region: "South America", flag: "🇦🇷", website: "https://www.argentina.gob.ar/anmat",
                    established: 1992, desc: "Regulatory agency for health products in Argentina." },
                { name: "European Directorate for the Quality of Medicines", abbr: "EDQM", country: "European Union",
                    region: "Europe", flag: "🇪🇺", website: "https://www.edqm.eu", established: 1964,
                    desc: "Protects public health by setting quality standards for medicines in Europe." },
            ];

            // ────────────────────────────────────
            // DOM refs
            // ────────────────────────────────────
            const searchInput = document.getElementById('searchInput');
            const clearBtn = document.getElementById('clearBtn');
            const agencyList = document.getElementById('agencyList');
            const emptyState = document.getElementById('emptyState');
            const totalCount = document.getElementById('totalCount');
            const filteredCount = document.getElementById('filteredCount');
            const filteredChip = document.getElementById('filteredChip');
            const regionFilters = document.getElementById('regionFilters');
            const searchContainer = document.getElementById('searchContainer');

            let activeRegion = 'all';
            let searchQuery = '';
            let expandedCardId = null;

            // ────────────────────────────────────
            // Render
            // ────────────────────────────────────
            function getFilteredAgencies() {
                let filtered = agencies;
                if (activeRegion !== 'all') {
                    filtered = filtered.filter(a => a.region === activeRegion);
                }
                if (searchQuery.trim()) {
                    const q = searchQuery.trim().toLowerCase();
                    filtered = filtered.filter(a =>
                        a.name.toLowerCase().includes(q) ||
                        a.abbr.toLowerCase().includes(q) ||
                        a.country.toLowerCase().includes(q) ||
                        a.region.toLowerCase().includes(q)
                    );
                }
                return filtered;
            }

            function render() {
                const filtered = getFilteredAgencies();
                totalCount.textContent = agencies.length;

                if (searchQuery.trim() || activeRegion !== 'all') {
                    filteredChip.style.display = 'inline-flex';
                    filteredCount.textContent = filtered.length;
                } else {
                    filteredChip.style.display = 'none';
                }

                if (filtered.length === 0) {
                    agencyList.innerHTML = '';
                    emptyState.style.display = 'block';
                } else {
                    emptyState.style.display = 'none';
                    agencyList.innerHTML = filtered.map((a, idx) => {
                        const isExpanded = expandedCardId === idx;
                        return `
                        <div class="agency-card ${isExpanded ? 'expanded' : ''}" data-index="${idx}" data-abbr="${a.abbr}" data-name="${a.name}">
                            <div class="card-main">
                                <span class="card-flag">${a.flag}</span>
                                <div class="card-info">
                                    <div class="card-name">${escapeHtml(a.name)}</div>
                                    <div class="card-abbr">${escapeHtml(a.abbr)}</div>
                                    <div class="card-country">${escapeHtml(a.country)} · ${escapeHtml(a.region)}</div>
                                </div>
                                <span class="card-chevron">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                        <polyline points="6 9 12 15 18 9"/>
                                    </svg>
                                </span>
                            </div>
                            <div class="card-details">
                                <div class="details-inner">
                                    <div class="details-content">
                                        <div class="detail-row">
                                            <span class="detail-label">Est.</span>
                                            <span class="detail-value">${a.established}</span>
                                        </div>
                                        <div class="detail-row">
                                            <span class="detail-label">Website</span>
                                            <span class="detail-value"><a href="${a.website}" target="_blank" rel="noopener" onclick="event.stopPropagation();">${a.website.replace(/^https?:\/\//, '')}</a></span>
                                        </div>
                                        <p class="detail-desc">${escapeHtml(a.desc)}</p>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                    }).join('');
                }

                // Re-attach click listeners
                document.querySelectorAll('.agency-card').forEach(card => {
                    card.addEventListener('click', function(e) {
                        // Don't toggle if clicking a link
                        if (e.target.closest('a')) return;
                        const idx = parseInt(this.dataset.index);
                        if (expandedCardId === idx) {
                            expandedCardId = null;
                        } else {
                            expandedCardId = idx;
                        }
                        render();
                        // Scroll to the expanded card smoothly
                        setTimeout(() => {
                            if (expandedCardId !== null) {
                                const expandedCard = document.querySelector('.agency-card.expanded');
                                if (expandedCard) {
                                    expandedCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                                }
                            }
                        }, 100);
                    });
                });
            }

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ────────────────────────────────────
            // Event Listeners
            // ────────────────────────────────────
            searchInput.addEventListener('input', function() {
                searchQuery = this.value;
                expandedCardId = null;
                updateClearBtn();
                render();
            });

            clearBtn.addEventListener('click', function() {
                searchInput.value = '';
                searchQuery = '';
                expandedCardId = null;
                updateClearBtn();
                render();
                searchInput.focus();
            });

            function updateClearBtn() {
                if (searchQuery.trim()) {
                    clearBtn.classList.add('visible');
                } else {
                    clearBtn.classList.remove('visible');
                }
            }

            // Region filter pills
            regionFilters.addEventListener('click', function(e) {
                const pill = e.target.closest('.region-pill');
                if (!pill) return;
                const region = pill.dataset.region;
                if (region === activeRegion) return;
                activeRegion = region;
                expandedCardId = null;

                // Update active pill
                document.querySelectorAll('.region-pill').forEach(p => p.classList.remove('active'));
                pill.classList.add('active');

                render();

                // Scroll pills to keep active visible
                pill.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            });

            // Keyboard shortcut: Escape to clear search
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && document.activeElement === searchInput) {
                    searchInput.value = '';
                    searchQuery = '';
                    expandedCardId = null;
                    updateClearBtn();
                    render();
                    searchInput.blur();
                }
            });

            // Focus search on container tap (for mobile ease)
            searchContainer.addEventListener('click', function(e) {
                if (e.target === searchContainer || e.target.classList.contains('search-icon')) {
                    searchInput.focus();
                }
            });

            // ────────────────────────────────────
            // Init
            // ────────────────────────────────────
            updateClearBtn();
            render();

            // Log welcome
            console.log('🌐 RegMap — Global Regulatory Agencies Explorer ready.');
            console.log(`   ${agencies.length} agencies across ${[...new Set(agencies.map(a=>a.region))].join(', ')}`);
        })();
    </script>
</body>
</html>
