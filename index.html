<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>AI Assisted Projects</title>
  

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7XKRN7ZBPJ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
  
    gtag('config', 'G-7XKRN7ZBPJ');

  <!-- Google Ads Script -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2519139199762060" crossorigin="anonymous"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

  <style>
    :root {
      --bg:        #0d0d11;
      --surface:   #16161d;
      --border:    #242430;
      --border-hi: #38384a;
      --text-1:    #e0e0ea;
      --text-2:    #888898;
      --text-3:    #4c4c5e;
      --accent:    #9f7aea;
      --accent-bg: rgba(159,122,234,.1);
      --accent-br: rgba(159,122,234,.35);
      --r:         14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: 'Figtree', sans-serif;
      -webkit-tap-highlight-color: transparent;
      min-height: 100dvh;
    }

    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 20px 16px max(80px, env(safe-area-inset-bottom));
    }

    /* ── Search ── */
    .search-wrap {
      position: relative;
      margin-bottom: 14px;
    }
    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      translate: 0 -50%;
      color: var(--text-3);
      width: 16px;
      height: 16px;
      pointer-events: none;
    }
    #search {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 13px 16px 13px 42px;
      color: var(--text-1);
      font-family: inherit;
      font-size: 15px;
      outline: none;
      transition: border-color .15s;
      -webkit-appearance: none;
    }
    #search::placeholder { color: var(--text-3); }
    #search:focus { border-color: var(--accent); }

    /* ── Filter chips ── */
    .chips {
      display: flex;
      gap: 7px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      margin-bottom: 16px;
      padding-bottom: 2px;
    }
    .chips::-webkit-scrollbar { display: none; }

    .chip {
      flex-shrink: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 6px 14px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
      cursor: pointer;
      transition: all .15s;
    }
    .chip.active {
      background: var(--accent-bg);
      border-color: var(--accent-br);
      color: var(--accent);
    }
    .chip:active { opacity: .6; }

    /* ── Toolbar (count + sort) ── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    #count {
      font-size: 12px;
      color: var(--text-3);
    }
    #sortBtn {
      background: none;
      border: none;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-2);
      cursor: pointer;
      padding: 4px 0 4px 12px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    #sortBtn:active { color: var(--accent); }
    #sortBtn svg { width: 11px; height: 11px; flex-shrink: 0; }

    /* ── Card list ── */
    #list { display: flex; flex-direction: column; gap: 16px; }

    /* ── Card ── */
    .card {
      display: flex;
      align-items: flex-start;
      gap: 13px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px 15px;
      text-decoration: none;
      color: inherit;
      transition: border-color .15s, background .15s, scale .1s;
      animation: up .3s ease both;
    }
    .card:active {
      background: #1c1c25;
      border-color: var(--border-hi);
      scale: .975;
    }
    @media (hover: hover) {
      .card:hover { background: #1c1c25; border-color: var(--border-hi); }
    }
    @keyframes up {
      from { opacity: 0; translate: 0 6px; }
      to   { opacity: 1; translate: 0 0; }
    }

    /* ── Icon ── */
    .card-icon {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border-radius: 9px;
      background: var(--accent-bg);
      display: grid;
      place-items: center;
      font-size: 15px;
      color: var(--accent);
      overflow: hidden;
    }
    .card-icon img { width: 100%; height: 100%; object-fit: cover; }
    .card-icon.initial { font-size: 14px; font-weight: 600; }

    /* ── Content ── */
    .card-body { flex: 1; min-width: 0; }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* clamped by default; .open overrides */
    .card-desc {
      font-size: 13px;
      color: var(--text-2);
      margin-top: 3px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-desc.open {
      display: block;
      overflow: visible;
    }

    .more-btn {
      background: none;
      border: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--accent);
      cursor: pointer;
      padding: 0;
      line-height: inherit;
    }
    .more-btn:active { opacity: .6; }

    /* ── Arrow ── */
    .card-arrow {
      flex-shrink: 0;
      color: var(--text-3);
      margin-top: 3px;
      font-size: 11px;
      transition: color .15s;
    }
    .card:active .card-arrow,
    .card:hover .card-arrow { color: var(--accent); }

    /* ── States ── */
    .state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-3);
      font-size: 14px;
      line-height: 1.6;
    }
    .state i { display: block; font-size: 26px; margin-bottom: 12px; }
    .state strong { color: var(--text-2); display: block; margin-bottom: 6px; }

    /* ── Loader ── */
    .loader {
      width: 30px; height: 30px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      margin: 60px auto;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { rotate: 360deg; } }

    /* ── Footer ── */
    .page-footer {
      text-align: center;
      padding: 28px 0 4px;
    }
    #reloadBtn {
      background: none;
      border: none;
      font-family: inherit;
      font-size: 12px;
      color: var(--text-3);
      cursor: pointer;
      padding: 8px 20px;
      border-radius: 50px;
      transition: color .15s;
    }
    #reloadBtn:active { color: var(--text-2); }
  </style>
</head>
<body>

  
<!-- test ad -->
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-2519139199762060"
       data-ad-slot="3826477206"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script>
       (adsbygoogle = window.adsbygoogle || []).push({});

<main>

  <div class="search-wrap">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="8.5" cy="8.5" r="5.5"/><path d="m14 14 3 3"/>
    </svg>
    <input type="search" id="search" placeholder="Search projects…" autocomplete="off" spellcheck="false">
  </div>

  <div class="chips" id="chips"></div>

  <div class="toolbar" id="toolbar" hidden>
    <span id="count"></span>
    <button id="sortBtn">
      <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <path d="M1 3h10M3 6h6M5 9h2"/>
      </svg>
      <span id="sortLabel">Default</span>
    </button>
  </div>

  <div id="list"><div class="loader"></div></div>

  <div class="page-footer" id="pageFooter" hidden>
    <button id="reloadBtn">↻ refresh</button>
  </div>

</main>
<script>
  const YAML_PATH  = 'projects.yml';
  const CACHE_KEY  = 'aiasp_v1';
  const CACHE_TTL  = 3_600_000; // 1 hour ms
  const DESC_LIMIT = 95;        // chars before "more" appears

  let all         = [];
  let activeTag   = 'all';
  let sortMode    = 'default'; // 'default' | 'az' | 'za'
  let searchQuery = '';
  const expanded  = new Set(); // _idx values of expanded cards

  const SORT_CYCLE  = ['default', 'az', 'za'];
  const SORT_LABELS = { default: 'Default', az: 'A → Z', za: 'Z → A' };

  // ── Cache ──────────────────────────────────────────────────────
  function saveCache(text) {
    try { localStorage.setItem(CACHE_KEY, JSON.stringify({ t: Date.now(), v: text })); } catch {}
  }
  function loadCache() {
    try {
      const c = JSON.parse(localStorage.getItem(CACHE_KEY));
      if (c && Date.now() - c.t < CACHE_TTL) return c.v;
    } catch {}
    return null;
  }
  function clearCache() { try { localStorage.removeItem(CACHE_KEY); } catch {} }

  // ── Icon ───────────────────────────────────────────────────────
  const isURL = s => s && /^(https?:|data:)/.test(s);
  const FA6   = {
    'fa-plus-square':  'fa-square-plus',
    'fa-minus-square': 'fa-square-minus',
    'fa-times':        'fa-xmark',
    'fa-inr':          'fa-indian-rupee-sign',
  };
  function normalizeFA(icon) {
    if (!icon) return 'fa-solid fa-cube';
    let s = icon.trim();
    for (const [k, v] of Object.entries(FA6)) s = s.replace(k, v);
    s = s.replace(/\bfa-(regular|light|thin|duotone)\b/, '').trim();
    if (!s.includes('fa-solid')) s = 'fa-solid ' + s;
    return s;
  }

  // ── Escape ─────────────────────────────────────────────────────
  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g,
      c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
  }

  // ── Derived list ───────────────────────────────────────────────
  function getVisible() {
    let list = activeTag === 'all' ? all : all.filter(p => p.tags.includes(activeTag));
    const q = searchQuery.trim().toLowerCase();
    if (q) list = list.filter(p =>
      p.title.toLowerCase().includes(q) ||
      p.description.toLowerCase().includes(q)
    );
    if (sortMode === 'az') list = [...list].sort((a, b) => a.title.localeCompare(b.title));
    if (sortMode === 'za') list = [...list].sort((a, b) => b.title.localeCompare(a.title));
    return list;
  }

  // ── Card HTML ──────────────────────────────────────────────────
  function cardHtml(p, i) {
    const initial  = esc(p.title[0] ?? '?');
    const iconHtml = isURL(p.icon)
      ? `<img src="${esc(p.icon)}" alt=""
             onerror="this.parentNode.classList.add('initial');this.parentNode.textContent='${initial}';">`
      : `<i class="${esc(normalizeFA(p.icon))}"></i>`;

    const isLong = p.description.length > DESC_LIMIT;
    const isOpen = expanded.has(p._idx);
    let descHtml;
    if (!isLong) {
      descHtml = `<div class="card-desc">${esc(p.description)}</div>`;
    } else if (isOpen) {
      descHtml = `<div class="card-desc open">${esc(p.description)}&nbsp;<button class="more-btn" data-more="${p._idx}">less</button></div>`;
    } else {
      descHtml = `<div class="card-desc">${esc(p.description.slice(0, DESC_LIMIT))}…&nbsp;<button class="more-btn" data-more="${p._idx}">more</button></div>`;
    }

    return `
      <a class="card" href="${esc(p.url)}" target="_blank" rel="noopener noreferrer"
         style="animation-delay:${Math.min(i * 25, 180)}ms">
        <div class="card-icon">${iconHtml}</div>
        <div class="card-body">
          <div class="card-title">${esc(p.title)}</div>
          ${descHtml}
        </div>
        <div class="card-arrow"><i class="fa-solid fa-arrow-up-right-from-square"></i></div>
      </a>`;
  }

  // ── Render ─────────────────────────────────────────────────────
  function render() {
    const visible = getVisible();
    document.getElementById('list').innerHTML = visible.length
      ? visible.map(cardHtml).join('')
      : `<div class="state"><i class="fa-solid fa-magnifying-glass"></i>No results</div>`;
    document.getElementById('count').textContent =
      `${visible.length} of ${all.length}`;
  }

  function buildChips() {
    const tags    = [...new Set(all.flatMap(p => p.tags))].sort();
    const chipsEl = document.getElementById('chips');
    // hide chips entirely if no project has tags
    chipsEl.hidden = tags.length === 0;
    if (tags.length === 0) return;
    chipsEl.innerHTML = ['all', ...tags].map(t =>
      `<button class="chip${t === activeTag ? ' active' : ''}" data-tag="${esc(t)}">
        ${t === 'all' ? 'All' : esc(t)}
      </button>`
    ).join('');
  }

  // ── Events ─────────────────────────────────────────────────────

  // Read more / less  (delegation; prevent card link from firing)
  document.getElementById('list').addEventListener('click', e => {
    const btn = e.target.closest('[data-more]');
    if (!btn) return;
    e.preventDefault();
    e.stopPropagation();
    const idx = +btn.dataset.more;
    expanded.has(idx) ? expanded.delete(idx) : expanded.add(idx);
    render();
  });

  // Filter chips
  document.getElementById('chips').addEventListener('click', e => {
    const chip = e.target.closest('[data-tag]');
    if (!chip || chip.dataset.tag === activeTag) return;
    activeTag = chip.dataset.tag;
    document.querySelectorAll('.chip').forEach(c =>
      c.classList.toggle('active', c.dataset.tag === activeTag));
    expanded.clear();
    render();
  });

  // Sort (cycles default → A–Z → Z–A → default)
  document.getElementById('sortBtn').addEventListener('click', () => {
    sortMode = SORT_CYCLE[(SORT_CYCLE.indexOf(sortMode) + 1) % SORT_CYCLE.length];
    document.getElementById('sortLabel').textContent = SORT_LABELS[sortMode];
    render();
  });

  // Search
  let searchTimer;
  document.getElementById('search').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      searchQuery = e.target.value;
      expanded.clear();
      render();
    }, 150);
  });

  // Refresh button — clear cache, reset state, re-fetch
  document.getElementById('reloadBtn').addEventListener('click', async () => {
    clearCache();
    expanded.clear();
    activeTag   = 'all';
    sortMode    = 'default';
    searchQuery = '';
    document.getElementById('search').value = '';
    document.getElementById('sortLabel').textContent = SORT_LABELS.default;
    await loadProjects(true);
  });

  // ── Parse ──────────────────────────────────────────────────────
  function parseYAML(text) {
    const parsed = jsyaml.load(text);
    if (!Array.isArray(parsed)) throw new Error('YAML root must be an array');
    return parsed.map((p, i) => ({
      _idx:        i,
      title:       String(p.title       ?? 'Untitled'),
      description: String(p.description ?? ''),
      icon:        p.icon ?? null,
      url:         String(p.url         ?? '#'),
      tags: Array.isArray(p.tags) ? p.tags.map(String)
          : p.tags                ? [String(p.tags)]
          : [],
    }));
  }

  // ── Load ───────────────────────────────────────────────────────
  async function loadProjects(force = false) {
    const footer  = document.getElementById('pageFooter');
    const toolbar = document.getElementById('toolbar');
    footer.hidden = toolbar.hidden = true;

    if (!force) {
      const cached = loadCache();
      if (cached) {
        try {
          all = parseYAML(cached);
          buildChips();
          render();
          footer.hidden = toolbar.hidden = false;
          return;
        } catch { /* stale/corrupt cache — fall through to fetch */ }
      }
    }

    document.getElementById('list').innerHTML = `<div class="loader"></div>`;
    try {
      const res = await fetch(`${YAML_PATH}?_=${Date.now()}`); // bust browser cache on force reload
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      saveCache(text);
      all = parseYAML(text);
      buildChips();
      render();
      footer.hidden = toolbar.hidden = false;
    } catch (err) {
      document.getElementById('list').innerHTML = `
        <div class="state">
          <i class="fa-solid fa-triangle-exclamation" style="color:#f87171"></i>
          <strong>Failed to load projects</strong>
          <small style="color:var(--text-3)">${esc(err.message)}</small>
        </div>`;
    }
  }

  loadProjects();
</script>
</body>
</html>
