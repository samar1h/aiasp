<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AI Projects</title>
    <!-- Tailwind CSS CDN (lightweight, mobile-first) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom config to override Tailwind's default dark/light -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'card-bg': '#1e1f28',
                        'surface': '#2a2b36',
                    }
                }
            }
        }
    </script>
    <!-- Font Awesome 6 (free icons, optional but nice) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- js-yaml CDN to parse YAML -->
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <style>
        /* simple custom scroll & tap highlight removal for mobile */
        * {
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0f0f14;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }
        /* card hover effect only on devices that support hover (non-intrusive) */
        @media (hover: hover) {
            .card-hover:hover {
                transform: translateY(-2px);
                transition: all 0.2s ease;
                background-color: #2d2e3a;
            }
        }
        .card-hover {
            transition: all 0.2s ease;
        }
        /* hide scrollbar for cleaner look on cards container but keep functionality */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* simple loading & error states */
        .loader {
            border: 3px solid #2a2b36;
            border-top: 3px solid #8b5cf6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        input:focus {
            outline: none;
            ring: 2px solid #8b5cf6;
            border-color: #8b5cf6;
        }
    </style>
</head>
<body class="bg-[#0f0f14] text-gray-200 antialiased">
    <main class="max-w-3xl mx-auto px-4 py-6 pb-20">
        <!-- header with vibe -->
        <div class="flex items-center justify-between mb-6 flex-wrap gap-2">
            <div>
                <h1 class="text-2xl font-semibold tracking-tight bg-gradient-to-r from-purple-400 to-indigo-400 bg-clip-text text-transparent">🧠 AI Junk Drawer</h1>
                <p class="text-xs text-gray-500 mt-0.5">random ai-generated projects · use at your own risk</p>
            </div>
            <div class="text-right">
                <i class="fa-regular fa-hard-drive text-gray-600 text-xl"></i>
            </div>
        </div>

        <!-- search bar -->
        <div class="relative mb-6">
            <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
            <input type="text" id="searchInput" placeholder="Search projects..." 
                   class="w-full bg-[#1e1f28] border border-gray-700 rounded-2xl py-3.5 pl-11 pr-4 text-base text-gray-200 placeholder:text-gray-500 focus:border-purple-500/70 transition-all">
        </div>

        <!-- cards container -->
        <div id="cardsContainer" class="space-y-3">
            <!-- loader will appear here -->
            <div class="loader"></div>
        </div>

    
    </main>

    <script>
        // ---------- CONFIG ----------
        // Path to your YAML file (relative to this index.html in the repo)
        const YAML_PATH = 'projects.yml';
        
        // ---------- GLOBALS ----------
        let projects = [];      // store all projects after load
        let renderTimeout = null;

        // ---------- HELPER: Fetch & parse YAML ----------
        async function loadProjects() {
            const container = document.getElementById('cardsContainer');
            try {
                // Show loader
                container.innerHTML = `<div class="loader"></div>`;
                
                const response = await fetch(YAML_PATH);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: Could not load projects.yml`);
                }
                const yamlText = await response.text();
                // Parse YAML using js-yaml
                const parsed = jsyaml.load(yamlText);
                
                // Expected format: array of objects with title, description, icon, url
                if (!Array.isArray(parsed)) {
                    throw new Error('YAML root must be an array of projects');
                }
                
                // Validate each item minimally (fill missing icon with default)
                projects = parsed.map((item, idx) => ({
                    id: idx,
                    title: item.title || 'Untitled',
                    description: item.description || 'No description provided',
                    icon: item.icon || null,   // can be null
                    url: item.url || '#'
                }));
                
                if (projects.length === 0) {
                    container.innerHTML = `<div class="text-center py-12 text-gray-500"><i class="fa-regular fa-folder-open text-3xl mb-2 block"></i> No projects found in YAML.</div>`;
                    return;
                }
                
                // initial render
                renderProjects(projects);
                
            } catch (err) {
                console.error('YAML load error:', err);
                container.innerHTML = `
                    <div class="bg-red-950/30 border border-red-800/50 rounded-2xl p-5 text-center">
                        <i class="fa-solid fa-triangle-exclamation text-red-400 text-2xl mb-2 block"></i>
                        <p class="text-red-300 font-medium">Failed to load projects.yml</p>
                        <p class="text-gray-400 text-xs mt-2">${err.message}</p>
                        <p class="text-gray-500 text-xs mt-3">Make sure <span class="font-mono bg-black/30 px-1 rounded">projects.yml</span> exists in the same folder as index.html</p>
                    </div>
                `;
            }
        }

        // ---------- RENDER CARDS based on filtered list ----------
        function renderProjects(projectsToRender) {
            const container = document.getElementById('cardsContainer');
            
            if (!projectsToRender.length) {
                container.innerHTML = `<div class="text-center py-12 text-gray-500"><i class="fa-regular fa-magnifying-glass text-3xl mb-2 block"></i> No matching projects</div>`;
                return;
            }
            
            // Build HTML (cards)
            let html = '';
            for (const proj of projectsToRender) {
                // Icon handling: if icon starts with http / https -> img tag, else if fa-* -> fontawesome class, else if empty -> default icon
                let iconHtml = '';
                if (proj.icon && (proj.icon.startsWith('http://') || proj.icon.startsWith('https://') || proj.icon.startsWith('data:'))) {
                    iconHtml = `<img src="${escapeHtml(proj.icon)}" class="w-8 h-8 rounded-full object-cover bg-gray-800 flex-shrink-0" alt="icon" onerror="this.onerror=null;this.parentElement.innerHTML='<i class=\'fa-regular fa-cube text-purple-400 text-xl\'></i>';">`;
                } else if (proj.icon && proj.icon.startsWith('fa-')) {
                    // treat as font awesome class
                    iconHtml = `<i class="${escapeHtml(proj.icon)} text-purple-400 text-xl w-8 text-center flex-shrink-0"></i>`;
                } else {
                    // default fallback icon
                    iconHtml = `<i class="fa-regular fa-cube text-purple-400 text-xl w-8 text-center flex-shrink-0"></i>`;
                }
                
                html += `
                    <div class="card-hover bg-[#1e1f28] rounded-2xl border border-gray-800 p-4 transition-all duration-200">
                        <a href="${escapeHtml(proj.url)}" target="_blank" rel="noopener noreferrer" class="block">
                            <div class="flex gap-3 items-start">
                                <div class="flex-shrink-0 mt-0.5">
                                    ${iconHtml}
                                </div>
                                <div class="flex-1 min-w-0">
                                    <h3 class="font-semibold text-base text-gray-100 truncate">${escapeHtml(proj.title)}</h3>
                                    <p class="text-gray-400 text-sm mt-1 break-words line-clamp-2">${escapeHtml(proj.description)}</p>
                                    <div class="flex items-center gap-1 mt-2 text-xs text-purple-400/70">
                                        <i class="fa-regular fa-arrow-up-right-from-square text-[10px]"></i>
                                        <span>open</span>
                                    </div>
                                </div>
                            </div>
                        </a>
                    </div>
                `;
            }
            container.innerHTML = html;
        }
        
        // simple escape to avoid XSS
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }
        
        // ---------- FILTER LOGIC (search by title or description) ----------
        function filterProjects(searchTerm) {
            if (!searchTerm.trim()) {
                renderProjects(projects);
                return;
            }
            const term = searchTerm.trim().toLowerCase();
            const filtered = projects.filter(proj => 
                proj.title.toLowerCase().includes(term) || 
                proj.description.toLowerCase().includes(term)
            );
            renderProjects(filtered);
        }
        
        // ---------- DEBOUNCED SEARCH HANDLER ----------
        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            if (!searchInput) return;
            
            searchInput.addEventListener('input', (e) => {
                if (renderTimeout) clearTimeout(renderTimeout);
                renderTimeout = setTimeout(() => {
                    filterProjects(e.target.value);
                }, 200);
            });
        }
        
        // ---------- INIT ----------
        async function init() {
            setupSearch();
            await loadProjects();
        }
        
        init();
    </script>
</body>
</html>
