<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FFmpeg in the Browser — Test Page</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    max-width: 640px;
    margin: 40px auto;
    padding: 0 20px;
    background: #0f1115;
    color: #e6e6e6;
  }
  h1 { font-size: 1.4rem; }
  p.sub { color: #9aa0a6; font-size: 0.95rem; }
  .box {
    border: 1px solid #2a2d34;
    border-radius: 10px;
    padding: 20px;
    margin-top: 20px;
    background: #16181d;
  }
  input[type="file"] {
    display: block;
    margin: 10px 0;
  }
  button {
    background: #4f7cff;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 0.95rem;
    cursor: pointer;
  }
  button:disabled {
    background: #333844;
    cursor: not-allowed;
  }
  #log {
    background: #0a0b0d;
    border-radius: 8px;
    padding: 12px;
    margin-top: 16px;
    font-family: monospace;
    font-size: 0.8rem;
    white-space: pre-wrap;
    max-height: 220px;
    overflow-y: auto;
    color: #7ee787;
  }
  video {
    width: 100%;
    margin-top: 14px;
    border-radius: 8px;
    background: black;
  }
  .status {
    font-weight: 600;
    margin-top: 10px;
  }
  a.download {
    display: inline-block;
    margin-top: 12px;
    color: #4f7cff;
  }
</style>
</head>
<body>

<h1>🎬 FFmpeg-in-the-Browser Test</h1>
<p class="sub">This page runs real FFmpeg entirely on YOUR device — nothing is uploaded to any server. Pick a short video, click Convert, and watch the log below.</p>

<div class="box">
  <label>1. Choose a short video file (MP4 recommended, keep it small/short for this test):</label>
  <input type="file" id="fileInput" accept="video/*" />

  <label style="display:block; margin-top:14px;">2. Run a test conversion (converts to a smaller/different format):</label>
  <button id="runBtn" disabled>Convert Video</button>

  <div class="status" id="status">Waiting for FFmpeg engine to load...</div>
  <div id="log"></div>

  <video id="outputVideo" controls style="display:none;"></video>
  <div id="downloadArea"></div>
</div>

<!-- Single-threaded ffmpeg.wasm build: no special server headers required, works on GitHub Pages as-is -->
<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

<script>
  const { createFFmpeg, fetchFile } = FFmpeg;
  const ffmpeg = createFFmpeg({
    log: true,
    corePath: "https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js",
  });

  const logEl = document.getElementById("log");
  const statusEl = document.getElementById("status");
  const runBtn = document.getElementById("runBtn");
  const fileInput = document.getElementById("fileInput");
  const outputVideo = document.getElementById("outputVideo");
  const downloadArea = document.getElementById("downloadArea");

  function appendLog(msg) {
    logEl.textContent += msg + "\n";
    logEl.scrollTop = logEl.scrollHeight;
  }

  ffmpeg.setLogger(({ type, message }) => {
    appendLog(`[${type}] ${message}`);
  });

  let selectedFile = null;

  fileInput.addEventListener("change", (e) => {
    selectedFile = e.target.files[0];
    if (selectedFile) {
      appendLog(`Selected file: ${selectedFile.name} (${(selectedFile.size / 1024 / 1024).toFixed(2)} MB)`);
      runBtn.disabled = false;
    }
  });

  (async () => {
    try {
      appendLog("Loading FFmpeg core (this downloads ~25MB the first time)...");
      await ffmpeg.load();
      statusEl.textContent = "✅ FFmpeg engine loaded. Ready to test.";
      appendLog("FFmpeg engine loaded successfully.");
    } catch (err) {
      statusEl.textContent = "❌ Failed to load FFmpeg engine.";
      appendLog("ERROR loading FFmpeg: " + err.message);
    }
  })();

  runBtn.addEventListener("click", async () => {
    if (!selectedFile) return;
    runBtn.disabled = true;
    statusEl.textContent = "⏳ Converting... check log below.";
    outputVideo.style.display = "none";
    downloadArea.innerHTML = "";

    try {
      const inputName = "input_" + selectedFile.name.replace(/\s+/g, "_");
      const outputName = "output.mp4";

      appendLog("Writing file into virtual filesystem...");
      ffmpeg.FS("writeFile", inputName, await fetchFile(selectedFile));

      appendLog("Running FFmpeg command: scale down + re-encode...");
      // Simple, fast test operation: scale to 480p width, re-encode to mp4
      await ffmpeg.run(
        "-i", inputName,
        "-vf", "scale=480:-1",
        "-preset", "ultrafast",
        outputName
      );

      appendLog("Reading output file...");
      const data = ffmpeg.FS("readFile", outputName);

      const blob = new Blob([data.buffer], { type: "video/mp4" });
      const url = URL.createObjectURL(blob);

      outputVideo.src = url;
      outputVideo.style.display = "block";

      const link = document.createElement("a");
      link.href = url;
      link.download = "converted_output.mp4";
      link.className = "download";
      link.textContent = "⬇️ Download converted file";
      downloadArea.appendChild(link);

      statusEl.textContent = "✅ Success! FFmpeg ran entirely in your browser.";
      appendLog("Done. If you can play/download the video above, FFmpeg is working client-side with no server processing.");
    } catch (err) {
      statusEl.textContent = "❌ Something went wrong during conversion.";
      appendLog("ERROR: " + err.message);
    } finally {
      runBtn.disabled = false;
    }
  });
</script>

</body>
</html>
