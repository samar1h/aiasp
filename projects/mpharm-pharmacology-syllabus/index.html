<html lang="en">
<head>

<title>🐾 M.Pharm Pharmacology — Syllabus</title>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #181b24;
    --surface2: #1f2230;
    --border: #2a2d3a;
    --accent: #7c6af5;
    --accent2: #5a4fd4;
    --accentglow: rgba(124,106,245,0.15);
    --text: #e6e8f0;
    --muted: #7a7d90;
    --tag: #20222e;
    --good: #3aaf7a;
    --warn: #f0a830;
    --radius: 11px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 15px; line-height: 1.55; -webkit-text-size-adjust: 100%; }
  body { min-height: 100vh; padding-bottom: 100px; }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 13px 16px 10px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .paw { font-size: 22px; }
  .app-title { font-size: 17px; font-weight: 700; color: var(--accent); letter-spacing: -0.3px; }
  .app-sub { font-size: 11px; color: var(--muted); }
  .search-wrap { position: relative; }
  .search-wrap input {
    width: 100%; padding: 9px 12px 9px 36px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 20px; color: var(--text); font-size: 14px;
    outline: none; -webkit-appearance: none;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; pointer-events: none; }
  .search-clear {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: var(--muted); color: var(--bg); border: none; border-radius: 50%;
    width: 18px; height: 18px; font-size: 11px; cursor: pointer;
    display: none; align-items: center; justify-content: center;
    font-weight: 700; line-height: 1;
  }
  .search-clear.show { display: flex; }

  .sem-pills { display: flex; gap: 8px; flex-wrap: wrap; padding: 12px 16px 10px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 89px; z-index: 99; }
  .sem-pill {
    flex-shrink: 0; padding: 6px 15px; border-radius: 20px; border: 1px solid var(--border);
    background: var(--tag); color: var(--muted); font-size: 13px;
    font-weight: 500; cursor: pointer; transition: all .18s; white-space: nowrap;
  }
  .sem-pill.active, .sem-pill:hover { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .sem-pill.s2.active, .sem-pill.s2:hover { background: #1a7a4a; border-color: #1a7a4a; }
  .sem-pill.s3.active, .sem-pill.s3:hover { background: #7a4a1a; border-color: #7a4a1a; }
  .sem-pill.s4.active, .sem-pill.s4:hover { background: #4a2a7a; border-color: #4a2a7a; }

  .section { display: none; padding: 14px 16px; }
  .section.active { display: block; }

  .subject-list { display: flex; flex-direction: column; gap: 8px; }
  .subject-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: border-color .18s; }
  .subject-card:hover { border-color: var(--accent); }
  .subject-header { padding: 13px 15px; cursor: pointer; display: flex; align-items: flex-start; gap: 10px; -webkit-tap-highlight-color: transparent; user-select: none; }
  .subject-code { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 0.5px; background: var(--accentglow); padding: 2px 7px; border-radius: 5px; flex-shrink: 0; margin-top: 2px; white-space: nowrap; }
  .subject-name { font-size: 15px; font-weight: 600; flex: 1; }
  .subject-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .chevron { margin-left: auto; font-size: 13px; color: var(--muted); transition: transform .22s; flex-shrink: 0; padding-top: 2px; }
  .subject-card.open .chevron { transform: rotate(180deg); }
  .subject-body { display: none; padding: 0 15px 15px; border-top: 1px solid var(--border); }
  .subject-card.open .subject-body { display: block; }

  .meta-row { display: flex; gap: 7px; flex-wrap: wrap; padding: 10px 0 12px; }
  .meta-badge { font-size: 11px; padding: 3px 9px; border-radius: 5px; background: var(--tag); color: var(--muted); border: 1px solid var(--border); }
  .meta-badge.marks { color: var(--good); border-color: #1a4a2a; background: #0f2418; }

  .info-block { margin-bottom: 13px; }
  .info-label { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 6px; }
  .info-text { font-size: 13.5px; color: #c0c2cc; line-height: 1.6; }
  .obj-list { padding-left: 0; list-style: none; }
  .obj-list li { font-size: 13px; color: #b8bac8; padding: 3px 0 3px 18px; position: relative; }
  .obj-list li::before { content: "→"; position: absolute; left: 0; color: var(--accent); }

  .units-section { margin-bottom: 12px; }
  .unit-item { border-left: 2px solid var(--border); padding: 8px 12px; margin-bottom: 7px; border-radius: 0 7px 7px 0; background: var(--surface2); }
  .unit-item:hover { border-left-color: var(--accent); }
  .unit-header { display: flex; align-items: center; gap: 8px; cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none; }
  .unit-num { font-size: 10px; font-weight: 700; color: var(--accent); letter-spacing: 0.5px; background: var(--accentglow); padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }
  .unit-title-text { font-size: 13.5px; font-weight: 600; flex: 1; }
  .unit-hrs { font-size: 11px; color: var(--muted); flex-shrink: 0; }
  .unit-chevron { font-size: 11px; color: var(--muted); transition: transform .2s; }
  .unit-item.open .unit-chevron { transform: rotate(180deg); }
  .unit-body { display: none; font-size: 13px; color: #b0b2c0; line-height: 1.65; margin-top: 8px; }
  .unit-item.open .unit-body { display: block; }

  .refs-section { margin-top: 8px; }
  .ref-item { font-size: 12.5px; color: #9a9cb0; padding: 5px 0; border-top: 1px solid var(--border); line-height: 1.5; }
  .ref-num { color: var(--accent); font-weight: 600; margin-right: 4px; }
  .website-link { color: #6ab4f5; word-break: break-all; font-size: 12px; }

  .practical-list { list-style: none; margin-top: 8px; }
  .practical-list li { font-size: 13px; color: #b0b2c0; padding: 5px 0 5px 22px; border-top: 1px solid var(--border); position: relative; }
  .practical-list li::before { content: attr(data-n); position: absolute; left: 0; color: var(--accent); font-weight: 700; font-size: 11px; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

  .marks-table { width: 100%; border-collapse: collapse; font-size: 12.5px; margin-bottom: 8px; }
  .marks-table th { background: var(--tag); color: var(--accent); padding: 7px 9px; text-align: left; font-size: 11px; letter-spacing: 0.3px; }
  .marks-table td { padding: 7px 9px; border-top: 1px solid var(--border); color: var(--text); }
  .marks-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
  .grade-O { color: #f5c842; font-weight: 700; }
  .grade-A { color: #7fc8f8; }
  .grade-B { color: #7af09a; }
  .grade-pass { color: var(--good); }
  .grade-F { color: #f07a7a; }

  .search-results { display: flex; flex-direction: column; gap: 8px; }
  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .result-card:active { background: var(--surface2); }
  .result-sem { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
  .result-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .result-snippet { font-size: 12.5px; color: var(--muted); }
  mark { background: rgba(124,106,245,0.28); color: var(--text); border-radius: 2px; padding: 0 1px; }
  .no-results { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 15px; }
  .no-results .dog { font-size: 40px; display: block; margin-bottom: 10px; }
  .hint { font-size: 12px; color: var(--muted); text-align: center; padding: 8px; }

  .quick-grid { display: flex; flex-direction: column; gap: 10px; }
  .quick-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px 15px; }
  .quick-card h3 { font-size: 14px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
  .quick-card p, .quick-card li { font-size: 13px; color: #c0c2cc; line-height: 1.6; }
  .quick-card ul { padding-left: 16px; }
  .quick-card li { margin-bottom: 3px; }

  .announce { background: rgba(124,106,245,0.08); border: 1px solid rgba(124,106,245,0.25); border-radius: 8px; padding: 10px 13px; font-size: 12.5px; color: #a898f8; margin-bottom: 14px; }

  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; padding: 8px 0 env(safe-area-inset-bottom, 8px);
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 4px 0; cursor: pointer; color: var(--muted);
    transition: color .18s; -webkit-tap-highlight-color: transparent; border: none; background: none;
  }
  .nav-item.active { color: var(--accent); }
  .nav-icon { font-size: 20px; }
  .nav-label { font-size: 10px; font-weight: 500; }
</style>
</head>

// ===== STATE =====
let currentSem = 1;
let currentNav = "syllabus";
let searchTimeout = null;

// ===== BUILD SUBJECT CARD =====
function buildSubjectCard(sub, idx) {
  const icon = sub.type === "Practical" ? "🔬" : sub.type === "Seminar" ? "🗣️" : sub.type === "Research" ? "🧪" : sub.type === "Internal Assessment" ? "📋" : "📖";
  const hasBody = (sub.units && sub.units.length > 0) || (sub.practicals && sub.practicals.length > 0) || sub.scope;
  return `<div class="subject-card" data-idx="${idx}">
    <div class="subject-header" onclick="toggleSubject(this.parentElement)">
      <span class="subject-code">${sub.code}</span>
      <div style="flex:1">
        <div class="subject-name">${sub.name}</div>
        <div class="subject-meta">${icon} ${sub.type} · ${sub.marks.total} marks${sub.hours ? ' · ' + sub.hours + 'h' : ''}</div>
      </div>
      ${hasBody ? '<span class="chevron">▾</span>' : ''}
    </div>
    ${hasBody ? `<div class="subject-body">${buildBody(sub)}</div>` : ''}
  </div>`;
}

function buildBody(sub) {
  let h = '';
  h += `<div class="meta-row">
    <span class="meta-badge">Int: ${sub.marks.internal}M</span>
    <span class="meta-badge">Ext: ${sub.marks.external}M</span>
    <span class="meta-badge marks">Total: ${sub.marks.total}M</span>
    ${sub.hours ? `<span class="meta-badge">${sub.hours} hrs</span>` : ''}
    ${sub.credits && sub.credits !== '—' ? `<span class="meta-badge">${sub.credits} credits</span>` : ''}
  </div>`;
  if (sub.scope) h += `<div class="info-block"><div class="info-label">Scope</div><div class="info-text">${sub.scope}</div></div>`;
  if (sub.objectives && sub.objectives.length) h += `<div class="info-block"><div class="info-label">Objectives</div><ul class="obj-list">${sub.objectives.map(o=>`<li>${o}</li>`).join('')}</ul></div>`;
  if (sub.units && sub.units.length) {
    h += `<div class="info-label">Units</div><div class="units-section">
      ${sub.units.map((u,i)=>`<div class="unit-item">
        <div class="unit-header" onclick="toggleUnit(this.parentElement)">
          <span class="unit-num">${u.num}</span>
          <span class="unit-title-text">${u.title}</span>
          ${u.hrs ? `<span class="unit-hrs">${u.hrs}h</span>` : ''}
          <span class="unit-chevron">▾</span>
        </div>
        <div class="unit-body">${u.content}</div>
      </div>`).join('')}
    </div>`;
  }
  if (sub.practicals && sub.practicals.length) {
    h += `<div class="info-label" style="margin-top:10px">Practical Exercises</div>
    <ul class="practical-list">${sub.practicals.map((p,i)=>`<li data-n="${i+1}">${p}</li>`).join('')}</ul>`;
  }
  if (sub.refs && sub.refs.length) {
    h += `<hr class="divider"><div class="refs-section"><div class="info-label">References</div>
    ${sub.refs.map((r,i)=>`<div class="ref-item"><span class="ref-num">${i+1}.</span>${r}</div>`).join('')}
    </div>`;
  }
  return h;
}

function toggleSubject(card) { card.classList.toggle('open'); }
function toggleUnit(item) { item.classList.toggle('open'); }

function renderSubjects(sem) {
  document.getElementById('subjectList').innerHTML = SEMESTERS[sem].subjects.map((s,i) => buildSubjectCard(s,i)).join('');
}

function renderRefs() {
  let h = '';
  Object.entries(ALL_REFS).forEach(([name, data]) => {
    h += `<div class="quick-card" style="margin-bottom:10px">
      <h3 style="font-size:11px;color:var(--muted);margin-bottom:4px">${data.sem}</h3>
      <h3>${name}</h3>
      <div style="margin-top:8px">${data.refs.map((r,i)=>`<div class="ref-item"><span class="ref-num">${i+1}.</span>${r}</div>`).join('')}</div>
    </div>`;
  });
  document.getElementById('refsBySubject').innerHTML = h;
}

function renderQuick() {
  document.getElementById('quickGrid').innerHTML = QUICK_DATA.map(q=>`<div class="quick-card"><h3>${q.title}</h3><div style="margin-top:8px">${q.content}</div></div>`).join('');
}

// ===== SEARCH =====
function escH(s) { return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function snip(text, q) {
  const i = text.toLowerCase().indexOf(q.toLowerCase());
  if (i<0) return text.slice(0,80)+'…';
  const s=Math.max(0,i-30), e=Math.min(text.length,i+q.length+50);
  return (s>0?'…':'')+text.slice(s,e)+(e<text.length?'…':'');
}
function hl(text, q) {
  return text.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');
}

function doSearch(query) {
  const q = query.trim().toLowerCase();
  const container = document.getElementById('searchResults');
  if (!q) { container.innerHTML = `<div class="hint">🐾 Type above to search subjects, units, topics, references…</div>`; return; }
  const results = [];
  Object.entries(SEMESTERS).forEach(([sem, sd]) => {
    sd.subjects.forEach(sub => {
      let score = 0, snippets = [];
      if (sub.name.toLowerCase().includes(q)) { score+=10; snippets.push(hl(sub.name,q)); }
      if (sub.code.toLowerCase().includes(q)) score+=8;
      (sub.units||[]).forEach(u => {
        if (u.title.toLowerCase().includes(q)) { score+=6; snippets.push(hl(u.num+': '+u.title,q)); }
        if (u.content.toLowerCase().includes(q)) { score+=4; snippets.push(hl(snip(u.content,q),q)); }
      });
      if (sub.scope && sub.scope.toLowerCase().includes(q)) { score+=3; if(!snippets.length) snippets.push(hl(snip(sub.scope,q),q)); }
      (sub.refs||[]).forEach(r => { if(r.toLowerCase().includes(q)) { score+=2; snippets.push('Ref: '+hl(snip(r,q),q)); } });
      (sub.practicals||[]).forEach(p => { if(p.toLowerCase().includes(q)) { score+=3; snippets.push(hl(p,q)); } });
      if (score>0) results.push({sem:sd.label, semNum:parseInt(sem), sub, snippet:snippets[0]||'', score});
    });
  });
  results.sort((a,b)=>b.score-a.score);
  if (!results.length) { container.innerHTML = `<div class="no-results"><span class="dog">🐶</span>No results for "<b>${escH(query)}</b>"</div>`; return; }
  container.innerHTML = results.map(r=>`<div class="result-card" onclick="goToSubject(${r.semNum},'${escH(r.sub.code)}')">
    <div class="result-sem">${r.sem} · ${r.sub.code}</div>
    <div class="result-name">${r.sub.name}</div>
    ${r.snippet?`<div class="result-snippet">${r.snippet}</div>`:''}
  </div>`).join('');
}

function goToSubject(semNum, code) {
  switchNav('syllabus');
  currentSem = semNum;
  document.querySelectorAll('.sem-pill').forEach(p=>p.classList.toggle('active', p.dataset.sem==semNum));
  renderSubjects(semNum);
  setTimeout(()=>{
    document.querySelectorAll('.subject-card').forEach(card=>{
      if (card.querySelector('.subject-code') && card.querySelector('.subject-code').textContent.trim()===code.trim()) {
        if (!card.classList.contains('open')) toggleSubject(card);
        card.scrollIntoView({behavior:'smooth',block:'start'});
      }
    });
  }, 80);
  document.getElementById('searchInput').value='';
  document.getElementById('searchClear').classList.remove('show');
}

function switchNav(nav) {
  currentNav = nav;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active', b.dataset.nav===nav));
  const map = {syllabus:'syllabusSection', search:'searchSection', refs:'refsSection', quick:'quickSection'};
  Object.entries(map).forEach(([k,id])=>{ const el=document.getElementById(id); el.style.display=k===nav?'block':'none'; });
  if (nav==='refs' && !document.getElementById('refsBySubject').innerHTML) renderRefs();
  if (nav==='quick' && !document.getElementById('quickGrid').innerHTML) renderQuick();
  if (nav==='search') { setTimeout(()=>document.getElementById('searchInput').focus(),100); }
  window.scrollTo(0,0);
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', ()=>{
  renderSubjects(1);
  document.getElementById('semPills').addEventListener('click', e=>{
    const pill = e.target.closest('.sem-pill');
    if (!pill) return;
    document.querySelectorAll('.sem-pill').forEach(p=>p.classList.remove('active'));
    pill.classList.add('active');
    currentSem = parseInt(pill.dataset.sem);
    renderSubjects(currentSem);
  });
  document.querySelectorAll('.nav-item').forEach(btn=>{
    btn.addEventListener('click',()=>switchNav(btn.dataset.nav));
  });
  const inp = document.getElementById('searchInput');
  const clr = document.getElementById('searchClear');
  inp.addEventListener('input', e=>{
    clr.classList.toggle('show', e.target.value.length>0);
    if (e.target.value.trim() && currentNav!=='search') switchNav('search');
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(()=>doSearch(e.target.value), 220);
  });
  inp.addEventListener('focus', ()=>{
    if (currentNav!=='search') switchNav('search');
    if (!inp.value.trim()) document.getElementById('searchResults').innerHTML=`<div class="hint">🐾 Type above to search subjects, units, topics, references…</div>`;
  });
  clr.addEventListener('click', ()=>{
    inp.value=''; clr.classList.remove('show');
    document.getElementById('searchResults').innerHTML=`<div class="hint">🐾 Type above to search subjects, units, topics, references…</div>`;
    switchNav('syllabus');
  });
});
</script>
