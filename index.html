<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>AI Assisted Projects</title>

  <!-- 1 font, 1 icon lib, 1 data lib — nothing else -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

  <style>
    :root {
      --bg:         #0d0d11;
      --surface:    #16161d;
      --border:     #242430;
      --border-hi:  #38384a;
      --text-1:     #e0e0ea;
      --text-2:     #888898;
      --text-3:     #4c4c5e;
      --accent:     #9f7aea;
      --accent-bg:  rgba(159,122,234,.1);
      --r:          14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: 'Figtree', sans-serif;
      -webkit-tap-highlight-color: transparent;
      min-height: 100dvh;
    }

    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 20px 16px max(80px, env(safe-area-inset-bottom));
    }

    /* ── Search ── */
    .search-wrap {
      position: relative;
      margin-bottom: 20px;
    }
    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      translate: 0 -50%;
      color: var(--text-3);
      width: 16px;
      height: 16px;
      pointer-events: none;
    }
    #search {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 13px 16px 13px 42px;
      color: var(--text-1);
      font-family: inherit;
      font-size: 15px;
      outline: none;
      transition: border-color .15s;
      -webkit-appearance: none;
    }
    #search::placeholder { color: var(--text-3); }
    #search:focus { border-color: var(--accent); }

    /* ── Card list ── */
    #list { display: flex; flex-direction: column; gap: 16px; }

    /* ── Card ── */
    .card {
      display: flex;
      align-items: flex-start;
      gap: 13px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px 15px;
      text-decoration: none;
      color: inherit;
      transition: border-color .15s, background .15s, scale .1s;
      animation: up .3s ease both;
    }
    .card:active {
      background: #1c1c25;
      border-color: var(--border-hi);
      scale: .975;
    }
    @media (hover: hover) {
      .card:hover {
        background: #1c1c25;
        border-color: var(--border-hi);
      }
    }
    @keyframes up {
      from { opacity: 0; translate: 0 6px; }
      to   { opacity: 1; translate: 0 0; }
    }

    /* ── Icon ── */
    .card-icon {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border-radius: 9px;
      background: var(--accent-bg);
      display: grid;
      place-items: center;
      font-size: 15px;
      color: var(--accent);
      overflow: hidden;
    }
    .card-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    /* Fallback initial letter */
    .card-icon.initial {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
    }

    /* ── Content ── */
    .card-body { flex: 1; min-width: 0; }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-desc {
      font-size: 13px;
      color: var(--text-2);
      margin-top: 3px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-domain {
      font-size: 11.5px;
      color: var(--text-3);
      margin-top: 6px;
      letter-spacing: .02em;
    }

    /* ── Arrow ── */
    .card-arrow {
      flex-shrink: 0;
      color: var(--text-3);
      margin-top: 2px;
      font-size: 12px;
      transition: color .15s;
    }
    .card:active .card-arrow,
    .card:hover .card-arrow { color: var(--accent); }

    /* ── States ── */
    .state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-3);
      font-size: 14px;
      line-height: 1.6;
    }
    .state i { display: block; font-size: 28px; margin-bottom: 12px; }
    .state strong { color: var(--text-2); display: block; margin-bottom: 6px; }
    .state code {
      background: rgba(255,255,255,.05);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
    }

    /* ── Loader ── */
    .loader {
      width: 32px; height: 32px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      margin: 60px auto;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { rotate: 360deg; }
    }
  </style>
</head>
<body>
  <main>
    <div class="search-wrap">
      <!-- inline SVG — no extra request -->
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="8.5" cy="8.5" r="5.5"/><path d="m14 14 3 3"/>
      </svg>
      <input type="search" id="search" placeholder="Search projects…" autocomplete="off" spellcheck="false">
    </div>
    <div id="list"><div class="loader"></div></div>
  </main>

  <script>
    const YAML_PATH = 'projects.yml';
    let all = [];

    // ── Icon helpers ──────────────────────────────────────────────
    const isURL = s => s && /^(https?:|data:)/.test(s);

    // Normalize any FA icon string to fa-solid.
    // Also fixes FA5→FA6 renames we know about.
    const FA6_RENAMES = {
      'fa-plus-square':   'fa-square-plus',
      'fa-minus-square':  'fa-square-minus',
      'fa-times':         'fa-xmark',
      'fa-inr':           'fa-indian-rupee-sign',
    };
    function normalizeFA(icon) {
      if (!icon) return 'fa-solid fa-cube';
      let cls = icon.trim();
      // Rename old icon names
      for (const [old, neo] of Object.entries(FA6_RENAMES)) {
        cls = cls.replace(old, neo);
      }
      // Strip non-solid prefixes
      cls = cls.replace(/\bfa-(regular|light|thin|duotone)\b/, '').trim();
      // Ensure fa-solid is present
      if (!cls.includes('fa-solid')) cls = 'fa-solid ' + cls;
      return cls;
    }

    // ── Render ───────────────────────────────────────────────────
    function getDomain(url) {
      try { return new URL(url).hostname.replace('www.', ''); }
      catch { return ''; }
    }

    function html(projects) {
      if (!projects.length) {
        return `<div class="state"><i class="fa-solid fa-magnifying-glass"></i>No results</div>`;
      }
      return projects.map((p, i) => {
        const delay = Math.min(i * 30, 200);
        const iconHtml = isURL(p.icon)
          ? `<img src="${esc(p.icon)}" alt="" onerror="this.parentNode.className+=' initial';this.parentNode.textContent='${p.title[0]}';">`
          : `<i class="${esc(normalizeFA(p.icon))}"></i>`;

        return `
        <a class="card" href="${esc(p.url)}" target="_blank" rel="noopener noreferrer"
           style="animation-delay:${delay}ms">
          <div class="card-icon">${iconHtml}</div>
          <div class="card-body">
            <div class="card-title">${esc(p.title)}</div>
            <div class="card-desc">${esc(p.description)}</div>
          </div>
          <div class="card-arrow"><i class="fa-solid fa-arrow-up-right-from-square"></i></div>
        </a>`;
      }).join('');
    }

    function render(list) {
      document.getElementById('list').innerHTML = html(list);
    }

    // ── Search ───────────────────────────────────────────────────
    let timer;
    document.getElementById('search').addEventListener('input', e => {
      clearTimeout(timer);
      timer = setTimeout(() => {
        const q = e.target.value.trim().toLowerCase();
        render(q ? all.filter(p =>
          p.title.toLowerCase().includes(q) ||
          p.description.toLowerCase().includes(q)
        ) : all);
      }, 150);
    });

    // ── Load ─────────────────────────────────────────────────────
    function esc(s) {
      return String(s ?? '').replace(/[&<>"']/g, c =>
        ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    (async () => {
      try {
        const res = await fetch(YAML_PATH);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const parsed = jsyaml.load(await res.text());
        if (!Array.isArray(parsed)) throw new Error('YAML root must be an array');

        all = parsed.map(p => ({
          title:       String(p.title       ?? 'Untitled'),
          description: String(p.description ?? ''),
          icon:        p.icon  ?? null,
          url:         String(p.url         ?? '#'),
        }));

        render(all);
      } catch (err) {
        document.getElementById('list').innerHTML = `
          <div class="state">
            <i class="fa-solid fa-triangle-exclamation" style="color:#f87171"></i>
            <strong>Couldn't load projects.yml</strong>
            <br><br><small style="color:#4c4c5e">${esc(err.message)}</small>
          </div>`;
      }
    })();
  </script>
</body>
</html>
